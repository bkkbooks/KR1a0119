body:
  text: 讀易大㫖卷五容城孫竒逢撰兼山堂答問易問孔子繫易直以顔子當復之無祇悔元吉曰顔氏之子其殆庻㡬有不善未嘗不知知之未嘗復行此何所據也曰孔子嘗稱顔子曰三月不違仁曰擇乎中庸得一善曰不遷怒不貳過曰不改其樂曰庻乎屢空曰克己復禮至顔子述孔子之善誘則曰博我以文約我以禮而已庻幾之幾即知幾之幾也幾者動之㣲吉凶之先見者也先見乎吉故常知乎善常行乎善先見乎凶故常知不善不復行不善以一念之善幾必先知之一念之不善幾亦先知之知幾則常知常知則常先見常先見則常復則神則生生則仁則一則不遷則不貳則中則庸則樂則空則已克則禮復不庻幾乎自強不息之君子乎少有一毫不知則不能先見不先見則祇悔祗悔而復則逺物而不神矣這個知幾學問既不著空是我之文又不著物是我之禮吾心即天地萬物就是博文天地萬物即吾心就是約禮真是一以貫之六十四卦无非天地之心而於復則見天地之心甚矣復初九之功大也學易須是知天地之心知天地之心須是知復之初九知復之初九須是知顔子之幾周子曰學顔子之學明道曰學顔子有凖的則周程學顔乃所以為學易者也問孟子七篇未嘗言易先儒謂之知易從何看出曰孟子知易前已論之詳矣然易不可見孔子一身語黙動靜无之而非易也故能𤼵孔子之藴便是知易之深孔子說君子喻義小人喻利孟子就指出舜蹠之分在善利之間孔子說人之生也直罔之生也幸而免孟子就以惻隱羞惡辭讓是非之心為仁義禮智之端把能充與不能充兩様指出孔子説鄉愿為徳之賊孟子就把他無舉無刺閹然媚世的心事指出孔子說道聴塗說為徳之棄孟子便把深造以道居安資深自得的趣味指出孔子說欲立欲達能近取譬孟子就說出萬物皆備自反而誠強恕而行孔子說富而可求執鞭亦為孟子就把登壟乞墦求富貴的態度指出孔子說無求生害仁孟子就說出舍生取義志士不忘在溝壑孔子説學而時習孟子就說出必有事而勿正勿忘勿助孔子說無適無莫義之與比孟子就説出言行不必信果與非禮之禮非義之義大人不為孔子説不知言無以知人孟子就說出知言一段工夫孔子歎逝者如斯不舍晝夜孟子就說原泉混混盈科放海有本者如是孔子說道之以政道之以徳孟子就分出以善服人以善養人孔子說貞而不諒孟子就把楊氏為我墨氏兼愛子莫執中指出孔子說為山未成一簣孟子就說出掘井九仞而不及泉孔子説鄙夫不可與事君大臣以道事君孟子就説出一個賤丈夫又說出一個小丈夫又說出一個大丈夫又說岀一個事君人一個安社稷臣一個天民一個大人孔子自言無可無不可孟子就看出他為聖之時只一時字孔子之全體大用盡之矣而易之儀象卦爻總皆時之所流露而變現焉者也求易於儀象卦爻無不足以見孔子求孔子於動静語黙无之非易周子曰𤼵聖人之藴教萬世無窮者顔子也愚亦曰𤼵聖人之藴教萬世無窮者孟子也孔子假年學易孟子願學孔子先儒謂孟子知易知言哉問乾易知坤簡能乾何獨言知坤何獨言能也豈知能有二乎曰知能固無可分而於中當有先後之界乾坤原自並列而隂有承順從陽之義知便是主宰所謂先天而天弗違也就是知崇效天能便是事為所謂後天而奉天時也就是禮卑法地朱子謂乾健便能始物坤順而不自作則知能似不可混而為一也髙明儀天周萬物而知不遺矣而别宜分𩔖以其博厚者兼濟之不過也地成天功也變通配四時不循迹為行矣而秉常履中節以制變經正以守之不流也地奠天紀也夫隂陽合而後嵗功成知能一而後道統大故了得乾坤便了得六十四卦了得乾便了得坤謂為一不可謂為二亦不可問曾子子思於易何如曰二子之于易深矣伏羲先天圖無一刻不運是天之動无一刻不定是天之靜常是動常是靜分不得動之時靜之時惟其常靜是以無一刻不運惟其常動是以無一刻不定總只是一個至誠無攙和夾雜於其中天行健惟誠故健也君子以自強不息惟誠故無息也大學之明新至善而一本於誠意中庸之中和位育而一本於誠身易之丈言曰忠信所以進徳修辭立其誠所以居業忠信與誠夫豈有二哉忠信之徳聖凢同具有忠信而能好學便就做得聖人有忠信而不好學便只止於鄉人聖門諸賢凢具一體者皆於易之一卦一爻而有合者也人心只有一個天理這天理存之就是徳行之就是義故主於念頭者謂之幾𤼵於事為者謂之義一也至之至此者也終之終此者也使有一毫不忠不信即知至豈能至之即知終豈能終之失其㡬矣不足存義矣忠信在我故隨時隨處无所與於我終日乾乾收拾此而已所以无妄之彖辭曰大亨以正天之命也中孚之彖辭曰中孚以利貞乃應乎天也曰无妄曰中孚忠信之謂也為天之命為應乎天以天地之道一誠盡之也學庸正易之深處故均能發聖人之藴教萬世於無窮問人心有知一天徳良知有能一天徳良能其寂其感一天之寂感也易贊卜筮云前民用而極於神夫人自致其心之神明而可矣奚外假哉曰此正自克之盡而無己之至也葢人生有身則有心有心則有知知多自私不學以致之則昏即其致之守己者固從人者輕於天葢夢夢然非自克之盡未有能自致者也夫易有天之天有天之人有人之天有人之人此四象之象不可不察也聖人知天之天立象繫辭裁變定占焉著之易以明民知人之天俾觀象玩辭觀變玩占焉學夫易以達天雖其自筮必湛其齋必肅其戒雖有明聖之心毋敢自遂必進受命而斷其志焉誠懼乎天之人萌其中而人之天汨如也無己之盡也况於中人有蔽之心人而人爾危莫危焉其内恒險其外多阻憂患之來不可為量數而往往徇見知自蔽執已是自固也物之則未格人之天未定天之天未至即欲致知何自而致之故問之卜筮斷之以神物明受命於天何也天者一而人者貳也一者无思无為寂以感通而神貳乃多思多慮以有為為之而雜也易也者因人之貳紹天之一以通志决疑而濟其行者也故其辭危危之者俾夫人知危而辨之蚤防之豫也俾夫人知且有憂有患又審知憂患之故也又俾人知危乃平易必傾道甚大而百物不廢也此謂與天地鬼神合徳問易之藴於乾坤盡之乾坤之藴於易知簡能盡之夫易知何知而足以盡乾也簡能何能而足以盡坤也子夏日知其所亡月無忘其所能抑有當於易知簡能否與曰人得天地之心以為心凡厥有知豈人實知天明為知人何知焉知不以人為知即日用平直之心為知而知者易也知其然亦知其所不然知其可亦知其所不可知所知亦知其所不知是天徳良知也所知所不知者萬而所以知者一也惟易而易知矣何也日用易直之心舉夫人而可與知也人得天地之能以成能凡厥有能豈人實能天能為能人何能焉能不以人謀為能即日用易直之心為能而能者簡也然其然不然其所不然可乎可不可其所不可因物所然固物所可而吾固無然無不然無可無不可也是天徳良能也所能所不能者萬而所以能者一也惟簡而易從矣何也日用易直之能舉夫人而可與能也是易簡也凡具一知一能者無不可以托處無奈乎人之好異而求之逺且難也即知成見即見成己始乎天常卒乎人始乎道常卒乎物始乎一常散乎倍蓰什百千萬无算也故始乎善若性卒之善者常戾而性者常拂也易知簡能之道知之者鮮矣能之者抑又鮮矣道荒矣惟日知其所亡則知始之知非知其所不必知也月無忘其所能則作成之能非能其所不必能也其徳盛其知大始乎其日新不窮乎易而知乎其業大其成大作乎其富有无外乎簡而能乎易知之知昭朗有融盡萬物而高明覆之幽賾遐𦕈獨觀昭曠洞其本剽無不貫也无不極也崇莫崇焉而效天矣簡能之能履下處實盡萬有而博厚載之周規折矩禮以為履側躬布武无不順也无不下也卑莫卑焉而法地矣子夏之學雖未必全滿其量然存存不已變化日新固已望的而赴矣易之實體已具於此皆所謂聖人之藴也問河洛圖伏羲方圓圖文王八卦圖與周子太極圖同異何如先儒謂只玩其圖便足盡易之藴然與否與此大道之始聖學之源敬請開示曰史稱太昊之世天應以鳥獸文章地應以河圖洛書河以通天龍馬負圖以出於河圖出馬背旋毛文故圓曰圖洛中於地神龜負書以出於洛書出龜背拆甲文故長曰書洛書之數雖四十有五而河圖五十有五之數已在其中矣此二圖者雖異而實未始有異也故易曰河出圖洛出書聖人則之是圖書皆可以畫卦也龜龍亦何心哉總太極之秘藴所露靈而呈現也羲畫卦而圓有圖方有圖衡有圖先天開人先儒謂之先天圖然圓者而方之衡之則圓一方也一衡也方者衡者而圓之則方一圓也衡一圓也有異名而无異體者也羲亦何容心哉文王出震齊巽圓圖及父母六子圖本天憲聖先儒謂之後天圖與羲圖逈異矣然先天而天弗違後天而奉天時羲圖文圖縱横變合之妙爛焉上經三十卦一不可得増下經三十四卦一不可得減若成諸天若定諸命若妙於神思為一不可得措其不易者常易常易者又未始或易也此易之神也而文亦何心哉聖人未出道在天地天地洩其秘於未有文字之先所以告也聖人既出道在聖人聖人𤼵其藏於既有圖書之後所以教也周子太極圖圖太極於其上人生而静以上之象河洛圖圖太極於其中人受天地之中之象天地萬物之未生則太極居其上天地萬物之既生則太極居其中一而已矣邵子曰先天圖心法也圖皆自中起萬事萬化生於心也文王深於憂患而後天圖作取乾坤為天地之大純坎離為天地之大中於先天四正之卦合是故為上易之主而反觀不變取兌艮通山澤之槖震巽鼔風雷之籥於先天四隅之卦合是故為下易之主而反觀皆變不變者太極之體也變者太極之用也君子戒慎不睹恐懼不聞而震艮合始巽以八終説以解而巽兌合震艮巽兌合而乾坤之易簡坎離之誠明无不皆合中庸之所以致中和而位天地育萬物也大道之始聖學之源孰有外於此哉一披圖而天地萬物之情見焉諸大聖人擬議變化之妙燦焉謂圖不足盡易之藴而必待於贊説恐説愈煩而易愈晦矣孔子贊而又贊猶曰書不盡言言不盡意葢其藴原非言之所能盡也問大易不言有無言有無諸子之陋也張子何所指與曰即如死生鬼神之事言者紛紜幻妄不可為據大易第云原始反終故知死生之説精氣為物游魂為變故知鬼神之情狀言約意盡以為有未嘗有也以為无未嘗无也張子所指者不止此此其大端者矣高景逸曰在道不溺於无在器不墮於有葢道無形體而能形天下之形體天下之體彼專以无言者陋也器有形體而形卒歸於无形體卒歸於无體彼專以有言者陋也皆失易之㫖也夫易廣大配天地變通配四時隂陽之義配日月易簡之善配至徳其所謂逺取諸物近取諸身隨時隨地成象成爻者此可謂之有耶謂之無耶周流六虚不可為典要原無有無可言也故言有無諸子之陋也識此意者可與言易矣問易之道天下何思何慮然當殷之末世文王與紂之事時值憂患辭多危懼不益重之朋從之思而往來之憧乎曰天下之道其出也同源歸同也欲自異焉而不可得也而其異者由往來並行錯行殊途焉而莫能自已其為物不二致一也欲二之而不可得也而其二者由往來操心虞患慮百焉而莫能自知孔子無適莫而義比孟之勿忘助而義集凡所為前定而不危其身者必預為之計而慎小慎㣲危以維安亡以保存亂以有治豈過計哉則知幾於屈信信屈之感焉故也戒懼之至也故能同歸一致日往日來而有不往不來者以為之主日屈日伸而有不屈不伸者以為之主其不往不來不屈不伸者義也其日往日來日屈日伸者神也其行之乎往來屈伸之途然乎其所不得不然而我固無然是精義也其妙之乎往來屈伸之變然乎其所自然而然而我莫知所由然是入神也至精而一以至於極㣲極細至一而精以至於極純極熟用不期利而自利徳不期崇而自崇而又何憧憧之有令精義而思以致用是明道而計功也利用而蘄以崇徳是正誼而謀利也方精義利用而思企神化是未卵而求時夜未彈而求鴞炙未下學而幾上達也必不幾矣問晉顔含字宏都郭璞嘗過其家欲與之筮含曰年在天位在人修已而天不與者命也守道而人不知者性也自有性命无勞蓍龜據含之言則卜筮可廢乎曰何可廢也書云稽疑謀及卜筮周公嘗為武王卜矣周有大事皆以卜用易曰君子將有為也將有行也問焉而以言其受命也如嚮是卜筮聖人皆用之何可廢也然聖人之所以用卜筮者正以其性命之理與神相通故能知來含既深於性命則造化生心鬼神將聽令焉其不用卜筮者乃所以精於卜筮者也璞明於術含明於理此中正千里耳問終日乾乾夕惕若與戒慎不覩恐懼不聞其㫖同否曰此最聖學吃𦂳處也易曰天行健君子以自強不息中庸曰維天之命於穆不已文徳之純純亦不已終日乾乾夕惕若是一日之内子而亥一月之内朔而晦一嵗之内春而冬無時不兢惕如天之運轉如日月之往來不使有須臾之間斷戒慎不覩恐懼不聞是見道之不可須臾離者无物不有无時不然故由覩而密之不覩由聞而密之不聞无刻不戒懼因已𤼵以求未𤼵飬未發以全已發不使有須臾之乖離此徳之所以純與於穆同一不已君子之所以自強與天地同一健也大易之㫖與中庸之㫖夫豈有二哉與三無道人論易上天之載無聲無臭而萬物生此易之源也庖羲氏通神明之徳𩔖萬物之情始設竒偶二畫以象之二畫錯而八卦成八卦錯而四圖著圖之不一隂陽消長之象則一隂陽消長天地之變化也文王重之以盡其變周孔繫之以效其動因時捄弊豈能於圖之外加毫末及其乆也意義繁而諸家之學競起徇於有者見動而不見靜墮於無者見靜而不見動知易者鮮矣千餘年後太極圖著而庖羲氏之圖益明無極者言乎其本無聲無􅆨上天之載也無欲者言乎其功渾然與物同體夫是之謂仁仁存則人極立順事畢天是之謂合徳濓溪之言至矣横渠西銘見其大者也誠敬存之未嘗致纎毫之力則性定而内外忘明道所以發其藴也庖羲之後不容无文王周孔濓溪之後横渠明道亦豈容少哉此條脈路孚契最㣲按辭章訓詁而求之將愈求而愈逺矣易變易也所以盡心之變也故其為卦不相假借其為爻不可混淆葢心之變無窮則其詞亦無窮引而伸之觸𩔖而長之無非貞吉之為趨而凶悔之為避此易之大端也横渠云易為君子謀不為小人謀章楓山則云易之一言一字皆小人之藥石不為之謀特不為之謀為小人之事耳小人而欲為君子易固未始不深為之謀也楓山之言豈果有外於横渠但從其意而引伸之愚謂易固无一人不為之謀无一事不為之謀无一時不為之謀惠迪吉從逆凶惟影響至哉易之為教乎艮卦以艮為止聖人恐人認為息滅之義故云止亦止也行亦止也惟時而已矣思不出位所以為止不間于行止之間若云不思而不出位是離用以言體告子之不動心是也周公夜以繼日之思體在用中用在體中无為而无不為明道所謂擴然大公物來順應而已矣夫以憧憧往來之境而遽令其擴然順應此可想殊途同歸一致百慮天下何思何慮其道之所以光明也天道貴陽而賤隂聖人抑隂而扶陽故一陽之生保䕶惟恐不嚴一隂之生遏絶惟恐不力凡易之所謂吉亨利必多陽也非然者必隂之比陽應陽從陽而得正者也其所謂凶悔吝必多隂也非然者必陽之比隂從隂應隂而失正者也聖帝明王宰世陽剛盛而隂不能撓非無隂也比之應之從之而得其正則隂亦陽耳暴君汚吏當權隂邪盛而陽不能主非無陽也比之應之從之而失其正則陽亦隂耳聖人作易全是㕘贊造化輔相生民大之元㑹運世小之食息起居無逺弗屆無㣲不入易之妙用夫子贊之又贊只是難以言語形容君相能用易而覆育在天下賢士大夫能用易而補救在邦家家之父慈子孝兄友弟恭夫健婦順以至飲食宴息避難反身一切處常處變之事有一非易之𤼵用者乎不明於此義不足言讀易易者天地聖人之精藴而羲畫以象告彖於文爻於周公十翼於孔子亦皆觀象而繫之辭卦之為六十四爻之為三百八十四吉凶悔吝生焉似乎俚而支無怪乎人以卜筮之書目之也不知象也者聖人之所立焉以盡意而象之所含又不可以辭盡也傳之辭非必盡彖爻之㫖彖爻之藴固不可以傳盡也四大聖人各就其所獨得而各為言易之精藴仍未有盡也千百載之後再有幾大聖人出焉𤼵明講究易之藴仍是其未盡耳易一盡則太極窮天地息矣孔子後千餘年程傳主理本義言占亦非岐言之也理者確乎不易而占則示人以用易之道也人不知用易則易亦虚設於天地之間兩大儒亦各言其所獨得而已不恒其徳或承之羞子曰不占而已矣占焉而可免於羞此正用易之妙也一隂一陽之謂道有隂陽則不能無剛柔有剛柔則不能無善惡有善惡則不能無君子小人然其道以陽統隂則隂皆為陽之用以君子統小人化枉為直則小人皆為君子之用故舉臯陶而不仁者逺舉伊尹而不仁者逺聖人㕘贊天地大功用全在轉小人為君子經世宰物之人不明於此義不足言用世寂中之感既向於動感中之寂仍歸於靜此處正好窺動靜合一之㫖易贊知幾為神而以介石先之朱子曰介如石理素定也是素定者非所謂寂然者乎又曰惟幾也故能成天下之務而以惟深先之朱子曰極深者至精也研幾者至變也是精深者非寂然者乎此大易動靜合一之㫖也周子曰動而未形有無之間曰㡬㡬善惡者言惟㡬故能辨善惡必常戒懼常能寂然而後不逐於動是乃所謂研㡬也無欲故靜周子立極之功此方是動靜合一真妙訣讀易之道最忌拘泥貴變通何謂拘泥不察象而以臆說者支不察夫聖人精意之所存徒瑟瑟于象與辭之辨者枝六十四卦三百八十四爻變而通之以趨時必執一法以衡之者固傳之辭非必盡彖爻之㫖㕘而玩焉可也定謂四聖一心而強合焉者膠何謂變通易非四聖之易乃天開地闢隂陽消息霄壤間自然之易也又非霄壤之易乃吾心之誠明寂然不動感而遂通之易也㑹得此㫖則知吾之心與四聖之心一天下後世之心與吾之心一其於易也思過半矣嘗讀泰卦内君子而外小人只此一言用之不盡不獨君王借賢人以共治即士大夫而得一良朋益友以托身托家則道徳有於已而家世平康其義不亦重乎其聚不亦樂乎故曰身無一賢曰窮朋來四方曰達復其見天地之心乎從此葆而勿失存存不息自然光輝𤼵越還我天然完具之體此所謂誠之者之事盡人以合天全恃這些靈露孟子論夜氣平旦之好惡與人相近正謂此也程子曰作易自天地幽明至於昆蟲草木㣲物無不合故能盡飲食言語之道者則能盡晝夜死生古今之道凡物自無而有曰始自有而無曰終如一日有一日之終始一人有一人之終始知一日一人之終始則知千百世千萬人之終始因始而究極其所無始因終而究極其所無終總是此一個消息白沙云無極老人無欲教一畨拈動一畨新其識此消息者乎䟦易之為書也原於太極分之為兩殽之為四列之為八摩盪之為六十四則内外之體備焉已體既備而用彌宏上古聖人以其藴蓄者無窮雖天地古今人情物理不能盡其奥非辭説之所可傳也故立象以盡意象者太極兩儀四象八卦以及重卦者是太極無象而萬象凾焉為兩為四為八為六十四而隂陽之消息運焉進退具焉變化成焉而情偽淆於中吉凶定於中悔吝生於中趨避見於中而神化宜民之道於是乎出豈辭説之所可罄也然而非神明者不能與於斯也故中古之聖人觀彖而繫之辭彖辭繫而全體之意見爻辭繫而一節之意顯聖人非好為辭説以泥後世也使達者悟於辭之外即未達者亦不悮於辭之中亦期於神化宜民而已矣曷先後天之有殊乎雖然猶有説焉无文之易誠明之道也有文之易明誠之道也苟能因辭以㑹夫无辭之奥是借後天之學返乎先天之理所謂復也復則无妄而消息在我造化生心矣用易而至於造化生心則坤變為乾否轉為泰小人可化為君子安在辭説不足與於神化之道乎故夫子韋編絶後而極贊無窮也葢贊其理通於性命而用恊於神明也夫通性命而恊神明則亦在象外亦在辭中所以欲假年學之而不厭也秦火後或散為技或流為術而用亦不以技術廢有宋興而伊川言理康節言數晦翁言占各得聖人之一體近鍾元孫先生避地蘇門葢有取於變通趨時之道也每取其書觀之久而有得著讀易大㫖夫仲尼觀夫一卦之材而括之象傳之一言鍾元因象傳而潛通夫一卦之意且以黙契夫六十四卦之㫖是能不滯於辭者也更能旁通夫象者也所謂神明黙成斯其人歟讀易大㫖卷五
