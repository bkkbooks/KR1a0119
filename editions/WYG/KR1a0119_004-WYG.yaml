body:
  text: 讀易大㫖卷四容城孫竒逢撰說卦傳古文之說卦分上中下三篇即今文繫辭上下及說卦傳也程子曰幽贊于神明而生蓍用蓍以求卦非謂有蓍而後畫卦神明涵後道徳性命象先性生氣而定天地之位象後性􅀝氣而趨四時之數總歸神明神明生天生地天地合而生時生數數非神明之所倚而何哉參天兩地是由象後規圓矩方之法逆推象先以故知性倚數是由象先參天兩地之道順推象後以利言故觀變自象先無極之生數變來主四性主河圖内體言也發揮兼象先無極之成數發來主四氣主洛書外體言也以圖書方圓相受神明相貫則貞悔雖分不分無嫌支離立卦卦中有爻生爻爻中有卦可以互見道徳義是順說本體窮之盡之至之是逆說工夫須有軒輊以徳性為主徳即性性即神也道即命命即易也性能命氣易有太極故也神明到此出頭矣自聖人之作易也下六句皆一意幽贊于神明參天兩地觀變于隂陽發揮于剛柔和順于道徳窮理盡性一意也生也􅀝也立也生也理也至也一意也聖人作易不過此六者而已言蓍數卦爻而必曰義命者道器無二致理數不相離聖人作易惟教人安於義命而已故兼天人而言之此易之道也言蓍草乃神明幽助方生參天者天一天三天五之三位也兩地者地二地四之二位也􅀝者依也聖人用蓍依以起數也觀變者六十四卦皆八卦之變陽變隂隂變陽也𤼵揮于剛柔者布散剛柔於六十四卦而生三百八十四爻也理于義者六十四卦皆利於貞其要无咎者義也至于命者文王𤼵明彖辭周公𤼵明爻辭皆理于義至于命也使非理義至命安能彌綸天地也哉右第一章上章以道徳性命終神明之意此章以順性命挑出仁義為綱轉屬神明曲盡幽贊之指性人之理命天地之理也隂陽以氣言寒暑往來之𩔖是也剛柔以質言山峙川流之𩔖是也仁義以徳言事親從兄之𩔖是也三者雖若不同其實一而已矣葢天地間不外形氣神三字天無隂陽則氣機息地無剛柔則地維墜人無仁義則禽獸矣故曰立天立地立人兼三才而兩之者總分三才為上中下三段而各得其兩初剛而二柔三仁而四義五陽而上隂也分隂分陽以爻位言分初三五為陽位二四上為隂位也既分隂分陽乃迭用剛柔之爻以居之或以柔居隂以剛居陽為當位以柔居陽以剛居隂為不當位亦有以剛柔之爻互居隂陽之位為剛柔得中者故六位雜而成文章也無非順此性命之理而已上章以隂陽屬卦剛柔屬爻此章以分隂分陽屬爻者葢以隂陽主剛柔貞主悔也依然是主性命氣之意益見性命不並神易相承易之為道總之一性命之理隂陽剛柔仁義三者雖若不同然仁者陽剛之理義者隂柔之理其實一也分之以見兩在之機合之以見一原之妙卦體其合者而爻體其分者分之無可分實合之而無可合也右第二章來矣鮮曰相薄者薄激而助其雲雨也不相射者不相射害也相錯者隂與陽相對待一隂對一陽二隂對二陽三隂對三陽也故一與八錯二與七錯三與六錯四與五錯八卦不相錯則隂陽不相對待非易矣宋儒不知錯綜二字故以為相交而成六十四卦殊不知此專說八卦逆數方得相錯非言六十四卦也易逆數逆字入妙逆迎也合也如春秋逆女史記逆戰之逆皆取迎合之義太極屬神隂陽屬易易生於神而不能離乎神有逆顧根宗之道然非數以形之則此理𨼆而不可見逆數是天地間莫大之道近而一身逺而天下古今之事物無一而非逆也逆是自然之逆雖逆亦順八物兩兩相對而亦兩兩相闗一體故也乾以易知一身痛癢無不知覺也坤以簡能一身痛癢無不求安也山澤一體中之血脈也雷風一體中之捭闔也水火一體中之升降也山澤通氣雷風愈益相薄雷風相薄山澤愈益通氣一體益明古今聖賢言易自有門户貫為一條如臯陶九徳各兼剛柔剛柔自相逆而成徳也孔子陳九徳始經終權終始自相逆而成徳也又如堯舜性之為順為用九之道湯武反之為逆為用六之道九六自相逆而成徳也順逆可分兩人可合一人可分兩事可合一事也總之取法天地性命之理圖書􅂥之羲易為盡性至命之堂奥周易則盡性至命之門路若詩書禮樂以及思孟之書又周易之門路也性道寓文章罕言寓雅言非格致不入非誠正不到薛文清曰說卦無一字不自先天出愚觀世間無一理不自說卦出易為逆數專教人卜未來吉凶如事已得凶仍使之趨吉情已可吝仍使之知悔要盡人事以囘造化若逆挽而進之者此易道之用與造化侔而聖人作易之功亦與天地並也右第三章天地定位上章言八卦之對待故首之以乾坤此章言八卦對待生物之功故終之以乾坤乾坤始交而為震巽震巽相錯動則物萌散則物解此言生物之功也中交而為坎離坎離相錯潤則物滋晅則物舒此言長物之功也晅者明也終交而為艮兑艮兑相錯止則物成說則物遂此言成物之功也若乾則為造物之主而於物無所不統坤則為養物之府而於物無所不容六子不過各分一職以聴命耳陳大士曰上章天地定位以無為而用六子之有為此章六子用事以有為而歸乾坤之無為八之字暗指物八以字暗含神此言伏羲八卦相錯生物成物之功一父一母三男三女父母能統御六子六子能承順父母長男長女功在生物中男中女功在長物少男少女功在成物父母或以無為而用六子之有為六子或以乗權而成父母之謝事各盡其職各效其能遂成開闢來第一人家此易之道也聖人作易是為千萬世立身成家者皆凖諸此以作家範寧直家人一卦而已哉六子之功皆乾坤之功六十四卦皆從乾坤出右第四章此文王圓圖以帝字為主上節乾坤分立此揭帝者以乾統坤也或問乾與帝一物也帝既主張八方而西北之乾又分治八方不㡬君行臣職乎曰出入之帝全體之天也西北之乾一節之天也如天子之邦畿與列國分治而天子威令則豈限於邦畿乎此章首震即行夏之時造化之妙最不易言自出至成創設虚象形容實化借喻竒險寄意真切就方位見時令就時令見物化就物化見真宰出也齊也相見也致役也說也戰也勞也成也皆帝也此因文王圓圖帝出乎震八句孔子解之雖八卦震巽離坤兌乾坎艮之序實春夏秋冬五行循環流行之序也程子曰八卦之位所以定者在坎離也坎離又不是人安排得來莫非自然也又曰隂陽消長之際無截然斷絶之理故相攙掩過終始萬物萬物成乎艮此儘神妙須研窮這個理八卦非言時則言位時位都一般意獨於坤言地不言時位者何也坤徳博厚配地不欲以時位限之猶乾之位雖偏西北而乾之主宰為帝則非西北之所能限者也八卦皆不言人事獨離言聖人向明而治舉其所重言也本義云此章卦位未詳來矣鮮云天地定位雷以動之二章言伏羲圓圖之對待第五章帝出乎震二節言文王圓圖之流行此則總二聖之圖而言文王之流行必有伏羲之對待而後可流行也葢二圖分不得先後如天與地對待也二氣交感生成萬物者流行也天地有先後哉男與女對待也二氣交感生成男女者流行也男女有先後哉所以伏羲文王之圖不可廢一孔子所以𤼵二聖千載之秘者此也此節乃總括上四節二圖不可廢一之意劉念臺亦謂並無所謂文王後天之圖之說也豈文王以前獨不得有四時八節乎右第五章神即雷風之𩔖妙即動撓之𩔖以其不可測故謂之神來矣鮮曰以文王流行之卦圖言之雷之動風之撓火之燥澤之說水之潤艮之終始其流行萬物固極其盛矣然必有伏羲之對待水火相濟雷風不相悖山澤通氣然後陽變隂化有以運其神妙萬物而生成之也若止言流行而無對待則男女不相配剛柔不相摩獨隂不生獨陽不成安能行鬼神成變化而動之撓之燥之潤之以終始萬物哉鄭康成曰共成萬物不可得而分故合謂之神張子曰一則神兩則化妙萬物者一則神也張南軒曰八卦各有所在也神則无在而无不在各有所為也神則无為而无不為強名之曰神即其妙萬物而為言者也楊龜山曰離帝而為神則其運无方其居无迹此皆至論程沙隨云六子之才各有所長六子之情各有所合才情二字用得好才情皆神之表也蒙引云兩則化一則神六子得耦者兩也變化成物者化也兩化之合一不測處則神也或問六物皆是動氣安見得神之妙處曰神本合一不測自然之妙終是静邊意多物常易而神不易故也周子見得此理故言主静立極極即太極也静者太極之體也有體斯有用矣神即帝之靈總挕雷風之𩔖而其妙在及物處愚嘗謂易之統體只是一道任從何處領悟无不可㑹到本本原原之地如神妙萬物而為言只此一句盡易之藴矣寧直盡易之藴五經四子之藴盡是矣羣動只是一原妙物本之无物此隂陽之變化所以无方而萬物盡歸其陶鑄者也神哉易乎妙至此乎右第六章此言八卦之情性乾純陽故健坤純隂故順震坎艮陽卦也故皆從健巽離兑隂卦也故皆從順健則能動順則能入此震巽所以為動為入也健遇上下皆順則必溺而䧟順遇上下皆健則必附而麗此坎離所以為䧟為䴡也健極於上前无所往必止順見於外情有所𤼵必說雖云八卦之性情實以直指人心之體學者於此而真能領㑹則八卦之性情不在八卦而在我矣右第七章逺取諸物馬牛等根健順等來為者千百中摘取一二之辭後倣此如此看方見易道之大取物謂聚衆物之靈得人道焉邵子曰以一物之物為萬物之物者人也以一人之人為萬人之人者聖人也右第八章近取諸身首㑹諸陽尊而在上腹藏諸隂廣而有容足在下而趨躍股兩垂而隨動耳藏聰以為聴目含光以為明手善按止口善容說取身謂聚衆體之靈得心焉心無體以衆體為體此二節見天地間凡形體可舉似者無一而非八卦之所為也故吾身非吾身也首也腹也即乾坤也足也股也耳目也手口也即震巽坎離艮兑也萬物非萬物也馬也牛也即乾坤也龍也鷄也豕雉也狗羊也即震巽坎離艮兑也知此則我飲食寢處於易中尚煩索易於易哉右第九章此章推父母六子所由名二老上下象天地位六子兩旁象萬物育天地萬物皆備於人矣孟子曰舜明於庻物察於人倫乾上坤下父子君臣夫婦三綱之象也六子旁對兄弟朋友之象也故敘曰天敘秩曰天秩明其本乎天也六子皆自乾坤而生故稱父母索者隂陽之相求也三男皆坤交於乾各得乾之一陽而成男是謂隂生陽三女皆乾交於坤各得坤之一陽而成女是謂陽生隂此見隂陽相生一體無間處子復生子萬世莫替真是克家之男當門之媍家人卦父父子子兄兄弟弟夫夫婦婦家道正而天下定矣分之為各家之乾坤六子合之為太極之乾坤六子其義一也右第十章此章廣八卦之象八卦當各以首句為主首句根上章天地定位山澤通氣雷風相薄水火不相射來正象也餘皆根上則旁象也都要見舉其例意且見斯道雖小必察隨物各足隨物變易非苟然也為字當玩為云者摘其一耳物物皆有乾道理皆有坤道理兼有所統而專有所屬此便是上下察意思又見天者乾道之為坤者地道之為等意葢乾坤等以性情言天地等以形體言器不離道器非道之為而誰為故以此章繼神妙萬物之後以廣性命之理欲人知理一分殊萬物皆備於我而兼體之且全經立象𩔖從淺近使人易曉道體原不分亦不容不分各卦中從至巨說到至細真是洋洋優優語大天下莫能載語小天下莫能破無非教也欲人須臾不離而後其道出人入天與神妙萬物者一矣或者乃曰俚俗雜亂不可盡用是未知易之道也本義荀九家者朱子曰荀爽集九家易解十九卷蔡虚齋曰九家蓋指漢淮南王所聘九人明易者撰道訓二十篇號九師易天地間凡萬物之生成變化總八卦之所為也八卦之性情各異故所生之物自各從其𩔖也聖人偶拈此象以廣之亦以例其餘耳非謂廣止此也神也者妙萬物而為言八卦之神不可見而萬物其象也任舉一物焉莫非八卦所變現而出八卦一隂陽也隂陽一太極也一物各具一太極萬物統體一太極太極本無極易道之所以無窮也右第十一章序卦傳序卦是流行之易雜卦是對待之易聖人易理透徹順看翻看都是道大約不出相反相因此造化尅生理也呂氏要指曰上經以天道為主具人道於其中下經以人道為主具天道於其中三才之道坎離最為切用故上下皆以坎離終焉六十四卦无一卦无乾坤坎離者竒即乾耦即坤相間即坎離之理雜卦傳來矣鮮曰雜卦者雜亂文王之序卦也孔子將序卦一連者特借其一端之理以序之其實恐後學顛倒文王所序之卦也一端之理在所緩也又恐後學以序卦為定理不知其中有錯有綜有此二體故雜亂其卦前者居其後後者居其前止將二體而卦有錯有綜者下釋其意如乾剛坤柔比樂師憂是也使非有此雜卦象必失其傳矣雜卦大象合解乾剛坤柔乾坤正對經首乾坤二卦乃健順自然之純徳健也而純順也而純皆所謂一也大象自強不息厚徳載物一健順而已矣乾坤取象龍馬各有攸當若神龍而牝馬之龍固无所用其飛騰而任重負逺之技龍將歉焉若牝馬而神龍之馬固无所效其負載而興雲致雨之能馬何知焉此坤道乾道之定理也比樂師憂比師反對正看是師反看是比餘卦倣此師憂者險在内也險在内故君子以容民畜衆比樂者險在外也險在外故先王以建萬國親諸侯臨觀之義或與或求内臨外為大臨小隂臨陽為上臨下上下相與故曰臨與也觀以九五一爻為主大觀在上順而巽中正立極下觀而化取求我也象之教思容保與以不與也省觀設教其諸異乎人之求之與屯蒙列乾坤之後次以三男震建侯經綸長子事也坎剛中克家次子事也艮柔巽志應少子事也有長子代父長弟次兄之象少男童蒙待𤼵則坎九二之任乎建侯有君道焉包蒙有師道焉天地既位君師立矣屯則天將旦而晦之時王者興而厄之㑹居貞二字乃康屯大作用故曰見而不失其居蒙氣渾而未分靈含而未剖養正二字乃發蒙大功夫蒙原具亨之性因而達之與復不同故曰蒙雜而著震起也艮止也震之為物雷也一陽鬱二隂之下振奮而出有轟裂之象故震之於人多功若觸之而晏然木石也象言恐懼乃君子本色而遇變増惕修之身省之心無所不用其至此聖人之學問也艮取背五官有欲而背獨无欲五臟皆係於背艮義也人之止一如其背是為真止真止者動而無動静而無静君子以思不出其位感應兩忘萬變而不出其宗此聖學極地損益盛衰之始也損反得盛益反得衰故曰始也損象山澤澤動則損山山傾則損澤以損下則上下俱損也象以之懲忿窒慾忿生於怒故懲如摧山欲生於喜故窒如防水損之又損則無之而非益矣益象風雷雷震則益風風怒則益雷以益下則上下皆益也君子以風雷自厲遷善若風速改過如雷迅益之又益則長益而不損矣大畜時也无妄災也謂畜雖大而俟時不可驟也象以多識前言往行夫前言往行盡古今之人情物理而慎思明辨以畜其徳則剛健篤實輝光之㫖盡矣妄雖无而防災不可忽也象以茂對天時順肓萬物因乎自然無所容心古帝王後天而奉天時静正調爕用此道也萃聚而升不來也聚而不散壅也往而不來蹶也聚之道主通隔而不通何名為聚順以說而天地萬物之情遂矣惟盛也故聖人貴未然之防焉除戎器戒不虞安不忘危也升莫妙於木木之升自然而不可強不自知其生人亦不見其生故象曰積小以髙大若暴徳逆行凌厲不孫未能升而困隨之矣謙卦九三以一陽主五隂卦之所由以成也夫以乾坤純卦不能有終而謙能有終者一陽止於坤下不盡乾坤之用其用无窮也豫主九四一爻合五隂之應其志得行天地以之則隂陽正聖人以之致治則中和政成以之作樂而神人悦服然謙以卑己豫易溺人故雜卦云謙輕而豫怠也葢亦抑戒之意云噬嗑食也賁无色也葢天下大事小事所以不得合者皆有強梗讒邪間隔其間如頤中有物而決去之則和合而亨矣故利用獄賁以隂陽交錯成文為義而文明以上則非光被巍煥之文以無色為色也明庶政明也非行也若折獄自非其事矣兑見而巽伏也分内外之道也兑說剛中柔外外雖和悦内實剛正説之貞也象言兩澤麗滋君子以朋友講習講象兑習象重兑講習說之至也巽入也順也重巽則全以順為道君子以申命行事審命於未𤼵之先申命於既出之後事則命非空言行則申非瀆示身正而令行矣隨无故也蠱則飭也葢人生无事最怕多事有事最怕廢事向晦入息君子以之息静藏動順時節用正行旁行皆是道也振民使不惰驅外邪象風育徳使不竭養元氣象山六爻有振育之意剥爛也復反也遯姤否觀皆隂長之卦至剥而極君子於此時在制小人上用力不使成材以求安民利物救得一分是一分本固則邦寧剥可回也十月純隂隂藏无用矣到冬至子時一復而天心見不獨陽爻本身反位元吉即諸隂爻一齊都有生意蓋獨隂不生不行得一陽撥動故皆言復只是陽甚㣲聖人教人安静持養以順天時則生意完固矣晉晝也明夷誅也晝則明言得時也聖人一字有許多藴畜君子自昭明徳懋本也心體本明自明其明即極之於昭光被百辟覲光景從亦自完其心量而已明夷地掩日時也聖人不能違時而能為時象用晦而明養明於晦以為體也藏明於晦以為用也用晦而明乃大物不得而窮之矣井通而困相遇也一以塞而得通一以遇而成揜井之徳天而其用人也静而動其出不窮利天下而不尸其功君子法井之象制為井田用勞使自養也勸相使相助也惠而不費利莫大焉一井之養而不窮也困剛受揜也險在内不可避也處險能說則困而不失其所致命遂志以命還之天窮通得喪非我所與也審意之所當然而遂之非命所能制者也困之貞而亨以此咸速也恒久也言感應之遲速下經首咸山澤通氣也位欲分氣欲合故山澤合為一卦以少男下少女又應之至者象以虚字當咸最妙人心之寂而能感者虚故也男女正位終身不易故恒以長男長女相應繼咸象言雷風恒至變也雖酬酢萬變妙用無窮而其所立有卓然不易之體焉渙離也節止也渙之時為離散之時而渙之用有釋險散難之用合祖考之渙即以聚人心之渙大象風行水上則水散風水无涯神氣无不在祖宗魂氣亦无所不之皆散也享帝立廟則萃渙合離之道莫有重於此者矣天地人之道曰生不得節則生者不能成成者不能復生也蓋道過則害盡則窮節制也所以通道於不窮也澤節水不泛不溢君子制數度因數以起之度使等級明而歸於中議徳行由徳而見之行如隘與不恭議之以歸於中則制身範世凖此矣解緩也蹇難也夷險之𫝑也解蹇難解散之時否結方釋先以安人心持大體為務故象以赦過宥罪當之若當蹇之時君子固无時不自修而患難險阻之中倍切自反責己不責人一語是聖賢極地睽外也家人内也外睽者内不足蓋世道人情窮則有睽之時象取同而異天下之理原同也而用與時行事隨地起在同而異乃所以同也裕於内者推於外象取言有物行有恒蓋言行可以飾天下而不可以飾一家一正家而天下定文中子所取於明内齊外之㫖也否泰反其𩔖也看否泰二卦只在一交字天地交而萬物通二氣和百昌遂也自乾至履隂陽爻各三十乃泰是乃以隂陽无過不及而成也反其𩔖則否矣包荒與休否主泰否者也大人之道不可不知財成輔相與儉徳辟難時有否泰一致也大壯則止遯則退也一善於處盛故非禮弗履君子所以善全其壯也一善於處衰故逺小人不惡而嚴君子所以善於用遯也大有衆也同人親也同人明在下僅以𩔖族辨物大有明在上君也物无不慴用以遏惡於未萌揚善於既成所謂應乎天而時行易卦首乾盛泰不免亢亂之乗惟大有六爻皆吉則君徳之所貴可知也革去故也鼎取新也革非滅也乃變也澤中有火言火革澤也邵子曰有温泉无寒火言水能隨火熱火不能隨水寒是陽能勝隂處此革之取象也治歴明時知四時寒暑之變中有數存焉而非聖人之有意乎其間也鼎之器至重而其用大也有隂陽之調焉用能恊於上下人君革命之後丕變人心故取象於鼎恭已正位而宇宙之和從此懋維新之命自此凝矣小過過也中孚信也一過之小一善之大小過四隂在上下可為小事不可為分量外大事總是退一歩法上乗陽逆下承陽順君子以過恭過哀過儉是過於收斂一邊聖人人處衰世道理亦小之亨而吉者若大過則獨立不懼遯世无悶可以對看中孚言誠也卦二隂居中虚也虚則無我二剛得中實也實則誠神明之舍不虛未有能誠者也不誠未有能孚者也楊誠齋曰風無形而震川澤鼓幽㝠誠無象而動天地感人物誠之至孰有大於好生不殺者乎議獄求入中之出緩死求死中之生然後盡於人心中孚之至也議兑象緩巽象豐多故親寡旅也震上離下象王者其明如日其威如雷光天之下靡不輝煌此豐之象豐則自盈必至於虚易戒人主全在盈虚消息四字象言雷電皆至明繼並行其用甚大以折獄象照以致刑象威明而動動无失矣明政刑正以永保此豐耳止而麗乎外旅義也山火偶延旅象也聖人見難處者旅之時難盡者旅之義象以之用刑眀象離慎象艮眀察慎審刑祥也不留不稽剖決如流也不留獄象山不留火也崔後渠云旅與獄皆非可乆處也離上而坎下也水火之性義取其交上經首乾坤終坎離皆以交而相濟不交則否矣象明兩作離旦旦相承其照无窮坎象習坎君子以常徳行自治也習教事治人也坎中為誠離中為明明誠起於中易之妙用古聖賢之心學也正對乾坤而外坎離頤大過中孚小過凡八卦餘五十六卦皆反對小畜寡也履不處也行止之分二卦皆以一隂處亢陽之世文王之卦也故其辭憂而危而履更甚則三與四之位不同也履之六三其羑里之傷乎小畜之六四其賜弓矢之日乎文王道大而時艱於二卦盡處患難之道以懿文徳文明柔順之謂也化亢禦暴若風之柔而入故曰衣冠可以止盜小言隂言臣非並其徳小之也辨上下定民志使各當其分則一極立於上萬變息於下需不進也以剛遇險非不決之需乃見險而未可動能動而能不動者也飲食宴樂静正安閒需之義也訟不親也内險外健情不可測作事謀始惟理之明自无終訟之失頤養正也大過顚也頤震下艮上二陽包四隂陽實能養隂虛不能養故四隂多求養於二陽君子觀頤之象慎言語節飲食以養徳也養之大者也先儒云禍從口出患從口入慎之節之貞之謂也大過巽下兑上四陽居中過盛二隂不勝其重有顛敗之虞然時可有為君子觀象而救敗治橈用則獨立不懼不用則遯世无悶此所謂大過人之行也夬決也剛決柔也以五陽去一隂易易耳君子不敢有易心焉不恃剛之健濟以兑之説故象以施禄及下居徳則忌姤遇也柔遇剛也陽氣暢生之時一隂初來乾終坤始天地相遇乃亨嘉之㑹故象以施命誥四方漸女歸待男行也歸妹女之終也六禮備而後行女歸以正也人之一言一動理所當然出之无序悔吝滋生惟内止而靜則心不躁而清外順而和則行有禮而節君子以居賢徳象艮善俗象巽俗之善也匪朝伊夕所由來漸矣婚嫁女之終生育人之始何以凶而不利蓋悦而動始合不正終則必乖乖而圖之悔无及矣故知敝早圖不以私情為合乃所以永終也兑為毁折有敝象既濟定也未濟男之窮也既濟未濟男之終始取交濟之用自泰而外未有如既濟之隂陽得位應正者而曰亨小蓋天道人事處夷則變居安則危其可憂方大象言水上火下成功者火也火烈水溢滅火者水也君子思患而預防之所以善保濟也患難險象水思通明象火崔後渠曰易患坎險不患離明天地之道終則有始既濟為終而未濟為始始者息之義也火在水上各居其所不相資為用聖人象之辨物如水火之有性居方如上下之有别以慎行之察㣲致精物聚以𩔖方分以羣俾不相侵奪未濟而求其濟則其亨也大矣劉念臺曰按易正對八卦餘皆反對以反對之義權之五十六卦實二十八卦所變二十八卦又自坎離六卦所變坎離又是乾坤所變中孚小過者坎離之純氣頤大過坎離之盛氣坎離者乾坤之中氣當時文王悟得此理遂以之序卦以見隂陽相生不已之妙却又還來只是乾坤而坤復統乾六十四卦只是一卦只是一爻讀易大㫖卷四
