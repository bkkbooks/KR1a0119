body:
  text: 讀易大旨卷一容城孫竒逢撰上經乾下乾上易有六十四卦是易之六十四大乾坤世界也易有三百八十四爻是易之三百八十四小乾坤世界也分言之一卦自為一卦一爻自為一爻一世界自為一世界不可得而同也約言之六十四卦之彖辭爻辭而總括之六十四象之大人君子以人合天之事故夫子曰吾道一以貫之中庸曰其為物不二伏羲之畫卦首乾而坤即統是矣文王之卦辭首元而亨利貞統是矣乾之四德終始萬物資始者無物不有也統天者無時不然也無物不有無時不然此乾元之所以為大也彖傳是夫子贊天人合一之理藴大而義精然言天道而配以聖人何也蓋天下之理得而成位乎中則參天地者惟聖人也乾六爻皆取龍象然六龍總只是一箇龍德特乘時而動不同耳是故居初則乘潛龍居二則乘見龍居三乘惕龍居四乘躍龍居五乘飛龍居上乘亢龍蓋皆乾道自然之變化聖人特時乘以御天是故一物各其一乾元是性命之各正也不可得而同也萬物統體一乾元是太和之保合也不可得而異也故曰大哉乾元萬物資始非統天而何乾天德也天則之流行變化不可測度故乾之羣龍可得而見也乾之羣龍無首不可得而見也用九者能真見羣龍之無首則自然首出庶物而萬國咸寧矣易莫重於象用易莫重於尚象君子以乾自治非強則與健不相似息則與行不相似故曰自強不息非天行之健在彼而君子倣之於此也不息則天有息則人天人之分係於一息幾微如此雙湖曰大象皆著一以字即以字示萬世學者之凖易之道天人一體之道也初九潛伏九二施普地之德也或曰位有顯晦之異則初晦二顯故曰在下曰施普九三反復道九四進無咎人之德也或曰位有進退之異則三退四進故曰反復曰進九五大人造上九不可久天之德也或曰位有作止之異則五作上止故曰造曰不可久此之謂時乘六龍以御天末又以天德不可為首結言之凡爻皆用九乾六爻皆九是為天德乾為天德所以居六十四卦之先也乾坤之有文言也其道大非可以一言盡其事博非可以一德守故申重諄切以别於他卦朱子分為六節第一節申彖傳之意其言曰天地之間本一氣之流行以其流行之統體而言則但謂之乾而無所不包以動靜之分然後有隂陽剛柔之别故乾一而有四象在天以之為四時在物以之為四氣在君子以之為四德在人日用常行以之為四行皆此也分言四也合言二也又合言一乾而已第二節申象傳之意本義曰乾卦六爻文言皆以聖人明之有隱顯而無淺深又曰內卦以德學言外卦以時位言合而觀之以有隱顯言則內之進修其德學者以時位之隱也外之時行其德學者以時位之顯也內外均也但內重進修故先德學外重行故先時位爾以無淺深言則六爻皆聖人也亦以隱顯異故見其為象異爾初九在下體下承上養潛德而已故見其不易不成無悶行違不可拔即不可拔則不至於上亢可推也九二則出潛離隱德學已彰顯矣故利見在五之大人信謹間存不伐博化此亦一大人彼亦一大人其相得而應用可推也九三德學可成見在進修不驕不憂適在不安之位故曰因其時而惕九四德學備矣以陽居隂位非所安故或以躍上下進退惟義所適惟時所合故無咎九五大人化矣天德位矣成性聖矣故既曰利見大人又曰聖人作而萬物覩亢龍以位盡為言若聖人則不失其正何亢之有第三節再申前意總是隨在而有所安曰下曰時舍曰行事曰自試曰上治與時偕行虛中無我五爻之辭不同而旨一也亢龍有悔亦易道之災也聖人所以通變於未窮也乾元用九天下治也非乾元豈能用九而不為九所用能用九則隨時而應各當其所在初而潛在二而見在三而惕在四而躍在五而治在上而不亢故曰天下治也第四節又申前意時隱而隱初九養微陽以俟長於後日故潛藏時顯而顯九二得中而昭德輝於天下故文明天之行以時也九三以體性剛健而終日偕行乾之革以時也九四體變達化而乾道乃革九五以天德當時用則德與位稱曰乃位上九處時極不能自反則動必有悔曰偕極此各爻之象皆時也然而乾之時天時也故總結之曰乃見天則天則非人之所為也一屬人為非天則矣第五節復申首章之意元亨利貞前既分而四之矣今又合而一之與夫彖言乾元以統亨利貞之旨同也天地間安得有二道哉苟分元亨利貞以為四者而非一亦安能知元亨利貞乎性情者乾元之性情也元亨利貞皆性情也故又曰乾始能以美利利天下變元而曰始又通之於利是道也何所不利倘曰利於此不利於彼利於一不利於十百千萬何以謂之乾何以謂之易乾者易之異名元亨利貞亦易之異名故又云乾始與獨曰乾無不可者大哉乾乎剛健中正純粹精也此七德者非果有七體也一性情而已六爻擬議各正性命其乾德旁通不失大和而和且正也第六節復申第二節第三節第四節之意程傳云德之成其事可見者行也初潛隱而未見功未成非德未成也其行已裕矣至二則有可見可行矣故以仁行言之至三四則皆重剛不中之地三危四疑雖可見於行而危疑有未易行者君子則於三重剛即以其所言學者而乾乾夕惕雖厲無咎也亦行矣於四重剛即以其所言學者或進或處雖疑亦無咎亦行矣至五德成大行矣渾然與天同體與天同用日日行而不見其行之迹上九行之過或至於亢故知之而不過則正矣所謂日可見之行者如此而已蒙引曰文言申象傳雖是反復申言其實前後互相發明初曰隱二曰下三曰潛藏下即明隱也潛藏即明下也惟隱於下而潛藏則他日之為見為躍為飛為不與時位俱亢者即此龍也至末則以其德可出而時亦可出言之也六爻反復申言皆互相發明自天子以至於庶人自聖人以至於衆人皆有用處初非局定以乾六爻來摸擬聖人也孔子亦未嘗以乾六爻專為聖人也但其意以為此是純陽之意若就人品上論則為聖人之象耳學易者而至於是是亦聖人矣雲骨子曰元亨利貞雖云四德要知是占方不失文王之意初九潛龍勿用初九數也潛龍象也勿用其占也上九亢龍有悔上九數也亢龍象也有悔占也所謂觀其象而玩其占者觀此玩此而已矣餘倣此又如終日乾乾夕惕若占也而象在其中矣履霜堅冰至象也而占在其中矣餘可類推也易生於數卦詞爻詞俱有象占象所以象數占所以處數象如冬日夏日處如飲湯飲水每卦大象必曰君子以云云要知六十四箇君子只是一箇人此大用易之説夫子以此求仁張湛虛嘗云讀易只把玩白文却自明白聨貫乾元以資始統天至六位時成天之元亨利貞時乘六龍以下聖人之元亨利貞若從御天下將乾道又説到天上非矣鄆日初又以統天御天總専其責於聖人謂彖不顯言聖人以天即人人即天言聖人猶二之不言聖人則乾道總人道大明首出直揭聖人之能事又何事更言聖人乎此雖與諸家説不同與湛虛互相發也若一味贊乾元便非作易本旨坤下坤上乾健也坤順也言健而順在其中矣非健而復濟以順也言順而健在其中矣非順而仍加以健也此固至順至健者之所自有而無庸補助於其間耳故乾曰元亨坤亦曰元亨但乾曰利貞而坤則曰利牝馬之貞夫此牝馬也視龍之變化飛騰為何如而坤獨利此者則以此為坤之貞故也坤為輿非乾不運乾坤並行其為元亨利貞一氣也彖有三無疆所指不同總以釋坤全體配乾言也君子觀坤之象以厚德載物地德無疆無所不載君子之載物只不為物所動則無所不容一為物動與物為伍且將為物所載矣尚安得而載物乎君子之厚德即坤之厚德有纎毫之異終不足以言厚德初六履霜言五月微隂始起至十一月而堅冰至智者於未至之時而知其必至也故於念慮之微而謹之愚者則曰未必至此故卒罹其禍君子以此治已以此治人六二直方直者不曲而已方者如物之方不可轉移而已曰直曰方皆形容道心之言非有二理也此道甚大乃人心之所自有不假修習而得象辭以動為言惟動乃驗其實於應酬萬變而未嘗不直不方者地道之光如此人道之光如此六二正居下卦之中於是發明坤道之正六三含章臣之盡言於君含章疑其非道然臣道當盡其終不當専其事專成犯禮非易之道也易每言光惟其知之光大故能含晦昧淺暗之人有善惟恐人之不知豈能含章也東萊曰大凡人出來做事多被人疑忌只為預先多露圭角不能含章惟含章然後以時發初不是兩件事六三含章六四括囊皆取含蓄不露之象三以柔居陽猶或可出而從王事四以柔居隂惟有括囊之愼以求無咎無譽六五黃裳元吉程傳曰坤雖臣道五實君位故為之戒云黃中色裳下服守中而居下安其分則元吉文在中也於以明君子之黃裳非作於外者中心之所為無纎毫矯飾之意文不足貴而在中之文乃足貴也地道光知光大文在中總之一德輝而已上六楊敬仲曰隂至上六幾不復有陽矣然陽雖甚微不可滅也但當其時人惟知有上六而已豈復知有陽哉聖人惡其無陽也故特稱龍以見其猶有龍在血隂物又稱血以明上六猶未離臣類隂陽俱傷不獨陽傷也聖人故以此折天下無君之心坤之用六即乾之用九其道一也居九而為九所用不能用九故至於亢居六而為六所用不能用六故至於戰然則易之道豈可一日不明於天下哉程沙隨曰乾以元為本所以資始坤以貞為本所以大終用九剛能變柔天德也天則也用六柔變剛剛大終也地道也效法也效法者法天也此坤之配天也止以乾道為天不知坤道之即乾不知易者也文言第一假申彖傳之意胡雲峰曰乾文言釋元亨利貞自元而亨而利而貞乾以君之所主者在元坤文言則首釋牝馬之貞自貞而利而亨而元坤以藏之所主者在貞蓋坤代終成物主貞故首言之而後利亨元坤本配乾故貞利亨元皆配乾元亨利貞非有乾元亨利貞又有坤元亨利貞也此在乾剛自下而上坤柔自上而下木象文王本意而夫子言之下六節申六爻意積善之家張子曰餘慶餘殃百祥百殃與中庸必得之意同善者有後不善者無後理所當然乾進修坤直方進修曰忠信修辭立誠直方曰敬義敬配忠信義配修辭立誠體用一原也李氏曰文言字字皆有位置非苟然也乾二誠坤二敬誠敬者乾坤之别先儒誠敬之學起此乾二仁坤二義仁義者隂陽之别先儒仁義之用取此有美含之謂為臣之道有大美而不能含藴者矜也含而不從王事者吝也從而自有其成功者驕也故聖人三致意焉天地一氣也一數也一道也時泰則天地變化方其變化雖草木猶蕃時否則天地閉及其閉也雖賢人亦隱時勢至此避禍不遑謹固易之道也黃中通理言中德之在中者感而遂通一一各有處置見中德不止在中居體暢發正其通理處正位承中字居體居字與居之無倦居字同以存主言也美在其中贊中德之妙或曰乾九五曰大人坤六五曰君子則六五為輔德攝政之象其伊尹周公謙恭孚先之道乎龍戰于野隂初之敵乎陽欲變陽玄而為隂黃也故曰玄黃者天地之雜也然以天陽地隂之定分言則天自玄地自黃終不可以雜也此雖疑之無益也所以重戒上六也楊龜山曰君子敬以直內義以方外夫盡其誠心而無偽焉所謂直也若施之於事則厚薄隆殺一定而不可易為有方矣敬與義本無二所主者敬而義則自此出焉故有內外之辨其實義亦敬也故孟子之言義曰行吾敬而已震下坎上屯者何天地造始之時也造物之始始於冥昧故曰草昧乾以一陽來居坤下是剛柔始交也而坎水生其前則是剛柔始交而屯難生矣元亨以下濟屯之道以其有能動之才故元亨曰利貞勿往是申戒之以期善動也曰建侯見動不可無主也利貞勿用七字作一句讀一正一反無兩意彖曰動乎險中大亨貞夫在險之中而能動固無不亨亦未有不以貞者不貞之動非動也且不能動乎險之中也理屯如理絲固自有其緒建侯其理之緒也不得其緒徒擾益亂不寧者不遑寧處也盛世不忘警戒况於屯之時乎君子之濟屯也有道焉經而綸之舒徐而理之不理之不可急亦不可經綸正理屯之道也是道也即雲雷之道其有毫髮與雲雷不肖者終未能盡經綸之妙也初九乘時而動不能不進又不敢遽進居貞如常守正如故若磐若桓不移一步而人自往歸之故曰雖盤桓志行正也言其志行之正自足以震動一世民不能舍之而他往也胡仲虎曰卦辭有專主成卦之主而言者卦主震震主初盤桓即勿用有攸往利居貞即利貞卦言利建侯其事也爻言利建侯其人也六二以柔正乘初之剛正所以屯如邅如乘馬班如若是其難者二本貞正自守未易見字於初苐無奈初為當世之所歸往我又與初相比難久必通十年乃字反其常理以聖配聖以賢尚賢亦必有道與六三處逐鹿之世日夜冀望庶幾得之然上無應與是無虞也無虞胡為乎林中所以不如舍之為明耳六四則明矣夫當屯之時豈更有當求如初者乘馬班如求此婚媾往吉何不利耶然則初九真主也九五陽剛居尊位而膏澤不下及未有強輔故施未光大不光不足以盡大者之道當大而小與當小而大皆非上六東坡曰三非其應五不足歸不知五之不足歸惑于近而不早自附於初九故窮而至於泣血汪本鈳曰初與二為婚媾正所謂剛柔始交者天作之合不字又何待乎必與五相應不得矣坎下艮上山下有險遇險而止蒙之象也蒙亨言不終於蒙也初筮指九二以剛中故告三則應乎上四則隔乎三與剛中發蒙之二不相應與則志不應乎我而不相孚契故不敢徇其再三之瀆庶幾有愛敬之地而終之以正此皆亨蒙之道故曰蒙亨以亨行時中也蒙之義主之者九二彖之所論皆二之義教者但觀蒙者時之所及則道之此是亨行時也此時也正所謂如時雨化之如既引之中道而不使之通則是教者之過當時而道之使不失其正則是教者之功養其蒙使正者聖人之功也龍溪曰山下有泉本靜而清水之源也不決於東西不汨於泥沙順而導之自然可達於海君子發蒙之象果行以育其德水行而不息故曰果山止而不撓故曰育夫純一未發之謂蒙蒙者聖人之基也自蒙之義不明世之學者以蒙為昏昧妄意開鑿助成機智汨以泥沙之欲決以東西之趨反使純一之體漓清靜之源窒非徒無益而害之也初六發蒙宜刑人以脫桎梏天下以桎梏為美而好之者多矣使皆知桎梏之為桎梏則亦豈肻自囚自束而甘於困憊耶故發蒙之初法不可不正正法所以脫桎梏也九二以下卦之中主卦剛中之德發天下之蒙者也發蒙在寬如取必太過攻治太深可者與不可者拒烏能成治蒙之功子克家以子任家必剛柔得中乃濟不可嚴厲也六三不中正是蒙之最邪媚者見金不見身中士羞以為友見金夫不有躬取女者寧不愧死耶蒙之六爻二陽為治蒙者四隂皆蒙者也六四隂暗之甚自以為是不應乎陽明故曰獨逺實也實者行道而有得於心也與實逺與吝近矣六五柔順居中舍已從人故九二以包蒙之吉成六五童蒙之吉而後六五能以已之童蒙順以巽入於九二之包蒙然則二與五之無不吉也固宜上九不嫌於剛剛居上則不中惟有擊之而已治人之蒙乃禦寇也肆為貪暴則為寇也禦寇而至於為寇上失其道禍且甚於寇矣以是知有教則必有刑刑非無因而設也故曰利用刑人以正法也利用禦寇上下順也聖人欲人作聖而施養正之功於無可奈何之地固如此金伯玉曰童蒙者大哉之元勿用之潛于是焉寓求我者求此初筮告者筮告此利貞者利貞此時中者時中此養正者養正此也然則所謂初筮告有二焉一則聖人循循善誘之方憤乃啓悱乃發舉一反三乃復迎學者急筮之心則告之一告則亨平日疑圑一朝立破而人我渾然之體自在也健莫健於此矣一則聖人使民不倦之法未施哀而哀未施敬而敬可由而不可知迎民欲筮之心則告之一告則亨羣黎遍德帝力胥忘而上下恬然之理自存也順莫順於此矣乾下坎上此卦能需在孚貞孚指心而光亨亦指心至貞利則屬事矣天位云者有是德應有是位曰位乎天位則光亨吉之意也正自貞中自孚而光亨吉自隨之有何險之不濟乎君子所以飲食晏樂者身安無所營為心愈無所謀慮此蔬水簞瓢之趣味寧直日用飲食之微為人之所必需哉剛健之才不難於濟難而難於不犯難初九需于郊不犯難而行矣苐恐人情喜動而惡靜能暫不能久有失常心故以利用恆無咎告之所以戒初也九二需于沙夫沙非水也而為水之所必至二以剛明之才寬衍平夷初不以進動其心小有言終吉所以戒二也九三過剛不安于沙反及于泥夫泥之陷人也甚于沙三但知水之不能為災而不知災在外也致寇至所以戒三也六四需于血三陽自下而進四以一隂當其前其傷必矣既傷于險難能需而退聽出自穴六四所稱能順以聽九五之指示故絶無他爻乾健隂亢不能待不能聽之象九五身在險中而忘其險履道坦坦酒食是需亦猶困之九二身處困中而忘其困此處需處困之至德要道也有孚光亨位乎天位不亦宜乎上六處坎之上時將出坎乃不能需而反入于坎陷之穴猶幸有不速之客來也蓋九三應上本是上客今三敬愼不敗已出險而來矣來則敬之亦可以保終吉也來矣鮮曰坎體誠信充實于中孚之象也光者此心光明不為私欲所蔽也中爻上互離光明之象亨者此心亨泰不為私欲所窒也坎廣卦為通亨通之象也貞者事之正也八卦正位坎在五陽剛中正為需之主正之象也皆指五也坎水在前乾健臨之涉大川之象也孚貞者盡所需之道光亨吉利者得所需之效需若無實必旡光亨之時需若不正豈有吉利之理坎下乾上訟之為卦上剛下險險而不健未必成訟既險又健訟於是乎成嘗聞之訟者之辭無情之辭也大易又云有孚無情與有孚正相反或曰無情者不得盡其辭大畏民志所謂有孚也九五中正大人為訟者之所利見而九二又剛來得中是以不克訟而訟自不成自不終也君子深念夫訟之不韙也作事謹謀其始興訟之端其始甚微始之不謹輕愠遽怒訟一成勢必陷于深淵而不可出也初六訟未深小有言而是非之辨已明自不必與競也人之所以訟者為已直而見詘於人故忿焉思逞是非一明則可以不訟矣九二剛來處險為訟之主乃與五為敵五中正處君位其可敵乎爻發其歸逋之善故曰無眚象發其訟上之不善故曰患掇聖人各有取義須兼之而案始定六三食舊德守素分而無求則無訟矣訟以能止為善故不妨從上不宜自主易之道惟其時而已矣九四剛而居柔有始訟終退之象惟不安於命故欲以人力爭訟今不克訟變而為安貞則始雖失而今不失也此復之道也道不逺人以私意行之故失去其私意則道在我矣九五訟元吉訟非美事然天下之事變不可得而必如舜誅四凶禹征有苗湯武放伐周公東征皆訟之元吉聖人行之無非道者天下所以無寃民也即如初以柔自安不終訟獲吉二歸而逋旡眚三從上吉四渝安貞吉皆以利見九五之大人而窒者通惕者安五之元吉而中正何如哉上雖過剛然三唯知舊德是食貞厲自居縱有王事必不敢成吾知上亦不能以自成矣嗚呼鞶帶之錫也三褫之愧也則謂上能不終訟亦可也以其猶有愧心也恐其無面目以見九五也孚窒惕中四字九二中實有孚之象誠實而不詐偽也一陽沈溺于二隂之間窒之象窒塞而能含忍也坎為加憂惕之象戒懼而畏刑罰也陽剛來居二中之象中和而不狠愎也上九過剛終之象九五中正以居尊位大人之象中爻巽木下坎水本可涉大川值三剛在上陽實隂虛遇巽風舟重遇風則舟危矣舟危豈不入淵故彖辭曰入淵不利涉之象也吉凶二句一反一正也利不利二句亦一反一正也訟之説衰世之教要見聖人有無訟之思故於九五之大人而以元吉期之崔後渠曰自訟者訟於心有二端是非也利害也天下有公是公非合理之謂公事勢有當利當害協義之謂當唯理之明不必非在人而是在我唯義之安不必利可就而害可避理義即心之同然也君子謀始者如此坎下坤上師衆貞正就在體上取義非泛言也丈人詩所謂老成人也剛中二句以卦之體德提點明白下渾融聫絡説去剛中固要緊應亦非可緩古之名將以無應而敗者多矣此彖之貞與丈人處皆在將上説王與吉無咎皆在將將者説為妙象容字根水地來水行地中有以容之則聚鑿一井則水聚一井鑿十鑿百皆然一井不鑿則一井之水亦不聚此無他無以容之無由而聚也是以君子容民畜衆初六出師之道當謹其始天時地利不如人和人和者即師之正紀律在其中矣故云凡師克在和如無紀律人安得和必敗之道也九二在師中即軍中也有衆有德有應故吉無咎見為將之善王三錫命見得君之専懷萬邦也又推明王者本意此象辭發爻辭之所未言六三輿尸程傳謂衆主也將權貴一分則二二主帥三偏禆偏禆喪師即主帥之無功城濮之戰左師右師敗惟子玉之中軍不敗然子玉帥也故敗師之罪子玉當之象所以云大無功也六四左次謂不進前而次後也蓋善戰者不以進為進而以退為進惟其宜而已矣齊桓伐楚而次於陘春秋之所與也六五用師之主凡命將自必有辭利執言使為將者奉其辭聲罪而討之也九二陽剛也長子也丈人也初也三也隂柔也柔為弟子弟子豈可使之主長子之事耶千載而下有賢將以不得專主而致敗者如郭汾陽李臨淮嶽武穆不知凡幾故三言之而五再言之上六又復言之則師之所重可知已上師之終功之成也卦曰丈人爻曰長子已嚴小人之戒而於此時猶曰小人勿用蘇氏曰小人之所由入常自不以律始惟不以律然後能以奇勝能以奇勝者其人豈可以安居哉合六爻觀之先儒所謂將兵將將與夫出師行師奉辭伐罪振旅班賞律法信任對敵臨敵無所不載者是也斯以為王者之師坤下坎上地中有水曰師師衆也能以衆正非九二剛中不能地上有水曰比比附也附之以求安非九五剛中不可蒙之剛中在下卦故曰初筮比之剛中在上卦故曰原筮下卦名初筮上卦名原筮非真以蓍草筮也剛中元永貞不是二物剛中是本體心之純也元永貞是發用德之備也上之比下必有此三者乃所稱以一人而撫萬邦下之從上必求此三者方是以四海而仰一人其來而恐後也固宜然或有獨後而不服者如萬國朝禹而防風後至天下歸漢而田橫不來酈生曰天下後服者先亡即此意大凡比之為言或以人比我或以我比人以大道為公故吉私相親昵則凶周易全書考小人比而不周比字與易之比卦及詩之克比篆形不同音韻亦異今混而一之誤也本義曰彖言人來比我是五隂此一陽象取我往比人是以一陽比五隂互相發明其義一也吕涇野云萬國曰建視天下猶一家無棄民也諸侯曰親視天下為一身無遺賢也故法之立先國而後侯恩之行先建而後親卒之感應合情分接而天下歸於一統是所謂大道為公之世也道大公而內之匪人外之無首者皆化矣是故師之畜衆井田法也比之親侯封建法也皆帝王親民以親天下親天下所以見親於天下也秦惟不知此義故二世而亡善乎六代論曰譬如芟刈股肱獨任胸臆浮舟泛海捐棄楫棹觀者為之寒心而始皇自以為萬世之業豈不悖哉初六比之始也天下萬事惟初心為正初心渝矣人誰與我惟本初心一念充之中誠無他終其有他吉乎二柔正中五剛正中德合矣而二內卦也時舍矣難進易退邈其不賔君以德比吾爰道親蓋貞固居身之珍也故不自失也三隂柔不中正而所比者自皆隂柔不中正之匪人也天地間有親比匪人而不為所傷者乎此必不得之數也五以德則賢以位則王四外比之訓行近光以從上也蓋貞而吉矣臣比上自內自外異而貞同則臣道主貞也九五為比主盡比道之善者也其所為顯比者亦曰中正而已矣三驅而不合圍前禽從失曾莫我知邑人不誡則民化於中天下為公非無我之盡如天地之無不覆載不及是矣上為隂掩遇大人而不能比是自外於大一統之盛無其始而有其終者未之前聞程子曰寇賊姦宄雖堯舜之世不能無但不能肆其惡耳邵子曰治世非無小人難乎其為小人此比道之大成也我故曰執田禽與失前禽其道一也乾下巽上卦何以名小畜也六四以一隂而畜五陽為卦之主故也以隂畜陽是以小畜大何以言亨蓋隂居四得位而上下五陽應之二五皆剛中故有剛中志行之象唯健巽剛中而又志行故能亨也志行者以六四之志因剛中而得行故言小畜而擊之亨也不然是謂見畜於小何亨之有密雲二句正言畜也施未行但未行非不行也陳潛室曰風行天上似無畜聚之理何以謂之小畜蓋風者披揚解散之意今為風矣而止行於天之上是猶有物止畜而未得解散所以成畜之小初九與四正應此不俟四之畜而自與之復者復自道言復已之道非今日而始復也二又與初相比者初應於四二比於初是牽復也非自失以從他也是二與初皆能自得也兩自字義正同九三密比於四隂陽相際夫婦之象三唯過剛不中其難進如輿脫輹不相能如夫妻反目四固無愧三何以辭罪焉六四為畜之主要必有誠實受畜之心然後得無咎而合上志合上志乃孔子釋辭專指五言之也周公指五陽孔子指五位二聖之易可見九五為六四有孚所感亦誠信攣如位尊而勢行其施溥矣易凡言富以鄰為廣施之象此成雨之時也金汝白曰四五皆云有孚是此兩爻相孚也四曰上合志合於五也四藉五以畜乾五任四而相孚上九既雨畜而通矣隂氣之盛月幾望矣益當巽順其上而德載不可少怠若又往致其畜則犯矣非其道也有所疑疑其不順也坤上六曰隂疑于陽亦此凶道也張湛虛曰小畜傳注本義似未合小畜取隂畜陽臣畜君為義以上下卦言為巽畜健以主爻言則四得位而上下應之四六隂也臣道也畜止也養也取包容涵養之意多止剛者柔用巽順以柔其剛健蓋一隂居臣而逢陽九之世所處綦難時不可以有為也只有貞固柔順以孚之道用畜所以文王善處紂終其世不為所毒也健而巽剛中而志行指巽卦言剛中九五也以剛居巽體中由四之孚上合其志得相固結志行巽之志行也密雲不雨隂畜陽上進也自我文王自我也施未行畜未成也看上九爻辭自明君子以懿文德文明柔順之謂也化亢禦暴若風之柔而入故曰衣冠可以止暴諸家以文德為小不如前言往行之大夫小言隂言臣遂並其德小之何其泥也兑下乾上履之為言行也人行乎世得其道則無往不利雖履虎尾不嘻人也不得其道則無往而利雖履平地厥足用傷矣履之道何道也柔而已乾剛兑柔不主剛主柔履剛而名履何也卦一隂五陽説而應乎乾乾為天德不可為首説以從之安處其後禮行遜出躡剛強而不傷於性情之正所謂禮之用和為貴者也柔順至此雖虎亦馴何亨如之况五位天位也剛中正天德也亨嘉之會履以和行謙以制禮名之為柔不得也名之為剛不得也總之一光明而已是謂柔履剛君子體禮以辨上下使上者安於上下者安於下則民志定矣民志定然後可以言治纂言曰上象乾天下象兑澤辨象天澤各異天不可為澤澤不可為天一柔處三介於上下之間而不溷也初九素履初陽在下初心惇固質行以言不以飾質言以行不以飾素以往乎其無所失矣素履之往則素位而行也獨行願也殆不願乎其外與九二履道道原坦坦無疑無阻而人自亂者因物有遷則由者鮮矣惟幽人志以道寧中湛其凝貞也吉已心居中即泰定幽人心宅中而定為中不自亂六三眇能視人不能履道以有能心一有能心豈必信能未能而自以為能者多矣眇也謂能視矣跛也謂能履矣虎負嵎怙勇力袒裼攘臂而疾前攖之嘻而已矣三卦主所稱以柔履剛者也位不正而能心一生偏之害大矣九四體剛居近君之位履虎尾之象也能訴訴恐懼故終吉訴訴非志也終吉則志行矣楊敬仲曰天下之理欲者不得不欲者得六三欲志行故不得志行九四志不行故終於志行六三柔而好剛九四剛而能柔此吉凶所以相反九五陽剛居尊位凡事必行無所疑礙故其象為夬決貞乎厲已鄧潛谷曰猶之體乾四不中正而吉以有惕也五剛中正而厲以有恃也履乎履夫敬所以康履也上九履之終也於其終視其所履周旋無虧乃大有福慶之人也天人一體求福自已考祥不於祥於其履履不素不坦而有行必有矯履不訴訴不戒懼而坦行必有欲人不足以達天即偶獲慶能無悔吝乎哉胡五峰曰人之涉世多是危機不為所傷乃見所履傳曰易之興也其當文王與紂之事邪是故其辭危危莫危於履虎尾之辭矣故九卦處憂患以此為首觀首履而後知以説處健以健處説者必始以憂懼而後可以其旋元吉也處履者觀此象乃踐履道矣乾下坤上天下之道莫善於相反而相交以為用交則通不交則攜天地且然况於人乎泰小往大來陽為大為君子隂為小為小人三隂往而居外三陽來而居內道之正也吉亨者言致泰之道但小大交相往來則小者吉大者亨可常泰矣馮奇之曰自乾坤之後始涉人道經歷六坎險阻備嘗內有所畜外有所履然後致泰而泰之後否即繼之以此知斯人之生立之難而喪之易國家之興成之難而敗之易天下之治致之難而亂之易豫嘗神遊其盛其在唐虞之際乎仰經天明日月星辰歷象璣衡俯奠地維封山濬川平地成天中秩人紀府修事和功成敘歌蓋道曰天地之道宜曰天地之宜曰左右民者天地之道歸主於生民經不曰君子曰元后元后者德位時三重備而成天地泰者也初九身在三陽之下處泰之初而即志在外之隂欲以來交於小連拔三陽以其彚進故致四等翩翩相信而小大交也二以陽剛得中上應於五為上所專任雖居臣位主治泰者也君臣同德二光大而五元吉則又不但有其願而願亦遂以行矣以此致泰豈非虛已之君能聽其臣包荒之臣能光大其君者乎九三居內卦之上泰之盛也故曰天地際言天地之交際也夫天地之交一交即散一際即離斷不能久蓋平陂往復的然孚信疑非人之所能致力然知其如此而克艱守貞亦可無咎何也人定自能勝天也保泰之道一克艱而已艱常克則泰常保矣六四處泰之過中以隂在上志在趨下故翩翩往交於陽此豈有徵發戒令哉中心之願不戒而自孚也初非以其鄰之富也不待富而鄰從者以三隂在上皆失實也書曰天惟純佑命則商實實失矣可懼也夫六五柔中虛已降其尊而順從於陽故有帝乙歸妹之象易之道天地隂陽夫婦之道也小往大來所以致泰大往小來所以致否泰卦揭帝乙歸妹以為天下萬世之準旨哉其言乎上六鄧潛谷曰發隍成城城圮復隍象否而泰泰而否靡常也豈人力也哉謹自治可也然已吝矣貞而吝傷告命之不早也三艱貞早已由天地之泰而推之於上下君臣之際於時內外大小之分秩然但覺世宙總是一泒陽明氣象有君子而無小人噫嘻此何如世界耶徒令人神遊其際而已矣坤下乾上吕伯恭曰否上下不交有天地之形而無乾坤之用也人莫不曰否乎一時之所為也人其奈何豫謂不然卦辭已曰否之匪人不利君子貞矣彖又言內小人而外君子君子之道消蓋小人與君子勢不並立大往小來斯時也人道不通人非人矣上下不交國非國矣君子於此時惟有貞於道與時偕藏而已矣儉德辟難不可榮以祿不獨善於處否並見君子轉否為泰之道否之致也人實為之否之轉也還須借人而成濟否之功此固易之道也初六拔茅泰與否皆取茅為象以羣隂羣陽同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨其道一也志在君者明君子之志未嘗不在君君不見用故退爾六二包承則君子當去而曰包承勢亦有未得遽去正見君子處否之道若夫大人則否而能亨天有泰否以一氣為通塞人有泰否以一心為通塞正為此不亂羣之大人也六三柔居陽位凡可羞之事皆冒為之則又以柔包之不露內羞而外包其中未可測也故稱匪人然內省知愧而羞惡之心生則又未嘗以匪人終也此易之道也九四居上卦之下有泰來之幾乃命之將復者處近君之地得行其志以輔上濟否者也何咎之有而衆類皆麗其福祉矣又何怪其相引拔以進耶九五休否卦二五稱大人位天地而正中者也既曰休否似若不以否為意者而豈知其實艱難貞固未嘗不曰其亡其亡若頃刻無以自存者耶上九否之終也否傾則泰矣後喜也嘗思之有休否之大人乃所以為轉否之大人也總之君子小人之見不可太明不見其為小人是無小人也而小人道消不見其為君子是皆君子也而君子道長其泰也人皆以為泰而我獨以為否是不為泰所動可常泰矣其否也人皆以為否我即以為泰是不為否所亂不終否矣天地氣化之權常在吾手是誠休否之大人也乃君子實不任是也何也以君子之有貞也有貞則以彼為不貞便不能休矣薛敬軒曰否泰相因無一息之停又曰忮心一生而天地否良心一發而天地泰又曰自泰之否易自否之泰難皆言泰否相因者也是故君子欲道合志同則去其忮心復其良心而已顧心之泰難乎哉今之談易簡之學吾求吾心之泰而已而不精擇於忮良之間吾懼泰之時少否之時多適以滋擾焉爾何能泰也劉念臺曰泰極而否有否時則有否人否人之為匪人也首與君子為難而正道詘矣於是往來之勢決而上下之交亡世道之所以益否也此非天之所為也人也離下乾上同人與人同也體仁者渾然與人同體者也卦惟一柔得位得中以應乎乾心與天通善與人同然後能以一心通萬心通天下為一心而于野其同若昵比近私則一膜之內自隔藩籬此身亦眇乎小矣人孰與我張子曰不能與人同未足為正也天下之心天下之志自是一物何常有如此間别或曰卦曰同人象又曰類族辨物無乃為異乎蓋凡有異者皆當辨明庶物各有類類各有辨物適其所用得其宜乃所以為同人卦總羣材通天下一心也故彖極于野之同尊體仁為長人之府爻專一節人各以其心為心也故辭極不仁之禍以愛惡窮攻取之情初剛且正上無係應大公之端而同人之柄也門內其情易僻一出門則天地萬物孰不吾同易傳所謂此顔子克己之學也同人之道惡其偏私六二正應九五有于宗之象止同其宗人亦不廣矣故吝象于初九曰誰咎為初慶也於六二曰吝為二懼也或曰六二自視雖若有于宗之吝而五陽視二實則有于野之同故彖辭斷以同人于野四字名其卦焉以今觀之初固以出門求同矣三剛暴居二五之間欲奪而同之至伏戎于林莽之中時升髙陵以顧望則其情更迫矣四又以乘墉求同也三以剛居剛故終其強而不知反四以剛居柔故有困而能反之義九五同於二而為三四二陽非理隔奪必用大師克之乃得同也五君位而爻不取以昵應於二失中正之德非大同之道也上九雖無三四之爭亦無九五號咷相克之難又獨出郊跂望庶幾一同焉則上下五陽皆欲求與二同明矣所同盡一卦之人非于野之同而何彖言應乎乾蓋專言五卦辭同人于野亨利涉大川者何蓋言不但五應於二欲與二同凡乾之行皆欲應二求與二同也張湛虗曰同人而言大川戎攻師克何也同者人之所忌也忌同伐交大川不足喻其險故利貞也來矣鮮曰天下之理正而已矣人同此心同此理億兆之衆志雖不同惟此正理方可通之方可大同人心若私邪不正安能有于野之亨而利涉哉此所以利君子貞也乾下離上一隂居二上下五陽皆欲與同則為同人于野以其居中得位自然為衆所同耳一隂居五上下五陽皆為所有則為大有元亨以其居柔處尊自能有大耳同人止曰得中大有則曰大中中豈有大小哉人有賢人聖人之不同故中亦有賢人之中聖人之中孔子曰古之有天下者必聖人六五柔得尊位王者之事聖人之事故曰大中遏惡揚善順天休命勉之也初九無交害二應於五三能自通四匪其彭惟初無交故有害然非其咎九二人臣之大有也臣之事君如車載物大車則無所不載猶大德無所不堪任也九三公用享於天子非柔中文明之主不能察非剛健不私之臣不能通故曰小人弗克九四以陽剛之體事謙柔之君非損抑明智未有不取禍者九四入離卦有明象六五厥孚楊廷秀曰大有之主也離明而晦之以隂虛中而執之以柔專任誠信故能感發其下之志愧服其下之心下感發則君臣之孚不約而自堅下愧服則道義之威不猛而自洽信以發志以我之誠信發彼之誠信易而無備以我之和易徹彼之周防處大有如此是以上九爻辭並不言致福之由而遽曰自天祐之吉無不利六五一爻備言六五所以大有之德上九一爻備言上九所以大有之福福德兼備是謂大有六五上九合為一人然則上九其天矣自天祐之非卜之天卜之自也東坡曰六五處羣剛之間而獨用柔無備之甚者也以其無備而物信之故歸之者交如夫備生於不足不足之形見於外則威削艮下坤上謙主於損主於退亦何見其亨聖人曰惟謙乃亨君子有終正謙之亨也故彖詳言謙亨之驗天地鬼神莫不由之况於人乎王汝中曰以卑藴髙謙之象也君子取有餘以益不足以善同人則賢不肖平矣以位下人則貴賤平矣謙之六爻無凶德謙者內止而外順內不止而外順則為象恭為色莊君子弗貴也張子曰易大象皆是實事言地中有山謙夫山者崇髙之物而處地中非謙而何初柔能謙下之下謙之謙君子也蓋觀天下無一可慢可上退然以其身下之讓之也卑以自牧何適不行即涉大川乎吉矣二柔中正故以謙獲譽與上六之鳴異矣非中心得也而謙將能鳴乎夫謙何可以聲音笑貌為也卦惟一陽為羣隂之宗而居下體之上有功勞之象焉凡謙必有其終而况於勞而謙乎凡謙已為人之所好而况於有勞而謙萬民之服也四居上體切近君位九三又有大功德為上所任衆所宗而已居其上當恭畏以奉謙德之君卑巽以讓勞謙之臣動作施為無不利於撝謙也謙德之則也道之止也撝之懼未有至焉有違則乎哉六五居君位而謙足以深得人之心也有君如此天下所咸服而有不服焉天下之所共怒也以咸服之人攻所共怒其利也孰禦或曰謙不與人爭如何言侵伐纂言曰非求勝也彼能服即已矣是也大抵謙自是用兵之道故聖人於卦辭教人仁矣上六居一卦之外有鳴謙不由中之象謙不由中其志未得也夫不以中心與人而外為鳴謙人所不服也所不應也其與二鳴同而所存與中心得者異矣即用師亦僅僅征邑國已焉故謙欲其自得之也謙豈易言哉甚矣聖人之善言謙也內三爻以止故著其德外三爻以順故防其過謙者有而不居之義止於其內而收斂不伐順乎其外而卑以下人惟能自屈於其始所以能自伸於其終此君子之所以有終也昔賢云丹朱只為傲字便結果一生坤下震上卦之所以為豫者何也九四一陽羣隂應焉志其行乎而下坤上震有順以動之象順以時動罔拂有衆民必和矣豫也豫和樂也樂則天天則神故天地如之此體信達順之道王者之樂莫大於是卦辭曰利建侯行師上動而下不順非建侯行師之利也吕東萊曰履是易中之禮豫是易中之樂易摸寫天地間事理而於履豫二卦見禮樂之體用所謂實象也蓋唯履故制禮以和行行即禮之善惟豫故作樂以崇德德即豫之善非先王制禮以履則履忒矣作樂以豫則豫縱矣彖通全體以所樂樂人公物之道也無不利矣爻止一節以所樂樂身私已之欲也故凶悔咎且疾焉可懼也夫初六質柔志汚上有奧援驕淫矜誇鳴以為豫毁則敗德將由惡終所志已窮安得不凶志窮與志行正相反况志大行也六二中正自守不肯從人雖與為豫如不終日程傳謂處豫不可安且久也久則溺矣是以大傳極言六二介石之操獨能先事知幾而不沒于豫三位不當大非二比故其仰視而欲往也悔遲回而不往也悔悔往者畏六二悔不往者羡九四也所謂不能無交戰於胸中者非耶嗚呼天下之能介如石者幾何人哉九四卦之所由以為豫者也志大行矣唯勿疑家視朝廷身視羣工以其豫豫天下又以其由豫者公天下朋其來乎如簪斯盍矣熊過曰大有得者一剛得五柔朋盍簪者五柔合一剛六五隂柔不正又乘九四之剛但知逸豫以為樂而不知權柄之下移威福之盡去豈非君人者不起之疾耶恆不死者中未亡君臣之分不可泯也上六沉冥於豫豫已成不可復渝也使成而能有渝更有何咎但早不渝至成而後渝恐無及矣在豫之終震極有變之義能變則無咎程傳曰勸遷善本義曰能補過此大易之旨也余觀彖辭極言致豫之美而爻與象反極言享豫之禍豈豫可致終不可享耶蓋亡國敗家者非盱豫鳴豫即死於豫苟能介然若不終日又何不能保終豫耶即此便能享豫便是順動便是致豫之由亦豈有他今不思致豫之由而但享逸豫之福宜盡喪於豫而福反為禍也震下兑上隨之卦辭曰元亨利貞無咎諸儒有謂卦有大小則四德亦不盡同此恐未然六十四卦皆可以言元亨利貞也六十四卦皆易也易豈有大小哉元以始言可也以大言亦可也自心通內明者觀之縱言之可橫言之可無不通也大亨貞無咎而於天下可以隨時而無不通矣時變之來無窮時變之狀無定古無可稽之典近無可法之則隨時而應動不失宜非得易道之大全其孰能與於斯夫時者天之時也時無不在君子法天亦無定隨嚮晦入宴息取其最明且近者人烏得而違之周宴曰爻取隨時而動大象取隨時而息動息不違乎時此隨時之義所以為大初九以一陽為震之主作隨之官官各有所守不可渝也今渝焉隨時之義也其事可變也其貞正之義不可變也故貞則吉出門即有功之交又何必舍近而逺乎其從正而不失也初自得之矣六二雖與九五正應然近係初九而相得此變之不善者也故曰係小子失丈夫言係一則失一以為貪小失大之戒故象曰弗兼與也三雖與初同體而切近於四三惟四之隨此變之善者也故曰係丈夫失小子蓋有所係則有所失無所係則無所失丈夫不可失也小子亦豈不可失乎九四下有二隂相隨所謂得衆心而有獲者也固以我之正矣然人心從已危疑之道也自非誠積於中動合於道以明哲處之安免乎咎五剛中正所孚者嘉此便是善與人同之心四海之內有不輕千里而來告之以善者乎是王者之隨也位正中言乎得尊位而又有中正之德也上居隨極亦處説終不能孚嘉天下使人説隨乃拘係之又從維之逼使隨已人孰與我夫王者以嘉禮親邦國動而人説雖西山之神可使用享况其臣與何必拘係而維縶之哉人生少有可隨者隨人則詭隨世則流其惟隨時乎震以一陽下二隂兑以二陽下一隂皆剛來下柔之義剛上柔下分也有時而下柔隨時變易以從道也隨時之學天下一人耳時乎時乎其惟聖之時者乎故特贊其大云巽下艮上蘇子瞻曰器久不用而蟲生之謂之蠱人久晏溺而疾生之謂之蠱天下久安無為而弊生之謂之蠱易曰蠱者事也夫蠱非事也以天下為無事而不事事則後將不勝事矣此蠱之所以為事也器欲常用體欲常勞天下常欲事事蠱之災豈一日之故哉夫人之情無大患難則日流於偷天下既已治矣而猶以涉川為事則畏其偷也陸伯載曰日有六甲終而復始如環無端天之行也造化之所以旡弊也王汝中曰艮剛居上巽柔居下上亢而不能下濟下卑而不能上承止而巽所以成蠱也君子治蠱有道民心之蠱以玩愒頺廢未知所振作耳振者鼓舞興起之意故曰作新民譬之良醫治病振者驅其外邪育者養其元氣風言振山言育周晏曰振民者所以起其卑巽之疾育德者所以化其苟止之病初六幹蠱諸爻皆取幹蠱之義考有蠱而子幹之有子則考無過咎矣考之蠱至于終考之身不能改豈不危厲哉有子能幹故厲終吉卜子夏曰臨事專故厲成其志故無咎有事然也鄭康成曰子改父道始雖厲而終則吉事若不順而意則順也九二獨稱幹母者二剛五柔不幸母有蠱不可正以幹之正則拂已居柔用中婉變無忤雖用正而不過故曰得中道也是得幹母之中道也若貞反失幹母之中道矣九三重剛於以幹父之蠱未免過中不能無悔悔則無咎矣心悔之曰悔人尤之曰咎既幹父蠱則子為正矣故終無咎六四純柔不能幹蠱反以裕蠱彼無愧於心未嘗不自以為得也故夫子正之曰往未得也蔡介夫曰言無如蠱何五柔居尊二承以德同心振蠱不能為創始開基之事豈復有遏佚前人光者乎蓋王者之幹蠱莫大於治德任人也彼一手足之力為幹者細已上九處事外不纍於世務不臣事於王侯蓋進退以道用舍合宜者也爻曰尚其事象曰志可則語尚志其事也蠱詳事治而以不事其事終焉此夫子所以終身行而終身藏也當蠱之世任其事而幹蠱者則操巽命之權而行其所當行不任其事而髙尚者則體艮止之意而止其所當止如鄧禹諸臣皆相光武以幹漢室之蠱獨子陵釣於富春是豈不能治蠱者哉彼固各有所以自治耳兑下坤上傳曰臨者大也韓康伯云可大之業由事而生二陽方長而盛大故為臨也卦辭元亨利貞彖釋之曰大亨以正天之道也非貶於乾也大亨以正非元乎大亨而不失其正者非人之所為也天道也大亨人亨也正人正也而曰天之道也明其不加人為是謂天之道也至於八月有凶張子曰易之於爻變陽至二便為之戒恐有過滿之萌未過中已戒猶履霜堅氷之義及泰之三曰無平不陂無往不復皆過中之戒也王汝中曰物之相臨無若地之臨水故澤上有地為臨也以土制水宜若易然者迫之以險隘則奔潰四出壞而後已若居之以寬則畜而為澤君子之於民亦然三代之民不忘先王之澤教之無窮者澤潤物之象容之無疆者地容物之象卦辭言君子臨小人大象言君臨民六爻又發凡上下彼此相臨之義咸感也初與二位皆在下皆以其德足以感人而臨之初曰貞吉象又曰志行正也言乎所以感臨者本乎志之行正而已初九剛而得正與四感應九二陽長而漸盛感動於六五中順之君其信之專得行其志故吉無不利異乎初之貞吉矣象曰未順命也楊敬仲謂君臣一德一心咸感之至亦有未順君命弼違補過者矣六三甘臨體説乘剛故甘説求容而以臨物安有所利能自憂懼庶可免咎六四至臨以隂居隂體順應正盡臨之道雖在剛長可以無咎至自上而下之謂六五知臨以一人之身臨天下之廣惟能合天下之目為目而明合天下之耳為耳而聰合天下之心思為心思而睿則天聰明之盡也大君之宜孰大於是彼沾沾自任其知者細矣不足與有臨矣上六臨極順終地厚澤洪安和有衆由初逮終敦臨也吉無咎矣推之臨人臨政臨事於何不然志一息不厚終者息矣坤下巽上四隂在下臣民之象下觀者也二陽在上君子之象觀天下者也然上九一陽但可謂之大觀在上必有九五中正以觀天下然後自然下觀而化矣盥者盥手為潔祭之初也盥潔之時其心純誠不可以意度言喻此道即天之道天道至神故四時之行無差忒聖人即天之神道故設教而天下自服卦全體風上地下風周流披拂無處不遍而行於地上則以方而異先王設教象風之在地鼓動萬物則齊其時地而一之也劉三山曰如齊之末業教以農桑衛之淫佚教以禮制奢如曹則示之以儉儉如魏則示之以禮所以一道德而同風俗也初六童觀所觀者末小人之道施於君子則吝六二窺觀得婦人之道雖正可羞吳幼清曰初居陽象男童二居隂象女子我者三自謂也天地之大德曰生六三居下卦之上而近於巽巽為進退故六三自觀我生以審所學猶曰吾斯之未能信也六三有退之象則六四有進之象矣六四之進乃觀國之光輝而進九五賢明中正在上上九亦陽明國多聖賢有道之禮樂刑政及人自廣賢人斯敢進故利用賓于王三曰觀我生我之所行也九五亦曰觀我生則觀民而已民治則我是民亂則我非民樂則已正民憂則已邪凡我之是非邪正一觀諸民足矣上九觀其生上九不當事任無位而為天下所觀仰者也三言我對君也五言我對民也上九非九五非觀光不對君民故曰其自觀其生必君子而後無咎不然何以使人觀仰乎震下離上程子曰噬齧也嗑合也口中有物間之齧而後合也卦上下二爻皆剛而中柔頤口之象又一剛爻間於其內為頤中有物不得嗑必齧之乃得嗑之象故為噬嗑楊中立曰噬嗑除間之卦也獄者所以治間而求其情治而得其情則天下服矣至哉噬嗑之道乎除間之時剛柔明動合而成章不偏不亂雖不當位斷不以姑息縱姦方時化曰凡獄之由必有所以作梗致間者斷獄而不得其間獄未易剖也蓋天地生物有為物之梗者必用雷電擊搏之聖人治天下有為民之梗者必用獄斷制之故噬嗑以去頤之梗雷電以去羣生之梗刑獄以去天下之梗夫道一而已矣六爻程朱皆謂初上無位為受刑之象中四爻為用刑之象初在卦始罪薄過小戒之在初小懲可止故無咎二柔中正以用獄也初九剛以梗政二之嗑之如噬膚之易噬膚與噬臘噬胏噬乾肉同文滅鼻與滅趾滅耳同文五刑一曰墨二曰劓薄刑故於二言之三不中正刑人而人不服為噬臘遇毒之象雖曰小吝然當噬嗑之時厥噬宜也故無咎四已過中則間益深益大故曰噬乾胏乾肉而兼骨至堅難噬者也故利於艱貞則吉象曰未光言九四之猶未盡乎道也六五柔中宅尊德明惟明獄訟從質成焉象之噬匪臘匪胏而乾肉得匪金矢而黃金也則六五之黃中豈九四之所能勉而至哉上居卦之終其間愈大惡窮罪極故有何校滅耳之象初九始於足上九登於首矣今獄具亦有首足之校總之聰不明也不明則昏志氣一昏不驅之死地不止小人省此庶乎其瘳矣治世如是治心如是離下艮上程子曰下離本乾中爻變而成離上艮本坤上爻變而成艮離在內故云柔來艮在上故云剛上非自下體而上也乾坤變而為六子八卦重而為六十四皆由乾坤之變也本質剛大柔來文之則亨其功大本質大故也本質隂柔雖剛往文之僅小利有攸往而已本質小故也皆天然之文非人之所能為也至於文明以止一定不易之文則人文也觀於天文而隂內陽外文明在下剛上無位則時變可知也觀於人文明詩書禮樂之文善世而不伐德博而化天下文明焉此賁之所以為賁也象曰山下有火君子以明庶政無敢折獄噬嗑賁皆離從震艮噬嗑貞震明因雷而動故利用獄賁悔艮明因艮而止故無敢折獄止可明庶政以示民耳初九賁其趾文明之德以貴居賤修飾於下賁其趾義非苟進故曰舍車而徒六二柔不能自立依剛而立亦猶須不能自興從頤而興九三陽剛在上有頤之象六二耦而附於下有須之象六二離體自知也明故能依九三而成賁九三一陽居二隂之間得其賁而潤澤者也上下皆柔無物陵犯然不可邪妄自肆故永貞然後終保無悔四與初為應相賁者也為三所隔故不獲賁而皤如皤白也未獲賁也然九三剛正匪冦初四正應究必獲親故曰終無尤也六五賁于丘園半山曰丘六五以柔中之德比于上九上九敦素因可恃而致賁雖束帛戔戔非人情之所甚快賁飾之世獨存一寧固寧儉之思故可喜也上九白賁賁飾至此極矣上九超然於一卦之外一以白為賁焉以無色為其色也夫何咎是故舉世皆後進而夫子獨從野其孰能賁之蓋至于今二千有餘歲矣終不可加以賁也白賁之義大矣哉坤下艮上柔至於能變剛君子烏能有為乎小人既長自然不利有所往但當靜以俟之耳如夜則安靜以俟晝冬則安靜以俟春非以冬與夜為不可往而遂逃也逃將何適乎順而止非獨順時而止不為也順其勢以止羣隂一觀天消息盈虛之勢如何君子亦何敢置已意於其間哉剝之為卦小人剝君子也而艮山附于坤地乃有厚下安宅之象蓋剝之禍生於用小人剝必不厚下下剝則上益危矣今欲救剝之禍舍厚下安宅道無以也初之滅足去基本也凡小人得志必先於國家之基本動搖之取象於牀者牀人所安處今日剝牀庶居上者知所懼也六二剝牀以辨當剝之漸長君子未有得位而與之相應者蓋未有動其欲悔之心而挽其方張之勢則其計益昌矣六爻初與二曰蔑貞凶言初與二小人之勢未甚壯尚可正之也過此則雖欲正之亦無及矣禍成矣六三在羣隂之中獨與上九一陽應此能違其黨與而為吾黨之羽翼出不得已之望保無咎幸矣四也體上剝牀以膚有廢牀寢地象焉夫曰凶曰切近災傷剝之為害烈也亦若咎其違之不早焉六五為上九之膚能下寵衆隂則陽獲安而無不利矣異於六三者以其居尊制裁為卦之主故不云剝之也終無尤也以小人之心不過圖寵利而已不以宫人見畜為恥也六五能上附於陽又制羣隂不使進逼下無剝之之憂上得陽功之庇故曰無不利上九諸陽已盡碩果獨存不見食將為復生之果變於上則生於下無間可容息者也蔡介夫曰君子得輿小人剝廬二義不並行二占不並用若君子得輿則小人亦得廬汪本鈳曰上九在上五隂載之君子得輿也上九若變則為純坤無天與覆五隂何庇小人剝廬也震下坤上復者來復也自五月一隂生後陽一向在外至十月變坤今冬至復來反還於內所以名復也邱行可曰剛反言剝之一剛窮上反下而為復也剛長言復之一剛進而為臨為泰以至為乾也以其既去而來反故亨以其既反而漸長故利有攸往七日來復者自姤而遁否觀剝坤復凡七也即七日得之意復其見天地之心者金汝白曰觀復可以知仁仁者天地生物之心六爻皆為仁之事初不逺復顔子當之二休復以友輔仁閔冉之徒也三頻復日月至四獨復孟子私淑夫子以從道也五敦復其曾子與上迷復不仁矣天地之心動後方見聖人之心應事接物方見一陽初復萬物將發生之時當上下安靜以養微陽故先王以至日閉關閉關返視却聽嚴出入也商旅不行屏一切應感酬酢也不省方屏一切念起念滅也事易屏心難屏屏心之盡其周子所謂主靜立人極乎是故君子無日而非至日也初九不逺者失之不逺也人有過必至徵色發聲而後悔悟則困心衡慮者也惟自此心而失之又自此心而知之自此心而知之又自此心而改之則不逺即復不至於悔者也六二休復休者休而有容也二比於初虛已好善中無凝滯善與人同之域也故曰以下仁六三頻復頻復者頻失而頻復也汪本鈳曰頻復即是頻失使不失安得有復故聖人憂其頻復而又喜其頻復六四柔而得正在羣隂之中而獨能應剛故有中行獨復之象曰獨復則與休者等矣六五敦復敦者厚也無一毫人欲之雜不以久暫而或變者也中以自考言自我而成其敦復不由於人之意上六迷復迷復者迷其復而不知復也坤本先迷今居其極則迷之甚矣天災人眚雜然並至天下之事無一可為者所以反君道而凶震下乾上地雷復剛反力也天雷無妄則剛又自外來而為主於內其為力也更大况動而健又與動而以順行者不同是為大亨以正之天命自然利有攸往文王卦辭所以言四德也張子曰無妄而後具四德也其曰匪正有眚對無妄雷行天動也天動不妄故曰無妄天動不妄則物亦無妄乾道變化各正性命也又曰物因雷動雷動不妄則物亦不妄故曰物與無妄育不以時害莫甚焉初九往吉卦辭言不利有攸往謂既無妄不可復有往也過則妄矣爻言往吉謂以無妄而往無不得其志也易所謂得志者聖賢獲其願欲者也六二人之有妄在於期望期望萌生得失胥患未耕望穫未災望畬始耕望穫既災望畬耕期多穫災期饒畬意欲日廣謂非妄與而亦豈有恆獲矣六二柔順中正雖為於前無所望於後董子所謂明其道不計其功者也象曰未富也未有富之之心焉六三無妄之災非自已有以致之故為無妄之災大抵有得則有失無得則無失如行人得牛而去邑人不期望其失牛而失牛吾誰得而怨尤之順聽而已若以災為無妄而責命於天怨尤生焉妄也九四剛陽而居乾體復無應與無妄者也但可守此無妄之正道即無咎矣固有者本有也無應與則無係戀而無妄則無妄乃九四之本有也九五陽剛中正以居尊位而下應亦中正無妄之至也如是而猶有疾乃無妄之疾不當得而得者故勿藥自愈如舜之有苗周公之流言其必勿藥之矣藥之妄也上九非有妄也但時位窮極不可行耳無妄而行窮大失正窮髙失中眚乎不待言矣庸有利哉與亢龍同故二小象亦同卦六爻皆無妄惟初九為往吉他皆妄也不可輕往往則為災為眚為疾其不利如此以其匪天命之正與無妄之往故也孔子從心所欲而不踰矩無妄之往也不言所利利在其中不利有攸往禹所謂安汝止是也言其本止而不動意動則往矣往則為妄矣故曰無妄之往何之矣大易之旨各有發明所謂不可為典要乾下艮上大畜大有所畜也有藴畜之義有畜止之義象辭爻辭取義各不同貞者正也言所藴畜者正則畜極而通當食祿於朝以濟天下之險也合乾之剛健與艮之篤實大者皆無不畜之則其光輝日新可勝言哉剛上者無妄下卦之震上而為大畜之艮也上而為艮則陽剛之賢在上矣是尚其賢也止健者止居上而健居下禁民之強暴也此二者皆大正之事所以利貞若以止健為止陽剛君子則又非大正矣養賢者食祿以養賢也應天者下應乎乾也天者時而已矣時止時行動靜不失其時其道光明謙天道下濟而光明天在山中大畜君子以剛健篤實光輝日新其德前言往行皆古人之德也君子多識之則萬理會通於我而我之德大矣此君子體大畜之功也乾三爻皆取被止為義艮三爻皆取止之為義初九陽剛志於必進然當大畜之時為六四所畜止故往則有危止而不行則不犯災矣九二亦為六五所畜以有中德能自止而不進故有輿脫輹之象自無冒進之尤矣九三以陽居健極當大畜之時與上合志故有良馬追逐之象然猶恐過剛鋭進惟當艱貞待時故又曰間輿衛如是自然畜極而通利有攸往矣六四艮體居上與初相應初以陽剛居卦之下其勢甚微於此止之為力甚易上不勞於禁制下不傷於刑誅故有梏童牛之象六五以柔中居尊位畜乎其二者也陽已進而止之不若初之易矣故有豶豕牙之象操得要領則強暴梗化者自屈服矣六五之慶視六四之喜更有大焉者矣上九畜之既久其道大行衆正之途闢羣陽之路開矣天衢亨通一至於此濟濟蒸蒸咸願嚮用又孰有過於大畜者耶上陽一畫象擔二隂垂嚲於兩邉有擔挑之象言一擔挑起天衢即陳白沙所謂明月清風放兩頭一笻挑到魯尼邱到此真是宇宙在手造化生心道大行者無往而非亨也道字即衢字楊時喬曰五以古人之言行識之於心以畜心之德五德進可以稱居尊之位矣斯其不先畜人而先自畜自畜其德大乃能畜人是為已與人交畜畜道大成也斯為大畜之治也震下艮上頤者食物以自養不過自求口實而已卦曰貞吉象復極言養道而贊之觀其所養者觀其所以養人之道正不正也指上卦觀其自養者觀其求口實以自養之正不正也指下卦本卦頤原從口無養德之意惟頤養得正則養德即在其中矣不但養人自養以至天地聖人養萬物養萬民無非養之所在故曰頤之時大矣哉頤之象曰山下有雷山有止之象雷有聲而動君子之言語即雷之聲而愼之則山之止也所以養德也君子之飲食即雷之動而節之則山之止也所以養體也言語一出不可復入飲食一入不可復出君子之於言敢苟焉而已哉飢渴之害尤其所深警惕也初九陽剛不求食於外者也然上應於四不能自守迷欲而失已以陽而從隂故有觀我朵頤之象飲食之人則人賤之凶何待言六二隂柔求養於人者也誠得類而從矣初乎位下顚而拂經上乎于丘已髙見陵類應類求者物之自然故君子定其交而後求六三不中正又處動體之極而妄動矣故有拂頤之象拂頤者違拂所養之正道也道大悖矣安所行乎十年勿用者不得用其養也口容止所以下三爻養於動者皆凶上三爻養於止者皆吉六四隂爻不能以上養下而反資初九之陽以為養是謂顚頤與六二同而四獨吉者四與初正應不拂經也致已居上之德施光明被於天下吉孰大焉六五居尊能自養人者也但隂柔無養人之才而順以從上故亦有拂經之象然養賢及民君道之正守此正道則吉不可不量已之力而當濟人之任也上九以陽剛之德六五賴其賢以養人故有由頤之象然位髙任重養天下者憂天下者也安得不以為厲涉川之利大有之慶固聖人所欲觀矣而不當其時可如何巽下兑上大過陽過於隂也四陽居中過盛所以名大過也既棟橈矣而又利有攸往何也蓋陽過盛正君子處非常之時能僇力相與以有為剛雖過而得中有巽説之德以行之所以利有攸往言人於大過之時行大過之事適其時當其事如堯舜禪受湯武放伐雖過其事而不過乎理蓋無其時不可過有其時無其德亦不可過也大過之象曰澤滅木君子能違時乎哉獨守其道而已矣獨立可懼大勇不懼不懼者不求同俗而求同理天下非之而不顧也遁世可悶樂天不悶不悶者不求人知而求天知舉世不見知而不悔也不懼無悶分出與處皆死道也死道也者大過之時之道也此非有大過人之識力其滅沒也久矣初六隂柔又居巽體之下則愼而又愼者也故有藉茅之象茅又用夫白白則至潔之物愼其本始則下橈之咎庶其免矣九二比初以能得中故有老夫女妻之象羅念菴曰老夫女妻非婚媾之正苟恥過以相與不能成好合此善改過者也九三應上六而過剛不中不能用柔末流之害將不可已故棟橈凶用剛之害由忽將來而輕釁端不知害我者即我之所謂無能為者也故人莫可輔九四與初相應剛柔相濟故不為下之所橈因外卦虛在上實在下則有所承載故有棟隆之象三四皆棟不可以有輔者下虛故也不橈乎下者下實故也二得隂在下故言生稊生稊者下之根生也五得隂在上故言生華生華者上之枝生也根生則生生不息枝生則無生意矣老夫得其女妻可以成生育之功老婦得其士夫已非配合之美安得又有譽哉上六一爻澤滅木象也滅沒也木沒於水不見其頂也然澤能沒木不能使木沒在木實有何咎夫苟能利有攸往以亨棟隆則雖初之白茅亦可藉用而無咎苟不能利有攸往以致棟橈則滅頂之木亦必不能相輔以有成有大過之行者當必有以處此大過之時矣坎下坎上習坎重險也重坎何言乎習也我習之也習坎所以處險習坎所以出險也二五中實有孚之象陷於坎中而剛中之德自若維心亨之象身世本無險人心自為險耳信人心之易德也以易御險鮮不濟君子是以得守心之法焉人心遇險而懼懼而甚則亂亂則或失其信其心安能亨至再遇險而不失信維心亨者非深於道者不能也蓋存主於內者理既足以勝私則推行於外者誠自能以動物故剛中則心亨心亨則往有功而出險矣天險者無形之險也地險者有形之險也王公設險者因無形而成有形欲與天地同其險者也聖人以天下之險為已之衛如此視險正患其坎之不重而又何險之不可出何險之不可入乎坎之象曰水洊至下坎內水之方至也上坎外水之洊至也水洊至則恆久而不已君子體之常德行者以此進德也習教事者以此教民也德行常則德可久教事習則教不倦初六險既重矣復處其底沈冥於欲淪胥靡靡在坎入窞凶而已矣入於淵猶可遊也失道入窞不可救也險難之際弱必附強九二未出險中維心之亨雖曰未能然上下二隂求必見從故有小得六三來之者來往也下坎終而上坎繼險且枕者面臨乎險而頭枕乎險也入窞與初六同如之何可用矣六四柔順得正近九五剛中之君剛柔相濟其勢易合誠素既接雖簡略於禮無咎也納約自牖孟子因齊宣不忍牛之心而曰是心足王其義自見五剛中正又坎上體且出矣然而未盈也盈乃平未盈未平也險難垂出不能勉成其功光大其志故聖人指示之曰祗既平無咎亦猶夫二之小有得也上六以隂柔居險之極所陷益深終無出險之期故有繫徽纆置叢棘之象夫初上二爻皆以失道致凶如此則處險之必有道明矣嗚呼苟為失道則初上之凶可虞也苟不失道雖身在險中險其如我何古人生於憂患者既入於險即安於險方且以險為枕席勿用遽求出為也離下離上離麗也明也離為火火無常形附物而明邵子所謂火用以薪傳是也六二在內象火之內熒六五在外象火之外焱此卦合上下二體故以此為義柔麗乎中正者分言之六五麗乎中六二麗乎中正也總言之柔皆麗乎中正也惟柔中正而後亨所以當畜牝牛養其柔順中正之德而後吉也卦全體火上火下象明兩作此明畜積於內而發越於外象繼明如云日新又新緝熙不已也照于四方者光被四表也離主二成之者五也五尊位故以大人為言初九陽剛性上進卦離火火性炎上故有履錯然之象惟敬則安靜而不躁妄主一而不過察自無此咎矣六二黃離者言麗乎中也即柔麗乎中正也以人事論乃順以存心而不邪側順以處事而不偏倚故得中道無處而不吉也九三日昃之離人夀八十曰耋喜則歌憂則嗟嗟者歌之反重離之間前離將盡後離當繼之時也故有日昃之象然盛衰倚伏天運之常達者樂天知命安其日用之常若不能安常以自樂徒戚戚於大耋之嗟凶何如之內體三爻下卦之離也初者日之朝開户出門各謹所事履錯然矣二者日之中得中道其麗為黃是日正當天時也三則昃而為耄耋之年不可久矣須及時為樂莫徒為將盡之悲此處死生之道也外體三爻四五上相合而繼照者四不中正乃以炎上之性當兩火相接之時突然而來犯天下之所共憤自不旋踵消滅其焚而死死而棄也自棄之也誰其容之六五君也為九四暴虐之臣所陵柔莫能制惟出涕沱若又戚嗟若而已然亦吉者君臣天下之大義故九四終於無容六五終不失吉上九王用出征王指五用者用上九也有嘉者嘉上九也即王三錫命之意折首者殱厥渠魁也獲匪其醜者脅從罔治也重明之君臣其所為如此非以正邦豈輕言出征哉畜牝牛真不虛矣鄧潛谷曰坎離皆大卦為上經之終故坎象表聖功之本離象表聖功之要劉念臺曰初爻首言敬五爻言憂戚憂戚所以致敬也敬者本明者也由敬入誠君子之學也初以探其本也五以約之中也君子所以必愼其獨也故曰不明乎善不誠乎身矣重明言明之盡繼明言相繼為明大人緝熙之學也讀易大旨卷一
