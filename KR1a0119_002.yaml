body:
  text: 讀易大旨卷二容城孫奇逢撰下經艮下兑上天下之道感應而已非感則獨其何以爲咸感之道非唯男女爲然天地之道作乎上動乎下而萬物發育以化以生也聖人之心誠乎此動乎彼而天下丕應既和且平也故觀其所感而天地萬物之情可見情者天地萬物之眞機也非感其何以見之哉舒梓溪曰廓然大公無所私係所謂感而遂通也傳曰夫人中虚則能受實先入者爲主而感應之機窒象所以貴虚受也易與天地準然所以準天地者人或不得而見之逺取諸物而物無不可見也近取諸身而身無不可見也觀拇腓股脢輔之象可見初在内卦之下志在外卦之四有感則動其拇然欲進而未能也拇之上爲腓腓躁妄而不能固守故須順始不害腓之上爲股股益躁矣隨人而動不待感也感而動則其動也無思隨而動則其動也僕妾之役耳故曰所執下四正當心之處而心不可見似若不動然者然居柔非正應柔亦非正憧憧往來何其不光大之若是耶張横渠云以陽居隂非躁感於物者也然體兑性說未免乎思以求朋之累也蓋體説之初應止之始已勞於上朋止於下故憧憧得朋未爲光大不持以正則有謟瀆之悔脢背肉在心上心所繫者也心動脢静喻主静以攝動程傳言能背其私心感非其所見而說者則得人君感天下之正而無悔也本義則病其不能感物爲志末一取爻義一取象義有勉有戒脢之上爲輔上六隂柔應三而兼比五輔頰舌並舉口說之滕吾未見其能感也拇腓股輔不思而蔽於物者也憧憧過思而累於欲者也腓之居吉脢之無悔其庶幾乎卦辭之貞大象之虚即艮其背之意此聖學之第一義也蔣中完曰咸者以神交夫神交者將遺其心而況於身乎身忘而後神存心不遺則身不忘身不忘則神忘故神與身非兩存也必有一忘足不忘屨則屨之爲累也甚於桎梏腰不忘帶則帶之爲累也甚於縲絏人之所以終日躡屨束帶而不知厭者以其忘之也道之可名言者皆非其至咸之可分别者皆其粗也是故在卦者咸之全在爻者咸之粗也爻配一體自拇而上至於口當其處者有其德德有優劣而吉凶生焉合而用之則拇履腓行心慮口言六職並舉而我不知此其爲卦也離而觀之則拇能履而不能捉口能言而不能聽此其爲爻也方其爲卦也見其咸而不見其所以咸猶其爲人也見其人而不見其體也六體各見非全人也見其所以咸非全德也是故六爻未有不相應者而皆病焉不凶則其善者免於悔而已巽下震上恆者久也久於其道也久非其道諒而不貞烏能與天地相似哉楊慈湖曰上下之情不相與則不和不和亦不能恆雷動風作率常相與巽而動不忤六爻剛柔皆相應如此則可恆矣觀其所恆所恆即所感知所恆即所感則天地萬物之情昭然矣苟以爲所感自有所感之情所恆自有所恆之情則不惟不知恆亦不知感今飄風不終朝驟雨不終日此其不恆者皆形也其風之自其雨之自不可知也不可知者未始不恆也其音聲則不恆其動作則不恆其聲音之自動作之自不可知也不可知者未始不恆也知其自未始不恆則知其發其變化亦未始不恆無所不通無所不恆曰恆曰咸皆其虚名曰易曰道亦其虚名天地萬物之情如此六十四卦三百八十四爻之情如此大象所以取雷風之義風雷非天地之常用也而天地之化所以能常者以其有風雷也陽明子曰君子體夫雷風爲恆之象則雖酧酢萬變妙用無方而其所立必有卓然而不可易之體也恆既在我自不必於求人初當巽入之始深求乎四無求而求求自不利无深而深深自致凶其惟九二乎居中故无深剛而无求故悔亡九三重剛不中張子謂進則犯上退則乘剛故動則招悔取辱惟常守一德庶幾取容故曰不恆其德則无所容也九四居上之下震動方始蓋妄意有獲而不知田之无禽謂非其位也既非其位雖久之安能有成六五以隂居陽恒其德貞矣而不免爲夫子之凶者蓋知恆而不知恆之不可以恆也上六處震之極猶然振恆以爲功而不知其爲无功之大焉蓋知振而不知恆之不可以振也甚矣恆之難言也恆无失其爲恆惟久於其道者知之程子曰天下之理變而後能常朱子曰常而後能變常而後能變者如天地无私覆載故能常覆載日月无私照臨故能常照臨即天地之道恆久而不已意此主利貞言也變而後能常者窮則變變則通通則久此終則有始意主利有攸往言也合二說始盡恆字之義艮下乾上學不明於遯之義何足以言學論語首章揭人不知而不愠便是遯世无悶之旨故終日行而終日遯終日遯而終日行不遯也乃所以爲善遯也卦二隂浸長四陽退氣以其當退氣之時故曰遯以其能與時行故曰遯亨羅念菴曰遯剛當位而應與時行也即消長盈虚與時偕行此爲九五言以見亨意蓋遯之所以得亨者以君子當位與小人相應而能與時偕行不爲所染廹是以亨也君子如天小人如山山自止乾自行逺小人以乾之包不見山之礙爲不惡以乾之決不爲山所止爲嚴此非以權術待小人只自處以嚴則雖不厲聲色而小人自不能近矣遯尾之厲勿往者初在二之下二爲遯之主非三四在上者比也故但不往静守以俟時尚可免於凶咎纂言曰戒隂之進使之知所畏憚不敢前消陽此卦本謂四剛去以避柔之進而聖人設教又止柔勿進以避剛之盛其意深遠矣六二體本柔爲順位居二爲中是其資猶或可語而爲惡不至於極者也聖人爲君子謀曰當斯時也而欲執係斯人必當即其中順之資而固結其志令其相善而不可解脫苟不至於縱肆足矣以其方長也故不能治之而但云執之以固其志此君子處遯之事也九三以剛比柔本欲遯却有所係戀而不能遯憊者君子惑於小人墮其計中也大事謂遯之時事无大於遯者身名所繫畜臣妾奚足云四雖應初而有剛健之德不惡而嚴故曰好遯小人暗於事幾不忿怒成仇則私溺爲累矣五與四比以四爲嘉故曰嘉遯此又見九五之志非六二之所能固所以爲貞吉也夫正志之陽既與之有嘉則固志之隂自无所售其浸長之術肥遯謂君子於小人或比或應非私不能割則勢不能去惟上在卦外非應非比綽然遠引與小人一无可疑之迹也合言卦在柔曰尾曰執以兩柔於四剛言曰係曰好曰嘉曰肥以四剛於兩柔言劉呆齋曰遯以遠爲善肥優於嘉嘉優於好好優於係係優於執執優於尾總之已與人各得欲使小人皆化爲君子是則君子爲遯之道藹然通天下爲一身遯在天下不在一身也來矣鮮曰九五與二相應其陽漸消之意皆人之所未見而忽畧者是以苟且留連而不能決去也當此之時使不審時度勢則不知遯若眷戀祿位又不能遯惟有明哲保身之智又有介石見幾之勇方能鴻㝠鳳舉所以嘆其時義之大漢元成之時𢎞恭石顯得志於内而蕭望之劉向朱雲皆得巨禍桓靈之際曹節王甫得志於内而李膺陳蕃竇武皆被誅戮者均不知遯之時義者也易中大矣哉有二有贊美其所係之大者豫草之類是也有稱嘆其所處之難者大過遯之類是也乾下震上易中以柔消剛則爲陽危欲其致愼防之意以剛消隂則不言消柔爲柔慎防而惟欲剛不可盡發露以預養乎柔於大壯見之天下之柔者不能壯惟剛故壯雖剛而不動亦无由見其壯剛壯而不出於正非道德之剛壯乃氣勢之剛壯忤人傷物取禍之道也非禮勿履是自處以正乃所以爲大壯大壯以貞作主四剛之内初三剛正而反不吉二四以剛居柔似不正而反吉可見當壯之時以不用壯爲貞矣初居下有趾之象九有壯之象陽實又有孚之象是其人忠信可守而果決妄發孚以致凶故象曰其孚窮也九二不言壯唯言貞貞正也由正道而行故吉象曰以中也明其不作意一无所借斯見所謂正道也九三雖曰與震爲鄰然鄰人有藩尚在其前可徒觸乎君子當壯之時可以壯不可以用壯若用壯則雖貞亦厲象觸藩而羸角矣角徒羸而藩終不可決非罔而何藩以限制爲義内以自藩不至用罔而輕出外以藩小人不使用壯而得入總以貞爲限制然藩可決不可觸觸藩者犯貞之義犯貞則失其限制故有羸角之失決藩者逹貞之義逹貞則妙於限制故收不羸之得決字獨用於四爻者四爲君子領䄂又以剛居柔不過於壯故能用其決也六五治壯之主四陽方長而並進五以柔居上若以力制則難勝而有悔惟和易以待之則羣陽無所用其剛楊廷秀曰六五當衆陽盛強於下之時乃能使之帖然而自䘮者正以柔順和易之德調伏之也羊即四陽上六以隂處震終而當壯極故亦有羝羊觸藩之象虚氣壯往則不能退用壯者必不濟故不能遂羅念菴曰此卦二隂藩也故三應上四近五皆言藩三指上爲藩上指三爲羊然三之羸角則專自陽言上之不能退遂則專自隂之制陽言五不言藩者五爲君位又以爲制壯之主以其交易故各取義㨗解云小人隂類稱羊稱豕稱牛當矣君子亦象之何也德性未純即不離血氣故惟乾爻稱龍他卦不與固以獨尊乾道亦見德不易純取節則可正易之潔净精微處坤下離上晉者世道進而文明也凡物漸盛爲進不曰晉明而曰晉進以六四一柔進而上行居離之中當五之位以大明乎天下故謂之進柔進而上行并下體三隂亦順而彚進以麗乎大明之君上行者其道行也道行乎君也故康侯用此卦象之義而能致錫馬蕃庶晝日三接蒙君眷禮也王龍谿曰日出地則明入地則晦日之明本无加損也蔽與不蔽之間耳君子視明出地上之象悟性體之本明故自昭其明德君子之學欺曰自欺慊曰自慊復曰自復得曰自得明曰自明昭曰自昭知曰自知皆非有待於外也初六方晉如而即若摧如以九四也張子曰居晉之初正必見摧故摧如不害於正吉也未孚於人或未見聽寛以居之乃无咎未受命程傳謂未受命當職任故也六二晉如而反若愁如亦以九四也夫處柔順之中當晉而進進可知也猶愁如而不敢進益以見其爲卑巽之至矣是二之貞且吉也受茲介福于其王母不亦宜乎六三上麗九四不爲衆信則取悔可知然居順之極而其志上行矣志欲上順麗乎明君此衆志之所同也九四鼫鼠爲物貪而畏人體陽在進反據隂位故動止皆失與六三之義正相反矣六五明主不患不明照患過用其明失委任之道故曰失得勿恤下體三爻皆順也皆得也皆所謂得而勿恤而往吉无不利者也九四非位也非順也是自失其明也自不能晝進何嘗不容於中天之下正失而勿恤而往吉无不利者也上九窮无所往故曰角居明之極其施未光終輔五以伐四危而幸吉以得无咎然終吝道也蓋斯時也上有失得勿恤之君下有摧如衆允之臣上下康安晉接不遑又何以角勝爲哉離下坤上易傳曰用卦之道者文王用一爻之道者箕子大難以天下内難以一家紂欲殺文王難在天下也故稱大自五視之曰内者箕子一家也故大難稱蒙而内難不稱蒙箕子者敵文王而不能傷文王之明事商辛而不能囘商辛之暴明而不晦爲艱貞箕子之難視文王而更甚矣君子觀明入地之象於蒞衆也而用晦以爲明蓋用明則察人情反睽疑而不安唯用晦而明始得蒞衆之道此垂旒黈纊之義察淵魚所以不祥也處夷之時以明受夷者身名兩失自夷其明者身名兩得卦爻分明描出商周賢聖之事各不相代而各盡其道彖象兩言明入地中上六一爻乃正言其不明而晦者也初九明夷之始于飛垂翼君子避患當速退而遠行不遑暇食人即疑怪不暇顧也若俟衆人盡識則傷己及而不能去矣六二夷于左股左股傷不能行其志也以有文明之德故有馬壯之拯馬謂初九亦爲已用故欲拯闇同說者曰用拯馬壯文王之順也散宜生之徒之智也九三獵狩於離之南得其大首不知者以爲疾知者以爲貞此聖人大得志之時豈易與常人道乎六四入于左腹是用權術結納於暗君者比箕子則似於媚陸子以伊尹於桀當之甚類四當内外之交故言于出門庭或曰入君左腹獲君心意始得出此門庭而成生還之事主出羑里說六五艱難正志徉狂以避至晦矣然人但見其晦而孰知箕子之明一何如其不息也所謂愈晦而愈明非不息也不可息也以前五爻各有事應獨文王箕子顯言者文箕得處夷之經文王以之人知文王之蒙難而已不知即大易之道也箕子以之人知箕子之居難而已不知即大易之道也羅念菴曰初爲伯夷二爲文王三爲武王四爲伊尹五爲箕子上六不明晦與晦其明正相反晦其明是有明而被晦若上六則无明而一於昧晦者也此卦二五兩不相夷合文王箕子之事三上兩必相夷合武王與紂之事劉念臺曰明而見傷君子何不幸而生當其時乎艱且貞所以幾自完也明入地中夷而不終夷故文王演易於羑里而箕子叙疇於武王受命之後宜夫子兩有取焉然則二聖皆無死道乎文王可以不死者也閎天之賂非䧟君於不義也此亦一君臣之義彼亦一君臣之義也箕子可以死而不死者也其志在萬世也猶之文王之志也其志同其道同也周公之繫爻辭若微示不滿之意於箕子而夫子特爲表而出之曰正志與文德並稱蓋亦顯微闡幽之意也雖然有箕子之志則可無箕子之志則賊也六爻下五爻皆明夷而上獨不明亦不夷合天下之夷以爲夷也初登于天未始不明也後入于地一入不可復出也哀哉或曰如紂彊足禦諫辨足飾非何嘗不極天下之聰明若足以照盡四國然而無如失君道之則也何則乎用晦而明也亦艱貞之義也以之爲臣則臣則以之爲君則君則也離下巽上卦辭唯言利女貞深明家道之亂多由女禍此古今通患也彖言女正位乎内男正位乎外未有男不正位乎外而能使女獨正位乎内者也夫今日之夫婦他日之父母也有夫婦而後有父子有君臣有上下凡厥有家其可不愼厥修身利女之貞以正位乎内與君子觀風自火出之象則知風化之本自家而出家之本又自身而出矣身之所出唯言與行言有物行有恆皆誠也誠則其身修身修則齊治平之道自此而出此知風之自也王輔嗣曰凡教在初而法在始家瀆而後嚴之志變而後治之則悔矣處家人之初爲家人之始故必閑有家然後悔亡也張子曰象傳順以巽謂二居正順於五也百凡從子從夫无所遂志惟在中饋吉然家道之始始諸飲食烹飪一家之樂不樂平不乎皆係於此所關豈細故哉楊敬仲曰嗃嗃過於嚴也故有悔亦危厲然終吉若婦子嘻嘻然不肅敬則終吝悔生於太過吝生於不足九三重剛過中有過嚴之象六四隂柔而又巽體柔順之至也順則和和則富諺云十人十心無財市針十人一心有財市金此言乃至言也王假有家程朱假皆訓至謂極乎有家之道也九五知内廷之化爲朝廷邦國基本而極其刑于之道以先之五恭已於外二正家於内内外同德而天下治矣以文王爲君以太姒爲妃以王季爲父以太任爲母以武王爲子以邑姜爲婦其不交相愛乎上九有孚自初九閑有家漸陶馴練以至於此然後一家之父子兄弟夫婦實有倫序實有恩意非以威相束恰似有所畏而不敢踰者故謂之威如威根孚來所謂嚴君也終吉乃䖍始厚終永久之謂反身即有孚之根也楊誠齋曰正莫易於天下而莫難於一家莫易於一家之父子兄弟而莫難於一婦一婦正一家正一家正天下定矣故家人之卦辭曰利女貞正女以男正男以父父正以身身正以嚴是故家人之職二其道一婦道順男道嚴合嚴順之道存乎正嚴而不正獨嚴不行順而不正獨順不行以是爲格致誠正之功以是昭齊治均平之騐家人一卦盡之矣兌下離上革卦云二女同居其志不相得睽復云二女同居其志不同行若是乎二女志不可合如水火然聖人屢發之蓋有睽之而不得不睽者有睽之而乃以成其合者二女同居而志不同行終當各歸其所也安得而不睽言其睽則天地睽而其事同也同以生物爲事男女睽而其志通通以相應爲志萬物睽而其事類也類以生養爲事又安得而不同同而異睽而合天地而下莫不皆然故曰睽之時用大矣哉其曰小事吉者非小其道也當與大蹇對㸔方易曉大蹇則當大治之小亂則當小治之耳小大同異夫豈有定局哉彖已言其同象又言其異故曰以同而異以同而異雖異實同也拘曲之儒沾沾於一字一句以求同異昧大易之旨矣正公曰不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳初九喪馬勿逐是不以得失累其心故悔亡見惡人无咎是不以美惡累其心故无咎此君子處睽之道也欲濟天下之睽必先去吾心之睽也九二遇主于巷似與犯顔極諫殊科然合主之睽則遇巷者視犯顔者心更苦而情更摯矣陳潛室曰當睽之時雖正應不能自合義當委曲相遇古人無不正之合獨於睽發此義者義當然耳左師觸龍之諌趙太后卒出其子爲質於齊張子房招致四皓卒定太子俱非正言皆遇巷之義六三以一柔居二剛之間正應在上欲進與上合而二曵其輿四掣其牛上特地生疑又從天且劓其鼻睽之爲害可勝言耶夫相偶者反以爲疑而二陽原非偶者偶合者終必有睽相偶者終當有合故曰无初有終四與初皆陽剛兩陽无相應之象故睽孤然初九元夫也其睽也未相知也一日遇合其心則交孚矣交孚則道可行於天下故曰志行也六五以隂柔居尊位而悔亡者有九二陽剛之賢爲應以輔翼之所謂厥宗也噬膚所入之深如周公於成王孔明於後主疑釋睽合往何咎上九有六三之正應實不孤而咈躁多疑故其見三如豕之負塗鬼之載車於是乎先張之弧以爲冦而欲射之後竟知其爲我婚媾說弧而不之射見從疑生疑消而羣疑亡矣羣疑疑字是一大關㑹君臣之際着不得疑心世道離合治亂皆由於此羣疑失而睽合此見小事吉即此便是大道艮下坎上見險而止衆人之所知也而彖獨曰知矣哉何也智者初无鈎深索微也不昏而已矣楊敬仲曰凡衆之心即聖智之心衆人因物有遷意動而昏動於利而昏動於害而昏愈動愈昏則雖有險而莫之見安其危而利其災而聖智則不然意未嘗動故事未嘗昏衆人於是有愚之名智者於是有智之名非智者之特明乃衆人之昏耳然蹇非大人不能濟而貞則其本也時已險矣唯平易之道乃得所安而一切行險以僥倖者敗域也貞以正邦皆本於止則濟蹇之用也反身修德善言止也止之所以行之也從古聖賢處險難之時而不爲險難所困信義愈明於天下便是無入不自得六爻程傳云六居蹇之初往進則益入於蹇往蹇也來者對往之辭止而不進是有見幾知時之美二以中正之人爲中正之君所信任志在濟君於蹇難之中其蹇蹇者非爲身之故故无尤也九三以剛居正與上爲應上隂柔不足爲援故上往則蹇也反還歸也三爲下二隂所喜故來爲反其所也四居上位往則益入於坎險之深與三相比二與初同類相與是與下同志衆所從附也故曰來連來而連者當位以實也處蹇難非誠實何以濟五居君位而在蹇難之中是天下之大蹇也方天下之大蹇而得中正之臣相輔是其朋助之來也而无吉何也九居五六居二則功多不足屯否之類是也蓋臣賢於君則輔君以君所不能臣不及君則贊助之而已故不能成大功也上六以隂柔居蹇之極往无所之不往而來從五求三得陽剛之助是以碩也碩大也寛裕之稱來則寛大其蹇紓矣利見大人在五不言其濟蹇之功而上六利見之何也以五居坎險之中无剛陽之助而上六利見之則能濟於蹇故爲利也諸爻皆得正各有所善然皆未能出蹇故未足爲吉唯上處蹇極而得寛裕乃爲吉也蒙引曰大丈夫不幸而當蹇之時一卦六爻之義足以應用是善用易也非以見險而即止已也坎下震上解者天下患難解散之時也難免人患散則得衆者吉往而不返則生他變有所往而不速將後於時也故无所往則静吉有所往則速吉解與蹇相因起義非蹇不言解蹇利西南解亦利西南仍用濟蹇之道以善後總見解之作用所以開治平之路也蹇重平亂邊解重綏治邊天地萬物最妙是一解人心亦然解之時豈不大哉君子赦過宥罪在承平則不宜數赦宥使民生倖心在亂後則必除苛政咸與民更始時爲之也法天之道也初六以柔應剛相濟恊宜貽天下以安又不養天下之亂以際得之際則有相成之美若以水濟水以火濟火便不能无咎矣九二田獲三狐得黄矢一句謂得黄矢以獲三狐倒用文法舊以獲三狐爲去小人得黄矢爲進君子遠奸之義尚未盡安得遽及親賢乎貞吉内方說到小人退而君子進治道可成也六三居險之極獨無應與正致險者負四乘二以小人而乘君子之器四不能容三實自取又誰咎乎㨗解云四五上三爻辭最有妙指周公托爲六五命四之辭若曰負乘之奸其而拇乎而能解去之乎夫邪正如薰猶不能同器處也邪人既去則正人駢集以相孚矣而其亟解之哉周公設五命諸君子之辭曰諸君子之於小人有與比者有與應者奈悖之當解何計維有解之爲吉耳以小人之既退爲騐蓋小人不能自容恆托君子爲容君子不容奸斯朝廷无留奸矣君子曷圖之上六國之上公六五命之若曰負乘之惡高墉之隼公其射而去之夫大奸不去則大政不行誠射而有獲則政通人和無不利矣公其懋哉稱而親之也稱公尊之也稱君子兼諸賢槩命之也更注意正應故二獨得稱黄矢命賢如此五之賢爲可知矣兌下艮上損之成卦在三上二爻三陽在下一旦損下卦九三之剛以益上卦之柔而爲上九則是損下益上其道上行矣易之爲書皆從坤乾兩卦一損一益而成六十四卦念菴曰損己益人損下奉上皆人難能之事難有誠信故於損言有孚損所當損而能有孚則爲大善但得无咎可以貞常行而利其所往文王恐人不知所謂損之之義自設問曰所謂損者以何爲用乎二簋禮之至簡可以享祭則其所主者惟誠而已道上行言道當上行非逆施也忿與欲所當損者此二者惟有過無有不及人身之當損无過於此王陽明曰懲窒禁於未發之象此正克己心學如顔子不遷怒從懲忿功夫來不貳過從窒欲功夫來懲如止火窒如止水初九陽剛說體上應六四故有已事遄往之象置已之事損也速於往以益之也言遄者已之事往往難舍故雖遄往不至於過然當酌損而已不爾則涉於忘身以爲人有兼愛之蔽矣酌字所以救遄字九二雖剛而得中則非汲汲爲人者故以弗損爲益譬所謂微子陵不能成光武之大者初之已事不先已而後人也二之弗損不貶道以從人也事可損道不可損也觀此二爻可以知損之用矣六三應上九所損之位也九三去爲上九則爲三人行損一人六來居三上應於九則爲一人行得其友夫子言致一者正以見亡其朋比乃所以爲損己也六四隂柔下應於初是待人益己者人之益己莫大於知己之疾惠之利之皆不足擬言使遄喜者損疾貴速不爾則又爲疾不速不可得喜以此人之益己至出於不期而然始爲眞應始爲誠與六五弗克違之謂也弗克違猶云不能避蓋人自歸往助與之譬十朋之龜紹天明有事則卜孰敢違之上九由三位而至上此所損之人也使變己之剛以益柔則爲損而益之矣今以九而益之六則爲不損己而有益於人此兼善天下大得志之事也得臣者三隂皆服役其下也无家者逺下二陽弗與爲比也廓然大公損之善如此初言己事而又酌損能舍己也二言弗損无伐善也三之損一人朋亡也四之損疾改過也上之无家无我也如此而損道備矣不若是皆非所損而損施勞不可以益人雖應時烏可行乎凡損本拂人情之事或過或不及或不當其時皆非合正理而有孚也非有孚則不吉有咎非可貞之道不能攸往矣文王所謂二簋可用享者非常道也以其時當於損所以二簋也天下之理不過損益盈虚而已時當盈而損也不能逆時而使之益時當虚而益也不能逆時而使之損二簋用享以時而已不然致孝鬼神豈可損乎損不可訓也道在自損自損之心即孚也自損之途不一而制用爲大亦以時詘不得舉贏善保治之極思也震下巽上損九四之一陽以益下卦之初九是益下也凡益下皆人主之事然君之益下亦非定欲損上上亦何堪損也同施於天同生於地而爲之裁成輔相與時偕行而已有一時不行則待命於上者竭矣其言損上益下自上下下以貴而下賤以君而下賢自然其道大光民說无疆然非中正者不能中正者萬世不易之道善不遷則失其中矣過不改則失其中矣故君子遷善之速則如風行改過之勇則如雷厲此卦損上之一陽而益下則初九一爻爲一卦得益之最六四正應在上隂陽情和故利用爲大作利益之事必元吉而後无咎者厚事即大有爲非居下之道也初九獲六四之益而六二居下卦之中得中正之道者必大得人心大得天地鬼神之心十朋之龜從而弗違亦猶損六五之或益之自上祐也皆言乎本无求益之意而益自至也故曰自外來也初居下二得中猶諄諄恐其大過而失人臣之正六三過中既有所以致益惟用之於凶事施之於禍難之中庶得无咎亦必在我者有忠信誠確之心人咸孚之又中行而无偏黨告公用圭以通誠意固有之也以言其未曾損不爲凶也六四亦得稱中行者蓋五居中以益下爲志而與中爲行於是公從其告而得來依初九所遷之國以居故曰利用爲依遷國然則六四雖曰隂柔亦實以益志見從五之益下眞所謂有孚惠心矣夫初爲益下之陽猶然元吉況五獨能損上以益之其爲元吉又何須問然則實受其益者其有孚惠我德宜哉益下之志至此眞大得矣彼上九者无惠心之孚而欲望惠德之應是以勿恆之心求有孚之感其辭不亦偏乎故曰莫之與則傷之者至矣不是惠德便是或擊影響之報昭然莫逃君人者其尚思惠心以益下爲志哉彖曰民說无疆就損益所及之澤而言也益在民也其道大光就損益所行之事而言也益在君也民益君益所以名益凡益之道非理本無而强增益之也乃理之當其可而後增益也如曰日進无疆者以人事當然之理而益也曰其益无方者以造化自然之理而益也理之所在當益而益是以自我益之改過遷善不嫌其多自人益之十朋之龜愈見其吉矣乾下兌上一隂在上正當退氣之日五陽在下又値壯長之時則凡隂柔所不能決者皆有五陽以決之矣故其卦爲夬焉然何以見其能夬也此卦健而能說是以決而能和惟說則有感通之志而後其健得行惟和則有兌澤之孚而後其決得入五陽之能夬決眞不假言矣揚于王庭固爲顯暴其罪亦以一小人乘五剛有所據而難去故須明正若此居德則忌羅念菴曰即施禄及下之反皆象夬之義也德人不我德之德居德是自有其恩滿假之謂也如此則可忌矣夬五陽爻皆有戒辭初九位下德弱不自度量而欲行夫決之事是爲壯于前趾趾在下而小之物往必不勝其任故爲咎往不勝戒躁也九二愓號戒忽也五剛實爲九二一君子主決耳決柔之道非愓則内无儆省非號則外无政令能無憂乎惟既愓且號有備无患雖憸邪變伏倉卒可无虞矣故曰莫夜有戎勿恤遇雨戒暴也三於上跡雖相應而有必決之心故壯于頄悻悻之怒先使人疑凶禍至矢獨行遇雨隂陽和也迹雖似違君子濡小人冒可愠之嫌乎然心白何嫌於迹晦潛機不露密不害成賢於壯頄遠矣牽羊戒不斷也九居四若不暴矣而又畏其不斷者居隂位也其象爲居不安行不進惟牽羊而勉力以前則无咎所以然者隂暗之人不能見小人之惡雖聞言而未能即信唐德宗有言人言盧杞奸邪朕獨不覺此千古小人容身窟穴也中行戒比也唯彼九五逼近上六位高權重所謂揚于王庭之首一人也孤隂在上能幾何時如以柔脆之莧生踐踏之陸不夬決焉亦可也此時而夬夬我知五亦未爲光中之大矣自古君子於小人雖廹於公義猶不能不係於私情夬未終而姤已萌故易每惓惓也无號終凶只无可呼號便是凶了亦不待終而凶也不可字在義理上說自悖義理安得久長見非君子乏容德實小人有以自取耳馮氏曰於剥見剥一陽之易於夬見決一隂之難蓋君子明白洞逹難進易退而小人綢繆固結麾之不去也巽下乾上勿用勿字有力几隂不能害陽陽自引入之也男女之象甚博乾坤六合之男女也君子小人人類之男女也理欲一身之男女也天地不相遇則萬物不生君臣不相遇則政教不興此時義之大時義便冒繫柅包魚包𤓰含章等意時有不可過不可不及意義以乘時亦當无過不及有轉禍爲福作用故曰大易聖人長君子消小人之具也曰繫曰牽辭不厭複防之至也臨民若養魚包而不使逸則我能爲若主不令以賓抗主不繫不包則大可憂者至矣臀无膚者安其身之不能能安民乎上行指三下行指初包无魚謂魚失其所包也道失而民散凶自此起故曰遠民也遠民者二近民而四遠民也𤓰之爲物得所附而後止種𤓰杞下自能收拾散蔓君道廣覆自能斷絶民奸含章中正四字最重是志與天命相周旋也角爭也馭民之道包之繫之而已内與民爭激變招羞由其自取復誰咎與汪本鈳曰不得九二之剛繫以金柅起凶必矣然則聖人亦何貴於遇哉不知遇實天地人之大義天地相遇則自然品物咸章如此卦九二之剛而遇九五之中正則自然天下大行遇豈不大但此已壯之女斷然不宜與遇耳遇則必爲所牽而致禍凶也故曰勿用取女又曰不可與長云劉念臺曰姤復本造化之常理而卦辭於姤獨以人事斷之以爲隂盛之機可畏也而不可狃也其旨深矣夫子既釋卦辭之義而又推言之見隂陽相遇造化有固然者況於聖人乎中正非隂而意近之君子於是觀姤之時義而知天行不息之中正恃有主靜之微機以爲之助所以妙於相生而不窮也然則復其見天地之心乎姤其見天地之化乎故曰姤之時義大矣哉坤下兌上卦體似比比以五柔比一剛萃以四柔萃二剛多九四一剛爲權臣分五之權也諸爻從此起義幸九五剛中上下皆應能壓制之故無害大體而得以名萃也萃亨亨字人君之亨下亨字人臣之亨五剛中正大人之象二柔中正見大人之象九四不中正勢隣於五有權門私萃象故利貞神人兩萃爲骨體萃象以盡保萃之道在萃之時只當從君不論正應四正應反爲亂易無典要也爻言引象言變皆從四生初應四而三比四苟非二之引幾爲四黨矣六三隂柔不中正之人也四非正應爲四所棄二以中正應五又爲二所不與不獲萃而嗟恨無所利也惟往而從上六上六巽順而受之故无咎卦惟兩剛五爲萃主四不中正而廹近之故云必得大吉然後爲无咎也勉忠補過之意九五雖應有六二之賢然上有佞臣下有權臣故天下不能無匪孚元者仁也永貞只是成就個仁涕洟无咎君子不罪其有過而取其悔過凡外體艮者五上多吉外體兌者五上多咎剛在上則止柔在上則佞也說者曰此卦坤順在下兌說在上爲順以說既說矣得不萃乎又萬物皆以相應而後萃此卦九五剛中六二應之既應矣又得不萃乎此卦之所以名萃也既萃則我爲天下之王自然可以假有廟而致孝享亨何疑哉然必上順而下說乃得其正乃可爲天下之王乃可爲天下之所利見乃可爲萬物之所歸往今下順而上說之非正也蓋上焉者君先有說民之心則必有違道干譽之病是以復言大人之貞焉蓋言其所以利見大人者利見大人之貞而非以其能說也所以利於往萃者萃以大人之正而非以其有位也直以王者能順天之命與物之情故中心自願與之萃耳巽下坤上著升道之大亨蓋離明以照四方大人在焉而用巽順剛中之德以見之勿憂知遇之艱矣南在天地爲大夏亨嘉之㑹在人亦主亨通順而行之則其進德也孰禦初六允字有力正與九二之孚通脉程傳曰初之柔巽惟信於二而同升乃大吉也凡言大吉多隂爻勉之之辭萃九四大吉類看孚主二而言有力二爲萃升之主故皆言孚有孚則文可畧三升虚邑程傳謂入無人之邑孰禦哉黄葵軒作禮讓之國無嫉賢之風九三値之矣四居近君之位以柔居坤順之至也文王之亨于岐山上順乎上下順乎下故云順事也六五貞自爲句五有剛中之應然質本隂柔若不能貞固任賢不篤安能得吉登賢才以升世道於上理易若升階然上六開昧者以明此是夢覺關頭聖人以不息之貞四字提醒迷途指南也功夫全在利字他卦極則必反升獨不然一爻升一爻以時而升無不利者玩爻辭自見凡學未有不始勤而終惰者此願息之說所自起也百尺竿頭更進一步若衞武焉庶幾矣必曰貞藥其㝠也懼其知進而不知退或失則亢也坎下兌上著處困之道此卦之善在剛主事坎主内二五主中四亦剛德皆能爲亨貞大人之事他卦亨承貞此卦貞承亨明亨不在困外所亨所字有指吾心原有不可充詘不可隕穫之眞在命與志君子但以所志爲主而求遂之生可也死亦可也王畿曰致命猶委命於人不復爲我所有遂志是遂其爲善之志不以禍患動心初六小人本欲困君子君子不可困而卒自困遂有株木幽谷之象何凶如之九二困於時通於德是時三柔揜剛惟二德剛中九五倚以戡亂故有酒食朱紱之方來然羣小疑忌須以誠格君利用享祀六三處兩君子之間而兩欲揜之四如石不可轉也二之英銳若據蒺藜欲求助於上六之應以邪濟邪求耦喪耦也九四程朱說自正陳大士曰來非四往濟初却是五來拯四金車與赤紱同意初三有奥援從中牽之故遲九五三柔據五之上下而君德虧可謂劓且刖矣象困于赤紱赤紱被君寵也幸其與中直之臣同德故徐有說然邪人側目矣用賢宜如事神二與五皆言之示重也上六開小人反正株木蒺藜葛藟柔之困也酒食金車朱紱赤紱剛之困也邪正混視失剛揜之義方時化曰困亦人所常有也豈知大人處此黙黙聽受若無所困雖困而未嘗不亨乎苟戚戚然曰何以使我至此極也又或囂囂然曰我豈畏是哉皆非大人吉无咎之道也窮於遇之謂困然遇可困而心不可困困於心乃眞困也故道在亨貞而以大人當之則吉也有言不信求信諸心也信心所以能亨也貞大人吉貞字在文王卦辭連亨字讀彖辭連大人者孔子恐人認貞字爲戒辭也貞大人者貞正大人也六爻皆處困之道初六義在明九二義在誠九四義在徐九五義在說上六義在悔六三其絶物乎聖人致戒三爻而六爻之義皆在其中以見困之一字總由人造學者知乎此則且借以辨德寡怨而亨莫亨於此矣尚何困之可言巽下坎上古者立邑必相水泉所在不得泉難以立邑則當改邑以就之邑可人爲井根地脉在人則境常遷而眞性不改之象也此句已說盡矣故翼辭只單釋改邑不改井句井道以得養而不窮以失養而自窮蘇氏軾云井未嘗有得喪繘井之爲功羸瓶之爲凶在汲者耳凡大象必推廣卦義卦辭言性學此言王政初六正當井底隂柔无泉旁資九二終不濟事下則非清修之品舍則无用汲之利九二剛中然上無正應主賢而未受知下比初六友弱而不受益如旁出之水敝甕下漏功不上行失井之道也九三之才足以濟用如井之清潔泥者去注者深汲而進之於明王則君民上下並受其福當不以惻終也我謂三心惻者旁人也王明九五也用汲三應上六薦賢之象也甃修治也若不泉修治何爲通全體論四以二三爲泉者也洴其不潔去其舊染淘汰功深泉源其來矣不甃内不能致潔外不能禦汚咎矣五剛中正爲井之主正是源泉得於天者純修於人者至其井養而不窮者乎不言吉利者聖學盡人盡物只是盡性寒泉其本食不待言收則取之於下勿幕則進之於上象言大成者九五中正故大上六代其終故成人臣莫大乎進賢以成君之美君臣相與有成則治井之道終矣吁一井不汲則爲時舍爲甕敝漏爲羸其瓶使人人感歎哀傷而莫知所以一汲而井養其不窮矣朝於斯夕於斯勿蓋勿幕收其甕汲其瓶隨取隨足則以五之中正有孚於下故致上之元吉大成於上也所謂不費之惠无求之澤王之思用汲以爲明哉吳臨川曰君子之於君也以不求求之其於民也以不取取之其於天也以不禱禱之其於命也以不知知之井之道無求也而人爭取焉以不求求之也離下兌上已日乃孚四字該盡卦爻意與豫則立未占有孚同意已日土德誠也且先庚豫也惟誠能豫只一信括之元亨利貞以信感即已日也悔亡以信應即乃孚也卦名革者只借水火引起二女二女包得寛志之爲言天地萬物之情也革之取義不止於相姤乃取其相成澤中有火是鼎烹之義注澤而火之則火氣入澤變腥成熟革其性未嘗滅其性也治厯明時革其時未嘗滅其時也革道之大也初九剛不中而體躁尚未可革故當以中順自固六二議革而不驟二之辭同卦辭以主革之權歸之也已日同也夫子一曰信之一曰行有嘉信即嘉之心嘉即信之著也九三用革而戒躁夫一革言耳太驟則我之誠信不浹而民之心意未諒三就有孚心無遺慮事無遺理矣九四出納王命之臣五主之二議之三又諄諄告諭之三就之後衆心曉然知其當革所以悔亡而得吉也革與改不同革定議於上改布命於下九五以剛健中正素恊於天人即三四之孚皆其孚何必占而後知其孚哉占在未革之先孚又在未占之先上六革道之成當守不當創者居貞有功夫不弛事亦不生事卦以革爲義彖爻辭皆以不妄革爲義劉長民曰五爲革命之主是威武宣而文德著也三革言三就命令巳申四改命信志物盡從化至五則大亨以正不假占而有孚也王德卿曰虎文踈而著曰炳豹文密而理曰蔚蘇氏曰易稱風從虎虎有文而能神豹有文而不能神楊子雲曰貍變則豹豹變則虎法之弊也而利用革革故鼎新天下之大事也其可易言乎必求諸已日之孚焉元亨利貞四德備而後從之則革而盡善庶不遺更張无漸之悔文明則知之明說則處之當所以大亨以此也天地不革不成造化聖人不革不成世宇一皆時之所爲也治厯明時正聖人贊化育以成革命之大端耳湯武之應天順人曰革命改命孔顔之改過遷善曰造命立命其義一也巽下離上鼎者君之神器所以憲成國祚和理人民也天不能自治而畀君君不能獨理而資臣君臣調鼎之道盡於此矣以二三四剛鼎腹爲用主之者五宰之者上也鼎以烹餁不過爲養與祭耳祭之重者惟上帝元后格父母也養之次者及聖賢明主隆俊乂也凝命承革說來革改命鼎凝命革用變而鼎用常也六十四卦皆取象此獨言象初柔爲足二三四剛爲腹五柔爲耳上剛爲鉉初六顚趾不正相應以趾之无力顚也是宜因誤以深省得去夙垢後功可圖矣九二剛中之臣上應黄耳之君鼎之有美實者但下比初六不可謂非疾也因其中貞素植彼不能凂我耳愼所之與羣而不黨和而不同類㸔諸剛皆比應於五獨三不與焉上无知遇故有耳革行塞之象然君德柔中臣德剛正終有雨和之時虧悔有不足之悔終當吉也折足初之才不足而四誤用之初猶可以出否四則有失人誤國之罪赧汗而凶故象言自許安在鼎之舉措在耳爲鼎之主也君爲鼎耳臣爲鼎鉉五以柔中應九二之剛中猶黄耳而貫以金鉉也然其質柔任賢恐其不終故以利貞勉之剛而能温者玉也六五本柔而九節之以剛寛仁君道也正直臣道也明良濟美政以是和夫頤口也何足齒及而在聖人則養賢以及萬民鼎烹也本无大事而在聖人則養聖賢以享上帝苟不能大烹以養聖賢則雖欲享上帝上帝必不享矣故享帝曰烹養聖賢則曰大烹也然則聖賢之在天地間豈細哉震下震上震繼乾體元以動爲主一陽初動道心來復是爲震來則自有亨道焉六爻主初故辭與卦同初君道諸爻皆臣道初爲震動之震施震者也諸爻爲震受震者也四雖剛亦臣道據初而觀敬畏以和從容言笑曾非作威自天下承之懷貝者去貪蘇蘇者振惰懼邇者也遂泥者往來厲者索索矍矍者驚遠者也震爲長子莫大於守宗廟社稷以爲祭主故初九言君道敬修之善震來爲主敬和不平六二切近震主所以厲者貨寶爲祟也果能大喪其貝而自處以高勿如昔之其欲逐逐則大喪乃大得也此戒邇臣震而去貪三初同體亦邇臣也位不中正佈畏明威懼𤯝之及吳㓜清曰蘇蘇死而復生也亟反正可无過矣四不中正䧟於重隂能免於泥乎遂无反之意此遠臣之不震者進遠臣以有爲也往來於厲所以危惕其行當震時有事便是中非别有中六以隂柔居震動之極其驚懼之甚志氣消索視瞻徊徨故征則凶也夫震於禍及其躬之後則无濟苟方鄰而先震索索矍矍之咎可免矣諸爻形容長子之能驚遠懼邇如此可知學問之道下焉者不震不發上焉者不震不止故一震之餘无不各有所喪各有所發各有所得各有所止者原非他卦之可比也嗚呼雷迅霆擊萬方靡寧將逆天者誅不孝者戮而況於修道之君主鬯之子有不致福乎震何以言亨也蓋易之理危者使平易者使傾人能於平時安不忘危此心常如禍患之來虩虩然恐懼而無慢易之心則日用之間舉動自有法則而一笑一言皆啞啞而自如矣雖或有非常之變出於倐忽之頃猶雷之震驚百里然此心有主意氣安閒雷之威震雖大而遠上震下震因所動而動也因所動而動是動而未嘗動也屹然匕鬯不喪方寸之有主如是更何一切事變之摇奪乎事心之功於斯爲至所謂動亦定者也蓋聖人設此卦象以示不動心之道如此與艮卦互義艮下艮上震艮二卦聖人道問學之事也學貴知止止必有所故艮以背爲所而止以不獲身不見人爲背无所止而自止者此至善之止也彖出一時字見得人之不止以存人我見耳人我之見一起一定之所遂失故自趾以上分爲五爻皆止也而非其背非真止矣只艮其背足以盡艮之義二三去此初四存此五勉此而上安此便是思不出位此句冒下動靜不獲字非无身也不獲而已身之獲不獲在起念不起念之間也内不見已只是内欲不萌外不見人只是外誘不作八純卦皆是敵應獨於此言者艮止故也兩山並峙遼不相及各止其所位非但所處之位乃隨事各當之理兼時與地說𦂳要在一思字无乎不思思止於位一无容思也曰止曰光明曰位都着理上㸔心一於理乃是眞正當止之時靜而守之則不失正之道也六二中正得止之道者也然三剛居下之上主乎止而二不能拯救其失其心不快未退聽上未能下從也三不中正失其所止身心俱困猶艮其限而列其夤者外膠而内不安曰限曰夤疊出兩艮之交重卦之例二三皆言心四却言身蓋身之所有无一非心也經文血脉互見與背字所字位字一般看艮其輔非於言上作工夫言有序功夫在心上凡八純卦以九居五方取君象六只泛論九以剛居上而又成艮之主謂之敦者動靜皆定安所止也朱子云艮卦融合動靜始終貞元六字造化人事之理思過半矣楊敬仲曰善止者行善行者止知止而不知行者實不知止知行而不知止者實不知行知行止之非二則行止皆當其時而自然光明矣人精神盡在乎面不在乎背故聖人教之艮其背使其面之所向一如其背則應用交錯擾擾萬緒未始不寂然矣視聽言動心思曲折如天地之變化矣面如背前如後動如靜寂然无我不獲其身雖行其庭與人交際實不見其人矣是止得其所者无所也无止也非有所而欲无之也非本不止而强止之也无所无止无止之止眞止矣張湛虚曰五官有欲背獨無欲而五臟皆係於背艮義也劉念臺曰象㸃出思字纔見止所之地最靈處此人心之官也心不曠官思不出位思而未嘗思也思而未嘗思所以止而未嘗止也艮下巽上既進未進總欲漸卦體剛得中卦德止而巽皆有漸意君子進退之法必如女之六禮備乃行始善九五剛而得中主漸之賢君也有君如此可詭遇投乎不窮重不進邊士能自貴誰得賤而窘之且有无窮儀則也居德無欲速意善俗無強督意皆於漸義緊關諸爻皆取鴻鴻之爲物至有時而羣有序乃爲漸也初六以柔居下於士爲孤陋之士於象爲漸干之鴻乃少年新進上無應與在我不免有小子之厲在人不免有言語之傷故其占如此而義則无咎也六二以柔中正應剛中正安其位而行其道故有漸磐之象力在上句下只承上美之九三示過剛者以自克鴻棲陸失其所安矣以此道求應於上而不應如夫征之不復焉以此道求比於四而非正如婦孕之不育焉可謂凶矣要皆過剛不中心之冦也自冦而自禦之始免於凶四與三比三之剛惡可托爲安乎然以柔巽遇人轉危爲安或得之矣桷横平之柯失安於人求安於已九五漸至尊之位有正應之賢不幸阻於九三過剛之冦然剛柔必際中正必合故終得所願也上九獨出人位之外比應皆无所累鴻飛㝠㝠脫然塵表故鷹揚之烈不偉於二餓夫狙擊之功不加於四老人麟閣之勲不宏於一客星張湛虚曰取女陽迎隂也女歸隂從陽也鴻象取得有味其進以時知幾也次序行列其行不紊得正也遠羽㝠㝠繒繳莫及高蹈也於物無競於世無戀其羽可儀可法也又孰得而亂其志者偶畫鴻象覺漢宋儒終不及聖人格物之精且備因象悟義則諸爻牽纒之解又有可得而正者矣兌下震上士女無異道男必先女乃爲婚姻之正君必先士乃爲出處之正若士先君猶女先男所謂不由其道父母國人皆賤之者咸曰取男取女也此曰征女自征也凡易之言征者凶多吉少知敝重㸔天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也初居下而无正應娣之象也雖不奉神靈之統猶能修淑慎之業内助有裨如跛能履九二眇能視蒙上爻而言然女德幽貞而所配隂柔非良故視不能及遠未失常道而已六三不貞之女不堪正配當歸而爲娣媵則可也須作待三以柔居下體四以剛居上體三則亟亟輕從而自賤四則遲遲有待而自貴正相反者愆期之志非固滯也五王姬下嫁帝乙始正婚姻之禮尚德不貴飾如敬不忽於君子孝不衰於宗廟慈不畧於妾媵恩不靳於姻族此叚隂陽男女易道緊關卦以位不當爲失義爻以位在中爲合義互相發也初言恆不以貳嫡而失佐君之恆二言常不以婦貴而失副義之常四則遲歸之賢婦三則反歸之賤婦上則无歸之怨女說者曰皆女也而女歸獨吉歸妹反言征凶者以是女之歸也進而得二之位則有内助之益而其往爲有功進而以六居二則是女德貞正而可使一邦之女德皆正且邦君之位剛而得中此卦之象内止外巽利貞如是女歸之所以吉與今歸妹諸爻從少女而歸於人妾媵事也安得同哉又說以動必意說而後敢動若自有征其凶必矣漸之反爲歸妹所歸在妹進不以正凶道也不待終而知其敝也久矣天下事以理合者久而愈善劉孝標所謂風雨急而不輟其音霜雪零而不渝其色此永終无敝者也以勢合者勢盡則情疎以色合者色衰而愛弛垝垣復關之輩雖言笑於其初而桑落黄隕之嗟終痛悼於其後至於立身一敗萬事瓦裂其敝如此離下震上卦取豐大之豐明以動顯也爻取豐蔀之豐明以動掩也究其實豐蔀即卦辭憂字之義有孚來章即卦辭日中之義二五主豐者也君道之去憂以明而來章臣道之去憂以孚而發蔀過剛不中者勿盡用其才之所長而當折其右肱當路失當者勿慢任其才之所短而當遇其夷主是皆中道有禆於發蔀去憂即明之路也若内自蔽其明而豐蔀家屋外拒人之明而閉戸无人則雖欲即明去憂无日矣初九以剛居明體九四以剛居動體兩人之賢大畧相當敵應同心往豈有災旬均也尚配也二有孚發若句最重發開也對蔀言也若允若也對疑疾言也二之所事者闇主故言蔀言斗其蔽在天下三之所應者昏相故言沛言沬其蔽在一臣然而蔽則一也三剛正上六忌其才必折肱始免二四皆大臣故皆言斗四不及二必借初九而後濟來章謂六二九四初九也上六自以爲至明與天際翺翔不知其暗昧至此說者曰豐大也唯明以動乃豐故曰豐亨假亦大也唯王者向明出治所尚者大乃假故曰王假之夫王者尚大而此卦離明在下雷動在上離既在下非但不是日中且將晦矣雷既在上非但日中不見日亦且有隂雲晦雨矣方憂其不明无由動作而況求於豐大乎不知日中則昃而日昃則又必中雷動則晦而已過則又必明但憂无日勿憂日之不復中但憂无王勿憂王之不假不能大徧覆以四照乎天下也故曰勿憂宜日中宜照天下也豐盛大也以明而動盛大之由也又雷電交作有盛大之勢乃豐之象也故曰豐亨者豐自有亨也非豐後方亨也勿憂宜日中一句讀言王者至此當自有制治於未亂保邦於未危者焉以豐治豐宜日而中日中固照天下然豈長日中哉日昃則不能照矣孔子乃足之曰日至中不免於昃徒憂而已文王已有此意但未發出孔子乃足之初爻雖旬无咎周公許之之辭過旬災也孔子戒之之辭過旬災者言盛極必衰也因卦辭宜日中一句故爻辭皆以日言六二有孚發若孚者六十四卦之樞紐信以發志者盡一已之誠信以感發其君之心志也九三明之極暗之極也尚可行乎左足前而右先折矣二之豐蔀見斗者應乎其昏昧也四之豐蔀見斗者比乎其昏暗也爻云吉者與初相應共濟其豐者也二五居兩卦之中明動相資又非豐蔀見斗之說矣此易不可爲典要也慶而有譽者舉慶則譽在其中矣豐其蔀本周公爻辭今上六將豐蔀二字分開則知上豐字乃豐之極下蔀字乃豐之反矣故小象上句以爲天際翔也閴其无人者户庭寂靜而无人也泰之後而城復於隍豐之後而閴寂其户處承平豈易哉艮下離上卦二五兩柔據用事之地而三四兩剛寓於其間一剛上横爲廬巢之象一柔下立爲𤨏役之象所以爲旅旅以得中爲貴柔順剛止麗明便是旅之中道卦惟二五得中三上過中初不及中四雖无太高太卑亦以未中而不快也易凡言刑獄之事都以明爲主本唯明克允來人情羈苦之甚莫如刑獄聖人唯體人情決而不畱人得反其故廬矣旅以麗五爲正初去五遠應四旅臣而處不正故不勝𤨏𤨏自取其災六二僅備旅善澤不加民非道德之罪終不足以尤之三戒處旅失道其義喪則非人之罪也九四旅臣之小者然上无剛陽之與下惟隂柔之應不能伸其才行其志其心不快也六五旅士以窮修博逹用有文明柔順之德在旅而上下與之故終有譽命也雉譽命皆離象以義焚見非命之罪旅貞二字是一卦之主有居有行道无處可離也張湛虚曰旅之道不越乎貞貞之義一在乎柔得中乎外而順剛柔介乎二剛旅恃也然卑則取辱亢則取禍惟中而順則柔用剛亢而燥則剛禍柔矣旅之所以貴柔中也一在乎止而麗乎明得所止旅主也明而往擇而依无隂事无私交内不失已外不失人矣趨危地比匪人旅之貽禍莫及也旅之所以貴擇止也以茲而言小亨就旅言也吉則貞之濟也聖人見難處者旅之時難盡者旅之義所以用剛柔經權之中觀虚盈消息之㑹也其繫甚大以此興以此喪不可不愼也王龍谿曰火之在山明无不照明而止慎之象也火行而不處不畱之象也旅皆逆境莫甚於囚之在獄獄者不得已而設豈可留滯久淹也明照如火愼重如山凡客於外之爲旅天子有天子之旅天王出居於鄭是也諸侯有諸侯之旅公在乾侯是也大夫有大夫之旅陳文子之他邦是也聖賢有聖賢之旅孔子之轍環孟子之歴聘是也劉用相謂文王旅於憂患獨親切而有餘思故曰旅𤨏𤨏斯其所取災又曰旅于處得其資斧我心不快傷哉旅乎非文王其誰當之夫子旅於東西南北故曰以旅與下其義喪也以旅在上其義焚也上與下無一可者矣劉念臺曰仕止之外又有旅之一途處其變局焉正君子所恃以審去就之機者亨取其小不多求於世故也旅貞者旅自有旅之貞則處變之道非可以尋常論也諸爻言旅不言人旅而歸止言旅上九旅人不復有歸矣故凶巽下巽上巽主更化易之言更化者三卦蠱承前弊大事更化夏少康周宣王以之巽承前弊小事更化殷盤庚以之革則大人虎變順天應人湯武以之故蠱革言元亨巽言小亨非大事不亨而小事亨之謂申命行事无兩截行事必申命也以入爲主君心與民不入則括礙難行命不申亦不入須以中正爲主初之柔欲進復退不武甚矣象志字重㸔治字當味治一身治天下皆先治志志治則何疑不解牀以安身巽在牀下以陽居隂深自挹損過於巽者也然非有邪心用史巫以通誠意於神明故吉而无咎程傳陽居中爲中實之象三過剛不中志窮於躁故有頻巽之吝四之地本有悔以能巽於上下二陽故悔亡而復有功三品者一爲乾豆一爲賓客一以充庖九五政美於善更以貞爲主先庚後庚正發貞處貞者程子以爲正中是也上九罪更化之失斷者資所有也斧以斷也陽剛以過巽而喪其資斧故疑之曰得爲正乎復斷之曰凶也說者曰風爲天之號令命乃君之風行大君有命三令五申欲巽以入之故重巽以申之卦惟九五陽剛中正獨居重巽之位故曰重巽以申命然非九二以剛居下巽之中能巽乎五之中正亦未必能使柔皆順乎剛咸以五爲大人而興利見之思咸以五爲中正而志攸往之利而俾小者之亨一至是也則所以使九五申命之志大行於世眞若風行草偃然者九二下巽之力實多俞氏曰甲者十干之首事之端也既亂而復治則又如其初故於蠱之甲曰終則有始庚者十干之過中事之當更者也始焉不善既更而後善故於巽之庚曰无初有終先庚三日後庚三日再三申命正謂慎有終耳是以終吉來矣鮮曰申命者所以曉諭於行事之先行事者所以踐言於申命之後實一事也念臺亦云視彖又增行事二字以見命非𤣥遠實可見之行事者巽之爲言入也無人不可入則無人不可用利見大人全是要令大人爲我用知此義者始可與行權兌下兌上兌以言乎說也王者說安天下有亨道焉然非以驩虞要結利於貞正貞者天之道民之心也說之大民競勸矣說字本廣彖辭就大處言君子法兌以求麗益從容講說而又切實體驗則心與理相涵身與事相安真說在我矣初九說體最下無係應發皆中節故謂之和象言疑疑者難自主張此最關竅微處不曰无疑而曰未疑以初之地位不與隂比也如九五雖中正然不免孚于剥矣着一未字良有深意見和之難也二與三爲比足爲孚累未免於悔幸有根心之說故云信志來兌此於在下之陽枉已求說凶之道也四近君之位從五正也說三邪也若剛介自守疾惡柔邪志寧而慶積矣五與上密比柔能剥剛若推誠相任厲之階也明皇於林甫孚其剥唐者高宗於秦檜孚其剥宋者以五所處之位正當戒也引兌居說之極窮說之巧總是心術曖昧不可測而可畏兌說也胡翼之曰不謂之說而謂之兌者聖賢感天下之心不可以言語口舌故去其言而爲兌也然民不可以徒說也若非剛中而徒柔說於外則不貞不貞則凶況於說之亨乎故六爻專言利貞之事卦四剛二柔初九以剛處下有和兌之象九二以剛居中有孚兌之象四與三上下異體猶疆界也故有商兌之象九五以剛處中所謂當位之大君也其處人也不但孚于兌已也雖其毁折而我剥者而吾孚信之唯恐有一之不獲焉其自處也不但口无甘說可喜之辭雖其身亦時有嚴厲難犯之色何嘗專以兌說爲事也其絶无說民之心如此然後民之欲爲我勞欲爲我死者相踵也乃六三直區區守其甘說以來之耳其不來者上六又仍欲以甘說引之終始務於說人是豈光明正大之爲一旦有急泮然以離將誰爲我死又誰爲我勞也其凶必矣嗚呼君子觀此可以知民勸之道矣劉念臺曰相解以說入後之消息也說而可亨不待言矣利貞慮其說不以道也隂進乎上故說柔道然也惟以剛爲主則說之正也充是道也可以大獲天人之助而民勸從之此說之大也精而用之其惟理義之說心乎此卦㸔得剛中柔外之德分明則二之孚同德者說而莫逆即不正者亦與而不失而吾之志則確乎可自信以信人者所以吉而悔亡也五之孚如堯時四凶罪惡未彰一以至誠之道待之正以自持信以御下以此孚於隂柔之剥正者未嘗不寛而心之所存則不勝其危厲焉坎下巽上或問曰渙之義散其難而去之非人心離散之謂若人心離散何云亨哉余曰人心不散難何由生渙有亨道自濟渙者推之也卦辭幽明一體也六爻君民上下一體也假廟王者之純心非以空文徼福然後无愧於孝子慈孫涉川王者之純政不以行險徼功然後无愧於父母元后至於貞始并其私意頗行渙之可以稱王於天下享帝立廟當與明乎郊社禘嘗通㸔初二相比二之位尊於初其賢亦過於初而初言用者二爲天下用二之用即初之用而初亦分其功矣故吉机者俯憑以爲安者也二目初爲机初謂二爲馬二急就於初以爲安則悔亡而得所願也三柔不中正有私於已之象然與上相應志在濟時能散其私以得无悔四以柔得位而上同别无比應此公爾忘私渙其羣黨者也四五二爻義相須故通言之君臣同功所以能濟渙也下贊美之辭在四已言元吉五惟言稱其位也王居與奔机相協在下爲机在上爲居濟渙之地一也上應乎三三居險䧟之極有傷害畏慎之象若能使其血去愓出功及於民則相臣渙民之害道盡矣說者曰内卦坤也而乾之一陽來居其中遂生水而成坎水生而不窮故曰剛來而不窮外卦乾也而坤之一隂得位乎外遂成風而生巽以上同於五之正位故曰柔得位乎外而上同乾坤交錯而風水生風水相生而大號作所以渙汗其大號者非君其誰而九五居中其風不動但見其翕聚精神以假有廟而已曷敢號也而況大號乎則所渙汗其大號者四實爲之矣夫君者出令者也風聲之所自樹也而使臣代之安得无咎然此一臣也乃大禹聲教訖於四海之臣也有臣如禹而又可以恭已南面無爲而治爲舜咎耶享帝立廟在國家盛時說非土崩瓦解之時也與王假有廟不同孔子在渙字上生出此意來言王者享帝而與天神接立廟而與祖考接皆聚已之精神以合天人之渙也六爻於隂陽爻位皆无所取見君臣間真有家視國身視民之意於天下事安得不濟高景逸曰上九應險而能濟險故渙其血使其去而遠出蓋與四五同功正應巽涉川而救險者亦有見下坎爲血傷害也渙其血散其害矣兌下坎上夫道中焉止矣於節得之節之亨爲其不侈焉以瀆天下之分亦不固焉以阻天下之情以甘爲貞而非以苦爲貞也苦節則无宣通之利且有潰裂之害不可爲貞尚可言亨哉中和之謂甘反此之謂苦且窮數度德行不相離數度即載德行之器德行即御數度之本議者欲无過不及也皆兼人已言之初九當節之時與四之大臣爲應有堅忍之節不輕露其藏二有剛中之應以其无應於上私比於三昵小忘大初户當閉而閉密機事者也二門當闢不闢失時宜者也初知通塞二不知通塞初知節二節非所節吉凶所以異也三不中正與二爲比憂患皆其自取四以柔正上承五之剛正安往不安五中正以通大都節是中道非特節欲亦當節理中則甘過則苦五所以爲節主也上猶有取者苦節之凶自踰不節之嗟中節之謂和和則安焉甘焉有恱心之理義而無害心之飢渴䟽水簞瓢厄塞憂患无之而不自得也又安有所謂苦哉見以爲苦則不安而不甘矣不可以一朝居欲免於窮與凶也豈可得乎卦辭苦節不可貞正謂節之亨而非苦也此卦剛柔分而剛得中是分坤之一柔以居下卦之上而爲兌分乾之一剛以居上卦之中而爲坎坎之一陽九五居之所謂剛得中而爲節之亨者故曰節亨亨者通也故又曰中正以通通則尚往而不窮而豈苦節者之窮焉而不通耶故夫子兩言其道窮天地聖人之道一節焉盡之矣無節則天地聖人之道立窮而況於人乎人道有取於節者表所守也有守則有爲亨道也苦節難貞病其矯也初九時處其塞不出户庭以養節也九二時可以通矣而門庭不出何爲乎不成其節者也初二一出一處之間可以定理義之中正焉雖不言節而節道甘苦於此睹矣甘則其道之亨也苦則其道之窮也蓋窮者亨之反亨則不窮窮則不亨由嗟而亟事改圖則安而亨矣由安而進之於甘中正以通節之主也道盡善矣如其不甘而妄意於甘喪節莫大焉凶之甚也故與其失之甘也寧失之苦甘易流苦乃堅也數度以制上下之等德行以議進反之則皆寧失之節無失之文兌下巽上人君所以與民物同原帝天同體者誠也茲卦全體之象柔在内而其中虚此心一私不容孚之地也二體之象剛得中此心萬理皆實孚之質也卦德内說一理渾融无矯拂也外巽泛應曲當有妙用也由體至用盡人合天以此同然感人邦其有不格化耶乘木外有實用舟虚内有虚心何川不濟議獄緩死正見君子惻怛之誠虞澤官也以主守不易爲信者也燕𤣥鳥春來秋去以隨時變易爲信者也初方立而遽求權故聖人許其爲虞難其爲燕他也者未離乎守而妄托於通嘗試非其所安尚與圎機有間是薄虞而非虞學燕而不燕兩失之者也虞燕二義只一豚魚可兼豚魚謂江猪也應風而動東風東張口西風西張口毫不容爽且不自知此信而天者也二五敵應本不易孚以君臣同德二不求五而五自求二猶鹤鳴於隂其子自和者豐遇配是兩賢相益中孚得敵是兩不肖相濟窮於通而不善學燕者六四以柔正近君當絶六三之私匹以應於五馬匹亡亦可次於虞者也五言有孚化邦之主也上九信不知變猶翰音欲一飛登天則窮於守不善學虞者也去豚魚則又遠矣張子曰中孚上巽施之下說承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理又曰子而孚化之惟中孚故能化其子亦唯中孚乃能應其母故曰中孚以利貞乃應乎天也王龍谿曰風感澤受中孚之象君子體天地好生之徳而議獄緩死中孚意也獄之將成則議之其將決則緩之然後盡於人心獄而曰議求其入中之出死而曰緩求其死中之生舜之恤刑禹之泣罪湯之祝網文王掩骼使非出於本心之誠其誰感之至誠之道可以蹈水火烈金石格天地而況於人乎況於鬼神乎王聽之三公聽之司冦聽之議獄也旬而職聽二旬而職聽三月而上之緩死也議獄兌象緩死巽象以一卦六爻言之爲中虚以二體之二五言之爲中實皆孚之象也又下說以應上上巽以順下亦有孚義中孚者信諸心也信諸心者信諸理也有見於理而信之乃所以信諸心也六十四卦無一卦一爻不以孚爲樞紐非孚則中不虚惡能實虚乃得實柔孚於剛也說而巽所以致虚也信及豚魚虚相感也乘木舟虚虚相濟也其實則理也理也者天也心之所以爲心也利貞之謂也艮下震上小過隂過於陽也剛大而柔小天下之常分也四柔居外逼二剛於中君弱臣強之世也此豈小人之福哉然小人自有小人之貞亦自有小人之利吾不敢不以大吉望之也能大吉則小過之世可返正矣爲小人謀亦爲君子謀也文王卦辭飛鳥二字承可小不可大遺音二字生宜下不宜上有飛鳥之象焉是嘆息時事壊亂事柄倒持以象則有逆而无順小過之義也以音則可逆而就順處過之道也此聖人因其勢而開導之義行之恭喪之哀用之儉皆事之小而宜過者正所謂過而不過初六與九四之陽相應初隂急於上進不量可否四不能爲之應其凶可知卦中四隂猶翼之虚二陽猶腹之實如飛鳥之形鳥爲物小飛鳥只是小過二字以凶非鳥之凶乃世道之凶不可如何如言不奈彼何六二與五居相應之地同有柔中之德志不從於三四故過四而過五是過其祖也遇妣遇臣猶坤所謂妻道臣道君不可過而祖可過人能蓋祖父之愆其祖父孰不願之九三應上六然弗能過弗過者弗能勝之也既弗能勝又不肯與之相遇而猜嫌與居防之至或從而戕之者至矣九四剛而能柔初隂在下已在其上雖弗能過而能與之遇自免其害勝九三矣六五柔而得位然不能取四陽剛之善惟二之隂柔是聽好從所教而不從受教也上六下應九三憑高陵物弗與之遇而直過之飛鳥離之相去益遠之象過則不遇遇則不過意正相反來矣鮮曰上經終之以坎離坎離之上頤與大過頤有離象大過有坎象方繼之以坎離下經終之以既濟未濟既濟未濟之上中孚與小過中孚有離象小過有坎象方繼之以既濟未濟文王之序卦精矣離下坎上後天坎離代居先天乾坤之位故上下經皆以坎離終明其爲天地用也卦名既濟者水火之用得於交也未濟利用大作濟矣猶復好大求通適以致塞惟兢兢小心而後盛治可保是既濟之亨亨於小也小非以自隘有道焉剛柔無常用用惟其當方濟之初大抵以謹畏善治既濟之後則多以侈漫生亂是貞於初之時易貞於終之時難所以利於貞也利貞正明亨小之意初吉終亂又明利貞之意節節相承說盡保濟之道彖辭釋治濟而及所以保之二五皆中五又君位不取剛中而取柔中何也剛中俯就其事易柔中企及其事難且柔中不廢弛與終止正相反也此四句言治亂之機不盡由天由心造也君子思及終亂之患則當防之未亂之先庶可常保其濟矣既濟之初人心甫定宜静不宜擾也初九剛正而位當不敢妄動故有曵輪濡尾之象曵輪濡尾與未濟不同未濟之濡尾失其戒謹初九之曵輪濡尾正是戒謹六二程朱謂九五上應不能下賢以行其道故有婦喪茀之象邇有謂言應而不及比恐其義未完象義云六二稱婦已尚於五矣初乃二之所麗以生明者初曵其輪則二不得獨進故有喪茀之象但中道在二矣初能合乎卒偕同升之願有不待逐而後得者此得中之所致非有要於三併非有要於五也三年克之戒喜功也在初尚曳其輪在二尚戒其逐時至九三濟且半矣可躁動乎待其自憊不期近功庶乎王者之師矣六四備不忘儆兼應比取義大臣責在保濟而以柔正應比剛正故有衣袽終日戒之象九五有中孚之德張子曰東鄰上六也西鄰六四也過於濟厚也幾於中時也祭而合禮雖薄受福九五既濟之主舉上與下其義之得不言而著也上六以隂柔居濟極言濡首與初之濡尾正相反濡尾以戒謹而不輕濟濡首則不知謹戒而溺於濟即初吉終亂之意也楊誠齋曰已濟大川自謂没世无風濤之虞矣不知濟其一又濡其一求載无舟褰裳憑河不溺其身難矣卦中每言小亨未有言亨小者今既濟而曰亨小蓋言亨於既濟之後必小而非大大則終亂反不如小之初吉耳文王曰終亂孔子曰終止則亂人之常情處平常无事之時則止心生止則心有所怠而不復進亂之所由起也處艱難多事之時則戒心生戒則心有所畏而不敢肆此治之所由興也可見非終之爲亂終止則亂聖人贊易之旨深矣天下事最忌十全如剛柔正而當位六十四卦獨居其一焉豈不是最難得而反有最不美者存乎其間正爲這十全中伏許多病痛在以人事言之怠勝敬則凶此人道以理而窮也以天運言之盛極則必衰此天道以數而窮也以卦體言之水在上終必潤下火在下終必炎上此卦體以勢而窮也今當既濟之後止心易生豈不終亂故曰其道窮聖人通變於未窮舍思患豫防无術矣終止則亂雖有時數卦咎人事而已坎下離上易之道以未濟終焉未濟則未窮也未窮則有生生之義此天地之道也亦聖人之道也但未得濟而遽求濟此小子不智之極者之所爲卦辭所謂小狐汔濟濡其尾无攸利總戒其不知敬愼昧於求濟之道材不足曰小志不果曰狐敢望其亨乎見小懐疑汔然躁濟徒負氣而輕進必内索而不終惟始不慮終故終不續始所以濡其尾而无攸利也辨物居方如水火本一氣而分兩物雖兩物而實相用者是未濟而寓相濟之理者也初六隂柔四不能援不度力而進終不能濟不智極矣九二知之獨曵其輪而不濟故爻言貞吉象復言行正六三尚未離坎未可便征然有强援於上故利涉大川非義躁進凶之道也四有剛陽之德廹近至尊五既有孚於四四遂震用以伐不順四信五而往征五得四而濟坎蓋有其君必有其臣有其臣必濟其事未濟者終當既濟而自然利涉大川也此未濟之所以亨也言未濟之時自然必有能濟之人能濟之人自然必用能濟之臣能濟之臣自然必有能濟之日濟則亨矣故曰未濟亨柔得中也柔而得中是以能得濟險之人而孚之君子之光有孚實以有孚於四而餘光及四也暉光一般皆是離火之象但就君子身上論之則爲光就承君子者觀之則爲暉兩吉字上吉根自修下吉根取人上九亦賴六五之有孚享既濟之大業飲酒燕樂未即有咎但濡染於三則與既濟之上六等矣其勢必失是既濟之業有孚之光也從來君喪邦臣亡家以既濟而遂懈而不知未濟之隨其後也聖人之慮世也无一日而非既濟之時則无一日而非未濟之心无一時而非未濟之日則无一日而非欲濟之念是故既濟未濟合爲一卦而易道終矣既濟先濟人主王道未濟先濟德主聖學外王者内聖之緒故以未濟終焉水火不交不相爲用六爻皆失其位故爲未濟未濟反可以得亨卜其終也六五柔中六爻有剛柔相應之義雖不當位從十不全中討出十全事業最妙在相應處相應所以相濟也前卦既濟之初吉者已然之亨也柔中之善於守成者也此卦未濟之亨者未然之吉也柔中之善於撥亂者也劉念臺曰鬼方之役欲其下交於坎也既濟利克未濟利交交於君子故言賞與勿用之旨逈異飲酒言孚實信得是故也夫道是而已矣濟之爲道待時而濟非不濟也飲酒濡首則坐失事機者有之無乃孚其所孚而非其是之孚乎讀易大旨卷二
