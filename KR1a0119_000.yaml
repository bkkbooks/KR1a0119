  text: 欽定四庫全書經部一
  hash: sha256:5111095677a17a819f758c15b1f1277a321ca96156d9a58f561e94ee59984d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0119_WYG_000-1a, image: WYG0039/WYG0039-0001a.png}
body:
  text: 讀易大㫖易類提要臣等謹案讀易大㫖五卷國朝孫竒逢撰竒逢字啓泰號鍾元又號夏峯容城人前明萬厯庚子舉人國初移居河南蘇門山聚徒講學以終是書即在河南所作自云至蘇門始學易年老才盡偶據見之所及撮其體要以示門人子弟原非逐句逐字作解故曰大㫖門人耿極為之校訂末附兼山堂問答及與三無道人李崶論易之語别為一卷崶雄縣人奇逢所從學易者也竒逢說易不顯攻圖書亦無一字及圖書大意發揮義理切近人事以象傳通一卦之㫖由一卦通六十四卦之義凡所訓釋先列已說而後附以諸說其平生之學主於實用故所言皆關法戒固非鉤棘竒偶繪畫黑白使聖人垂教之書化為星圖奕譜象表算經者所可倣佛也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書讀易大㫖卷首容城孫竒逢撰總論自乾坤弗屬皇虞系渺尼山有作大象爰立専其事於人以詔萬世事天地之事者蓋天有事地有事天地各不能終其事以待參贊位育之至誠此天地之所以不毁而易之所以不窮也孔子統體是易易即時中也天地萬物不能盡易之藴則千古聖賢不能盡中之藴孔子欲假年學易蓋實體易之理故極贊易之妙所謂惟其有之不覺其言之親切而有味學者欲知易須知孔子六十四卦三百八十四爻孔子之所以為孔子者全在於此如健而無息之謂乾聖人上律天時以自強不息天與孔子有二乎坤厚載物德合無疆聖人下襲水土以厚德載物坤與孔子有二乎易為六經首乾為諸卦首乾元亨利貞為繫辭首即坤且統體於乾餘六十二卦何一非易知簡能之作用處屯之世必思濟屯故濟屯之道不外經綸當蒙之時必思發蒙故發蒙之方必須果育需須也事之當須者不容更有所為故飲食宴樂居易以俟之而已飲食者必爭之物訟所由起也作事謀始嚴杜其隙末凶終之端則訟無由生矣師衆也一陽為衆隂之主而在下將帥之𧰼也容民畜衆師之道豈有外焉者哉比輔也以一陽為衆隂之主而在上君之𧰼也建國親侯比之義豈有大焉者哉小畜謂以小畜大君子見畜於小人小人之幸而君子之不幸也以懿文德既不失獨行之意又不傷羣小之心蓋君子之所藴畜者固自大耳履者人所履之道也上下各得其義事順而理當天下可得而治也世之不治由公卿士庶紛然交騖於利故君子以辨上下定民志泰通也天地交而萬物通君子道長故財成以制其過輔相以補其不及所以防其否者當無不至然物終不能不否上下隔絶不相交通小人得志君子居顯榮之地災必及身故儉德避難人不得以祿位榮之同人者與人同力事乃能濟謂能通天下之志而非以私情相合也類族辨物正於人之不同中得大同耳大有者所有之大也有既大釁易萌君子享大有之盛當代天理物遏惡揚善所以順天命而安羣生也謙者有而不居不自居于有乃能終其有裒多益寡則物情平而凌競之意消故尊而光豫和樂也上以順動民自悅服於稽其時其夏后殷周之盛乎薦上帝配祖考禮有殷薦意在斯隨從也君子之道隨時而動從宜適變不可為典要嚮晦入宴息起居寢興順其則也蠱事也治蠱亦事也蓋蠱能困庸衆而不可以困豪傑從古以多難而興豈少其人哉故君子以振民育德臨者大也可大之業由事而生故君子臨民臨事以教思則至誠無斁以容保則廣大無疆物大然後可觀人君修德行政為民具曕可苟焉而已乎觀視民俗設為政教先王省方以之噬嗑謂有所間必去其間而後亨先王以明罰敕法賁飾也物有飾而後能亨君子以明庶政無敢折獄有間曰利用獄所以究其間之情也有飾曰旡敢折獄所以戒其明察之用也剝落也上之剝必自下下剝而上危矣治剝之道上以厚下安宅本固而邦寧矣物無剝盡之理剝極於上而復生於下天地生物之心於此可見故當安靜以養微陽商旅不行后不省方乃所以順天道也無妄者至誠也天之道也天道生萬物各正其性命而無妄王者體天之道養育人民以茂對時育萬物大畜者大其藴畜也人之藴畜由學而大故君子多識前言往行以畜其德頤者養也養德養身言語飲食其最要焉者矣君子敢以其近也而忽之大過者不常見之事也非常之原黎民懼焉故君子以獨立不懼遁世無悶坎者重險非有孚何以能濟然亦不能以驟而相孚故君子以常德行習教事離麗也麗於險難之中必有所附麗重明以麗乎正所以能亨故大人以繼明照四方上經以乾坤為首天地之道也天地萬物之本一大夫婦也下經首咸恆取夫婦之義焉夫婦人倫之始一小天地也造端夫婦察乎天地豈有二道與咸感也以說為主恆常也以正為本而說之道自宜正正之道固有說以虛受人中無私主則無感不通立不易方常久其德自立於大中不移之地遁退也三百八十四爻未有以退而凶者然身既退矣而猶與小人競豈遁世無悶之意不惡而嚴遁中當自有作用在物不可以終遁盛衰相循勢必壯大大壯者剛以動自勝之謂强中庸所謂不流不倚者與非禮弗履非君子之大壯其孰能之物壯必進晉進而光明盛大之意也君子去蔽致知自昭明德蓋古人明明德於天下總之自明其明德耳進必有傷明而見傷故用晦而明晦而明較明而明者事更難而心更苦非文王箕子其孰能與於斯家人次明夷明於內而巽於外處家之道也父子兄弟夫婦各得其道家國天下夫豈有外焉者乎言有物而行有恆謂身修也睽者乖違之義然物雖異而理本同處睽之時合睽之用其事至大故君子以同而異於其同見秉彛之公於其異見無隨習之失耳蹇難也上下險阻非聖賢不能濟天下之難順時而處量險而行則險皆易也故君子以反身修德難極必散解所以次蹇也動於險外出乎險也王者法天施恩故以赦過宥罪損有損下益上之義聖人之道所當損者忿則懲欲則窒是損之而猶恐其或益者也益有損上益下之義聖人之道所當益者善則遷過則改是益之而猶恐其或損者也夬者决也當潰决之時君子以施祿及下然不可自居其德自以為德則歡虞而非公溥矣姤遇也天地相遇則萬物生君臣相遇則政治興周遍庶物則事功成故以施命誥四方夬以衆陽决一隂姤以一隂遇衆陽此皆幾微之際天道人事詎可忽諸萃聚也物相萃則成羣凌競爭奪之患所不免矣故君子以除戎器戒不虞升進而上也學之充業之廣皆積纍而至故君子以順德積小以髙大困者窮而不能自振從古聖賢豪傑正於拂鬱險難之中愈堅吾樂天知命之義徒恐懼於危難隕穫於窮厄所守亡矣致命遂志雖困亦亨也井之為物常而不可改也汲之不竭存之不盈故有取於養之義君子以勞民勸相勞民者君養民勸相者民相養其於古井田之意有遐思焉革者變其故也天道人事有不容不革者四時不變何以生萬物而成歲功湯武革命所以為順乎天而應乎人也治歷明時亦法乎天而已鼎謂鼎新取象於法物而極其用之大以享上帝以養聖賢義固大矣哉君子以正位凝命有凝聚而止之義猶湯盤所銘新新不已也協於上下以承天休正在斯震動也繼鼎之後主器之人有動而發憤震驚之義自處有則君子畏天之威故以恐懼修省艮止也物無常動之理當其動而靜之體自若當其止而行之意依然行止動靜與時偕行則止而安矣故君子以思不出其位漸進也進而有序則無凌節凡進於事進於德進於位各有攸當故君子以居德善俗歸妹者女之歸也是天地之大義人之終始也君子觀男女生息相續之義知天下事莫不有可繼可久之道故以永終知敝豐大也以明而動動而能明致豐之道也然豐不可常君子憂之宜普照天下故以折獄致刑噬嗑言先王敕法豐言君子折獄以明在上而麗於威震王者之事故為明罰敕法以明在下而麗於威震君子之用故為折獄致刑顧可忽乎哉旅羈旅也處旅之道不越乎貞貞之義一在乎柔得中乎外而順乎剛聖人見難處者旅之時難盡者旅之義故以明愼用刑而不留獄紫陽曰愼刑如山不留如火蓋愼自不容留非兩層也巽入也能巽順則無往不入命令政事順理則合民心而民順從矣故君子以申命行事兑說也物相入則相說相說則相入兩澤相麗互有滋益故君子以朋友講習先儒謂天下之可悅者莫若朋友講習渙散也收合人心之渙使有所歸無如宗廟祭祀之禮為仁人孝子享帝享親之實故先王以享帝立廟皆所以合其散也節有限而止也人欲無窮非節則侈肆故君子以制數度議德行夫豈有傷財害民者乎中孚信也信而後能行中虛信之本中實信之質君子以議獄緩死天下之事無所不盡其忠而議獄尤其最大者也小過者過其常也天下之事亦有待過而亨者行過恭喪過哀用過儉當過而過乃其宜也不當過而過則過矣既濟者天下萬事已濟之時也勢極必反道窮則變患害之生正在此時矣故君子以思患而豫防之未濟者水火不相濟為用非其處也辨物居方使各止其所焉夫既濟矣物之窮也以未濟終則有生生之義吾因知天道之盈虛消息聖人之進退存亡皆莫之為而為莫之致而至者也自乾坤之後始涉人道經歷六坎險阻備嘗內有所畜外有所履然後致泰而泰之後否即繼之剝復革鼎相環無窮以此知斯人之生立之難而喪之易國家之興成之難而敗之易天下之治致之難而亂之易此又序易者之深意而亦天地自然之理也或曰隂陽交運否泰相仍時勢然也雖艱貞勿恤如之何聖人於此有微權焉夫易之道不獨令小人不得毒君子且欲化小人為君子平陂往復者天運之不能無艱貞勿恤者人事之所當盡天人有交勝之理處其交履其㑹者必盡變化持守之道即天田兩失飛躍不勝而水火不災蠱革不蝕若一諉之天運以為無預於人事則聖人之易可無作矣讀易大㫖卷首
