body:
  text: 讀易大㫖卷三容城孫竒逢撰繫辭上傳天尊地卑一節言天地對待之體剛柔相摩一節言天地流行之用乾以易知一節言人成位乎天地之中則天地之體用皆存乎人矣此三節孔子原易之所由作通未說到易上去何以言天地對待之體蓋未畫易之前一部易經已列於兩間故天尊地卑未有易卦之乾坤而乾坤已定矣卑高以陳未有易卦之貴賤而貴賤已位矣動靜有常未有易卦之剛柔而剛柔已斷矣方以類聚物以羣分未有易卦之吉凶而吉凶已生矣在天成象在地成形未有易卦之變化而變化已見矣聖人之易不過模寫其象數而已非有心安排也捷解云五矣字便涵易簡之意蘇氏曰言在者明其出於一也二節何以言流行之用一施一受易之氣也言天地萬物惟有此對待故剛柔八卦相為摩蕩於是鼓雷霆潤風雨日月寒暑運行往來形交氣感男女於是乎生矣故乾所知者惟始物坤所能者惟成物乾坤之氣初無始終著物乃有始終非乾只管前截坤只管後截譬立主意始終屬乾著氣力始終屬坤特以知能分始成耳已泄易簡之意矣三節何以言人成位乎天地之中乾惟知大始是乾以易知矣坤惟能成物是坤以簡能矣人之所知如乾之易人之所能如坤之簡則是所知所能者皆性分之所固有職分之所當為豈不易知豈不易從易知易從自然有親有功有親有功自然可久可大易之理一也知能取譬一身兩用共成一身明其為一也乾坤一體人不能信取譬兩用合一親切易曉開發仁人一體天下之量以生理得成位之意知乃身之精明靈爽能則身之才力強幹見有理一分殊各就條理各得其所之妙用成位其中上下與天地同流也聖學全功止此此全經之總領也易道雖本之天地而實具於聖人之一心以聖人之心具有天地之全體也劉念臺曰夫子首贊易道而推本於畫卦之原如此分明是一座伏羲道像右第一章第二章設卦觀象方言易設卦者文王周公陳列六十四卦也象者物之似總之有一卦之象析之有六爻之象故易盡之象象盡之像其象也二而一者也觀此象而繫之以辭以明一卦一爻之吉凶剛柔相推者卦爻隂陽迭相為推也柔有時而窮則自隂以推於陽而變生矣剛有時而窮則自陽以推於隂而化生矣易之為道不過辭變象占四者而已易言吉凶在人為失得之象易言悔吝在人為憂虞之象憂則困心衡慮漸趨於吉亦如悔之自凶而趨吉也虞則志得意滿漸向於凶亦如吝之自吉而向凶也變化剛柔以卦畫言進退晝夜以造化言三才即六爻言六爻之變動乃三才極至之道理如此也上二節言聖人作易之事此二節則教人之學易也學易者學文王六十四卦之序君子所居而安者也學周公三百八十四爻之辭君子所樂而玩者也文王序卦有錯有綜變化無窮然皆本其自然之畫而定之非有心安排也故處而不遷誠居安而樂玩乎居觀辭象動玩變占則陟降一天天祐命之何不利之有何也所造者天也此後天之易專為定吉凶而發先天吉凶未露以其有易簡而未見險阻也後天則當反於先天故拈出三極之道及天字作主以承上章易簡以貞變化象中千變萬化無非吉凶之象辭中千言萬語無非使人崇易簡黜險阻趨吉避凶之道故吉凶之外立悔吝於其間以引人歸極責人悖極著之序繫之為辭約民於天道使君子習而玩之足以合天而吉無不利聖人之以神道鼓舞天下至矣卦立而象具因象繫辭因辭定占各有一定之理此易之體也剛柔推換變化生焉此易之用也合而觀之辭占象變皆象也得失憂虞專指人事言進退晝夜則人事所乘之時也六爻之動言皆自變來也三極之道所以象也此聖人作易之本也君子居而學易正為動時要用得著自天祐之自心自祐也夫子所以自道也右第二章易之道不以無言隱而以有言顯第非言無以開天下之䝉也故觀易觀所言有象焉得彖以言之而全體之藴顯矣有變焉得爻以言之而一節之藴悉矣象變中所言吉者必其材得而非幸言凶者必其材失而非不幸言悔吝者疵其小德之出入言無咎者善其自反而補過所言不同同為萬古開羣蒙耳用易用所存非知所存無以周天下之用也位有貴賤列之不淆卦有大小齊之勿亂辭有吉凶辨之勿混悔吝固言乎小疵矣然不可以小疵而自恕必當於此心方動善惡初分之時即憂之則不至於悔吝矣無咎固補過矣然欲動補過之心者必自悔中來也則悔之一念固學利者之所不廢而困勉者之所必有事也義固大矣哉介理欲分途也介在事前理勢方萌悔生事後以理圖勢陽卦爻為大若失德則亦小矣隂卦爻為小若合理則亦大矣總以理為衡耳所謂各指於所往之地也先明此卦爻並吉凶悔吝無咎五者之名義而後教人體此卦爻並吉凶悔吝無咎之功夫即申前章之意而又進於無咎之說是易道要歸處貴賤以上下言小大以隂陽言辭以至著者言介以至微者言而悔則介中得力處也聖人作易無非使人趨吉避凶而終之以善補過則悔為要焉右第三章且夫易何可以不學也何也彼其道於天地乎凖也天地之道至一而精而精者粲其該也至精而一而一者渾其統也至精至一者無窮盡方體而無窮盡方體者終竟而聨合之也彌綸焉爾也彌其外而大不禦天下莫能載也綸其中而細不遺天下莫能破也蓋易以道隂陽隂陽之道不過幽明死生鬼神之理而已今作易聖人仰觀俯察知幽明之故原始反終知死生之說知鬼神之所以為鬼神者乃精氣為物游魂為變也故能知其情狀夫天地之道不過一幽一明一生一死一鬼一神而已而作易聖人皆有以知之此所以易與天地凖也聖人於天地之道豈特知之即與天地相似而不違矣何也天地至大不能過者也聖人則知周萬物而道濟天下故與天地同其不過天地無心而成化不憂者也聖人則旁行不流樂天知命故與天地同其不憂天地以生物為心能愛者也聖人則安土敦仁故與天地同其能愛是三者皆與天地相似所以作易與天地凖也聖人既與天地相似故易能彌天地之道聖人範圍天地而不過亦能彌之易能綸天地之道聖人曲成萬物而不遺亦能綸之易能達幽明死生鬼神之道聖人亦能通乎晝夜之道而知之此章本義分理性命為綱矣然理通性命而理為主則性即理也盡性可以包至命至命亦本於盡性勘得透則神無方而易無體不辨而自明矣故字當味見性命之理當離合觀之離觀則性自性命自命理氣不相混合觀則性能命氣而無方氣命於性而無體易書凖天地之道而作故有彌綸之用準之為言則也易能彌綸天地是以君子學易必求端乎天地而其大者在隂陽之辨天地之道莫非隂陽之所為則幽明之故於此覩矣遂進而求所為幽明之故其間自明之幽一始一終相為循環原且反之以推氣數之自然而死生之說莫詳於此矣又進而求所謂死生之說始無所始聚則成形者是終無所終散則成變者是總是一氣之屈伸以為終始之運而鬼神之情狀昭昭乎不可掩矣則亦何莫而非易書之所藴乎劉念臺曰幽明始終如方來者進成功者退是也先儒以人物指之已是狹隘至後人則専言七尺之成隳而以原始為父母未生前參究反終為眼光落地後參究遂有了生死之說凖之大易何啻千里死生之說只原始反終四字已說得明盡未知生焉知死人多言孔子不告子路程正叔曰此乃深告之也即原始反終之義右第四章朱子說未有天地之先畢竟先有此理是道在隂陽之前也程子說在物為理謂有物方有理易以道隂陽其理止此矣故曰一隂一陽之謂道又曰道非隂陽也所以一隂一陽者道也此即所謂隂陽不測者也正與神字相貫繼之者善是天之所以為天於穆不已者謂此純粹之善也成之者性是人之所以成人純亦不已者謂此天命之性也此天人合一之源孟子道性善正從此看出夫曰善曰性莫非道也此個義理亦不少亦不剩只是人看他不見仁者又看做仁了知者又看做知了百姓日用而不知君子之道所以鮮矣道不可以仁名而知始之知常顯諸仁道不可以知名而作成之能常藏於知仁曰顯用曰藏互言之也不憂者乾以易知坤以簡能無心而成化有何所憂富有者無物不有而無一毫之虧缺日新者無時不然而無一毫之間斷天地以生物為德以成物為業此一隂一陽之道在天地者也陽生隂隂生陽生生無窮此則一隂一陽之道在易書者易之所由名者也成象之謂乾效法之謂坤此則一隂一陽之道在卦者也究極此一隂一陽之數以知來則謂之占詳通其一隂一陽之變以行事則謂之事此則一隂一陽之道在卜筮者也若其兩在不測在隂非隂在陽非陽不二為常非隂能隂非陽能陽不一其行方陽倐隂方隂倐陽不主故常此豈有方哉無方豈可測哉故不測曰神也嗟夫此易理也通章十一個謂字凡言之謂與中庸性道教一例是明已然者不著講說凡言謂之與中庸中和一例是明未然者須著講說一隂一陽貫到底一隂一陽専就人心中指出一氣流行不已之妙而得道體焉繼善謂自靜而動一念惺然而善端於此呈露也成性謂自生而成一理凝然而善體於此備具也此正隂陽分現之體而仁知各就所見名之局於隂陽非道之統體也欲觀君子之道先觀天地之道有時自元而亨以鼓萬物之出機見仁之顯處有時自利而貞以鼓萬物之入機見用之藏處此全體大用所謂以盛德顯大業不與聖人同憂轉見聖人能法天地處天地之道生生之道也生生之謂易易即仁仁乃生生生生不已而形象分則隂陽之體已立乃所以為富有也生生不已而占事在則隂陽之用以行乃所以為日新也如此生生不已而一隂一陽之妙莫測所在是之謂神此君子體道之功非泛言人事造化也右第五章易之道合天高地下萬物散殊而一之廣莫廣焉大莫大焉一與天地準焉者也言逺乎六合之表千載之後此理充然而有餘言邇乎瞬息之頃几席之間此理凝然而各足以言乎天地之間無體無方而無體非其體無方非其方也安所不備乎易之所以廣大者一本於乾坤而得之也蓋乾畫竒不變則其靜也専變則其動也直坤畫偶不變則其靜也翕變則其動也闢是以大生廣生焉易不過摸寫乾坤廣大之理惟其廣大原於天地故易之廣大亦如天地之廣大易之變通亦如四時之變通易之隂陽亦如日月之隂陽蓋四時一天地之運也日月一天地之精也總之皆天地也乾坤之靜即是先天乾坤之動即是後天動靜無時離隂陽蓋先天後天無時而離隂陽也離之則各自分開乾坤息矣然皆靜為主故聖學主靜知此可以達天天地之大德曰生廣生大生乃其大德也而有至德主之其在易簡乎配乾道之易知而無私心者配坤道之簡能而無私為者孰謂易之易簡無本原乎不禦者無逺不到而莫之止也靜者無安排布置正者六十四卦皆利於正也備言該括無遺下三句正形容廣大大只是大生廣只是廣生而其理分見於動靜之際如此靜翕動闢即靜専動直之有終處非二事也配者相似也非配合也蓋易本摹寫天地而作故一一與之吻合此直指心易之藴右第六章此言聖人以易而崇德廣業見易之所以為至也蓋六十四卦三百八十四爻皆理之所在也聖人以是理窮之於心則識見超邁日進於高明而其知也崇循是理而行則功夫敦篤日就於平實而其禮也卑崇效乎天則崇之至矣故德崇卑法乎地則卑之至矣故業廣所以然者非聖人勉強效法乎天地也天地設位而易行乎其中矣程正叔曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣易是個甚只是盡天理便是易也成性存存道義之門亦是萬物各有成性存存亦是生生不已之意道無體義有方也聖人善學天地全在於易求易於易何者是易求易於心無之非易心之所在即性之所成而聖人第以存存而不已者濬心易之源則道義皆從此出而德以之崇業以之廣轉若一一於易書有藉夫子假年學易曰可以無大過只一無過則德之崇莫崇於此矣業之廣莫廣於此矣右第七章象爻何謂也羲文周公三聖人見天下之理不徒有賾動之事物寓焉而實有非賾非動理之宜且通者主之矣賾動在既有天地之後未立卦爻之先而聖人見其事雖至賾而理則至一事雖至動而理則至靜故賾雖可惡而象之理犁然當於心則不可惡也動雖可亂而爻之理井然有條貫則不可亂也是以學易者比擬其所立之象以出言商議其所變之爻以制動則語默動靜皆中於道易之變化不在於易而成於吾身矣故舉鶴鳴以下七爻皆擬議之事以為三百八十四爻之凡例云或問宜與通何辨曰理都一般但在卦則一物單出故不必言㑹通在爻則乘承比應交錯故須於㑹聚處擇其可以通行無礙者先有形容後生物宜㑹通是時中典禮是庸行爻視象為詳密都本乾坤之理為主首引中孚者誠也言行為成變化之本誠又言行之本也言行本來之理原關天地故可以動天地同人以同為貴蓋君子之出處語默其迹逈乎不同矣然自其心觀之各適於義成就一箇是而已藉用白茅以至薄之物而有可用之重此慎之之術也慎得此術以往天下事又有何咎焉孔子教人以慎術即孟子所謂仁術九三勞謙德盛禮恭本君子修身之事非有心為保其祿位然致恭則人不與爭勞爭功所以勞謙有終吉也不出户庭無咎何也蓋亂之所生皆言語以為階凡天下之事有關於成敗而不可告人者一或不密則害成君子慎密不出户庭者以此小人而乘君子之器慢藏誨盜冶容誨淫易之言正招盜而誨之之意也作易者不歸罪於盜而歸罪於招盜之人此所以知盜凡七爻乃孔子擬議之辭也擬是心中比度議是心中計處非逐卦逐爻比計總是易理渾融於心故隨處隨時頭頭是道大端不離言行貴同貴慎貴謙皆所以善其言行也戒亢戒不密戒慢皆所以防其言行之失也擬議以成變化如此天地間之成象成爻吾身中之一言一動是也故君子學易之功求之於言動者為最切亦僅以開寡過之門而變化之理即從此出易簡之外無神化也六爻引義其間曰善曰同曰慎曰恭曰密一步進一步至於負販射利之小人分明指出病根其示人之意最為痛切凡為學人宜書一通於座右右第八章此章言天地筮卦之數而贊其為神也首節主天五地十統生成二天象先無極數尚未有圖書八卦圖書是象後有極自相表裏天數至鬼神圖之裏兼神易而裏之成象之道也大衍至成卦書之表兼神易而表之效法之道也小成至能事合圖書而作易通於成文定象顯道神德行節合圖書而體易通於參兩倚數書數五十非突出根圖象五十轉根天五地十耳圖書五統先天八卦十統後天八卦中虛神極之象則二天之主也論神於象先妙無方而絶名迹論神於象後寄虛中而制無窮神者理而已與鬼神不同鬼神分隂陽神專太極隂陽非神理則墮幻氣入異端矣嗟乎易不可見而世之所傳以為用易之道獨此天地大衍之數揲蓍求卦之法然亦略矣愚謂能用易者須能體易之人瀆則不告况乎南蒯之黃裳元吉易豈為小人謀哉四聖人之精神至今在通變化而行鬼神千載下孰能外之數始於一而終於十百千萬億皆十之積也陽竒隂偶分配天地數也而理在是矣自一至十天地衰旺之理也其法始陳之河圖所謂一六居下二七居上三八居左四九居右五十居中是也相得言圖數之分一內一外各得其位有合言圖數之合一竒一偶各配其情分處之而見隂陽之迭為變化合配之而見隂陽之互為變化天地之數必積五十五而後全觀之四時之運蓋可知矣此五行之說也五行之說即易四象之說也而圖數之妙合於造化固有如是者豈非易道之權輿而蓍數參伍之法之所自起乎右第九章易之道無一非聖人之道也何獨以四者言蓋就一蓍卦之間而辭變象占則四者正聖人之道也以用也非逐一尚之理融於心自一一與配亦歸在易道上看觀下文承以至精至變至神可知君子將有為有行問之於易易則受其問如對面問答之親切以决未來之吉凶逺近幽深無不周悉非其辭之至精孰能與此故以言者尚其辭參伍其蓍之變錯綜其卦之數通之極之而成文成象則竒偶老少不滯於一端內外貞悔不膠於一定而變化無窮矣非天下之至變其孰能與於此故以動者尚其變以制器者尚其象凡天下之物有思有為其知識才能超出於萬物之表者方可以通天下之故也今蓍龜無思無為不過一物而已然方感矣而遂能通天下之故未嘗遲回於其間非天下之至神乎所以以卜筮者尚其占總以辭變象占四者論之固至精至變至神矣然四者皆聖人之道而易有之故謂易有聖人之道四此章有五層至精至變至神是聖心之易卦爻辭占圖書變象是所作之易極深研幾是闡卦爻而發圖書作易之事無思無為能寂能感神易合一在圖書卦爻先是造化本來之易通志成務在作易後是斯民咸用之易有本來之易然後有聖心之易有易書之易有咸用之易井井條條一以貫之辭變象占是聖人作易大綱使後人尊尚之而不敢忽以開天下寡過之門者此也制器即動之已成者變者象之未定象者變之已成故象與變二者不離蓍卦亦不相離故參伍言蓍錯綜言卦所以十一章言圓而神即言方以智也右第十章此章言易開物成務冒天下之道皆出於天地自然而然非聖人勉強自作也首節何為者也如斯而已者問答之辭也物乃遂知來物之物吉凶之實理也開物者人所未知者開發之也務者趨避之事為人所欲為者也成者成就也冒天下之道者天下之道悉覆冒包括於卦爻之中也故以通天下之志定天下之業斷天下之疑總不出此次節神智易貢冒道之實也洗心非以蓍卦爻洗心却以神智易洗心而其所以洗心者只是無思之極若以易理洗滌然者爾洗心統聰明睿知為作易言也齊戒神明又以體易言也俱不干卜筮卜筮在前民用在後故曰前聖人明於天之道而察於民之故固興神物以前民用矣百姓見易之神明以為易深逺而難知也今取此户譬之闔則謂坤闢則謂乾即一户而曰變曰通曰象曰器曰法曰神易之理已在目前矣然豈特小者為然哉至於天地間至大之功用亦有相同者何也蓋易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是大業也所以成天下之亹亹者也試以其大者言之法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人此五者天地間之至大莫能過者也若夫探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹以生其大業者則莫大乎蓍龜夫以小而同諸一物之小而易非小也大而同諸天地功用之大而易非大也此易所以冒天下之道也易道如此豈聖人強作哉天生神物有自然之占天地變化有自然之變天垂象見吉凶有自然之象河圖洛書有自然之文章天地生此四象所以示聖人者至矣聖人繫之辭以告乎人定之以吉凶以决斷其疑皆非聖人強作也易雖冒天下之道道不在易而在我矣此章重斷疑疑則玩圖書弗信如道何故始終言斷卜筮之法相沿舊矣至其間一切配合造化處蓋亦偶㑹及此因借以尊聖人之教使人不敢䙝用耳讀聖人書要得其活潑之意夫子曰要盟神必不聽豈神向夫子作此語耶夫子一神也用易之人統體是易則聖人即蓍卦六爻矣凡吉凶之機兆端已發將至而未至者曰來吉凶之理見在於此一定而可知者曰往知來者先知也藏往者了然藴蓄於胸中也來者不知由往者未得了然藴蓄於胸中也氣運之盛衰廢興人事之得失休咎往事昭然來者可鑒夫子曰百世可知正所以驗往也藏往知來非二事用神而不用蓍用智而不用卦無卜筮而知吉凶猶神武自足以服人不假於殺伐之威此聖人之心易乃作易之本右第十一章自天祐之節釋大有上九爻義本義謂在此無所屬宜在第八章之末此章論易書不盡言言不盡意而歸重於德行也書不盡言言不盡意然則聖人之意終不可見乎蓋聖人仰觀俯察見天地之隂陽不外乎竒偶之象也於是立象以盡意立象之功用兼作易體易而俱盡故曰立象盡意下正詳之盡情僞盡言此有言之易盡利盡神駸駸達於無言之易此一貫之道也情是本來天真僞是後來人妄林氏謂循性而動為情拂性而動為僞是也合而言之設卦以來破一寰為諸有情僞並作一散萬也盡神以往消諸有於寰中情僞不生萬歸一也變通鼓舞只論聖人周身未及措之天下而意已該矣盡利是利仁盡神是安仁乾坤易之藴者謂乾坤藴於易六十四卦之中非謂易藴於乾坤兩卦之中也乾坤與易立則俱立一毁其列易既無據可見而乾坤亦幾息於天下矣奈終無可毁可息之理也則乾坤所繫於立象不甚要哉道器不相離如有天地就有太極之理在裏面如有人身此軀體就有五性之理藏於此軀體之中所以孔子分形上形下不離形字也首一之字指形後五之字指道化與裁推與行舉與錯亦皆活字化裁以下包得寬非専於易但作易是統宗之理姑就此發之方得分曉是故象之設也爻之設也既各有所由得名吾人欲究極天下之賾情僞不爽舍卦奚之欲鼓天下之動著誠去僞舍辭亦奚之哉此卦此辭化而裁之存乎其變推而行之存乎其通此本諸卦辭善於用易者也若夫不本諸卦辭神而明之則又存乎其人耳蓋有所為而後成有所言而後信皆非神明惟默而我自成之不言而人自信之則生知安行聖人之能事也故曰存乎德行故有造化之易有易書之易有在人之易德行者在人之易也有德行以神明之則易不在造化不在四聖而在我矣立象以盡意設卦以盡情僞繫辭焉以盡其言而末又云神而明之存乎其人默而成之不言而信存乎德行何也蓋立象盡意者聖人作易之意得意忘象者聖人用易之妙也指各有在豈容執論形上形下千古論道要語也識得形上之道方許識易有太極易有太極乾坤之生生而不息者是是以乾坤列而四象與八卦相藴而生此易道之所以為至也強名之曰太極而實非另有一物立於兩儀四象之前也周子曰無極而太極又曰太極本無極斯知道者也劉念臺曰無極太極又是夫子以後破荒語此無字是實落語非𤣥妙語也朱陸之辨在朱子以為太極之上必有無極既不足以得大易之㫖而陸子以為太極之上决不當有無極亦豈足以得濓溪之㫖然象山曰隂陽已是形而上者况太極乎近之矣或問作易固有意象用易亦有意象如何曰聖人言行無非用易只以卦爻作模子耳以堯舜禹文周孔觀之見作易用易皆意象也意象一神理耳問卜筮何關大道曰卜筮只是引子以明隂陽不測之神無寂無感不疾不速使人畏天向道陽明門人問易朱子主卜筮程傳主理何如先生曰卜筮亦是理理亦是卜筮天下之理孰有大於卜筮者乎只為後世將卜筮專主在占卦上看了所以看得卜筮是小藝不知今日之師友問答博學審問慎思明辨篤行之類皆是卜筮卜筮者不過求决狐疑神明吾心而已易是問諸天人有疑自信不及故以易問天謂人尚有所涉惟天不容僞耳首章至此通重易簡首言易簡理得二章三極之道即易簡三章險包阻易包簡四章神易即易知簡能五章不測之神即無方者生生之易即無體者一易簡也六章明言易簡配至德不可增減之謂至見其超於異端百家七章緊承至德而贊之八章物宜㑹通即易簡也十章易仍是變化道仍是神一易簡也十一章括於易有太極易即圖書變化太極即圖書之神故以神物收之而末章以鼓舞之神默成之神承之總是發明易簡以生下篇貞一右第十二章繫辭下傳象爻發於先聖變動示於後聖成列已是象而言在中天定之象未經模寫也因重已是爻而言在中尚未到相推也相推已是變而言在中尚未及辭占也繫辭命占已是動而言在中尚在簡䇿未成擬議變化也象爻主造化包人事變動主人事而本造化天人一貫吉凶悔吝非從天降言人自取立本與趨時不相離亦不平看趨時根於立本先天生後天也一身之動主之者貞而勝道亦在貞不問德之為剛為柔惟貞以立本則得不易之道而吉否則凶貞以趨時則得常易不易之道而吉否則凶總之常勝之道歸於貞耳貞非執一不變者神理所主中焉而已體不易者如天地日月之立本配先天也用常易者如天地日月之趨時配後天也然總歸不易之理非貞而何單言貞可包一并舉則貞本於一所謂為物不二者夫道一也分之則易簡矣易知簡能之道不可見一呈確隤之象易簡自不能𨼆易簡非從確隤生却憑確隤見天之泄道源而啓聖藴如此效此象此兩此字指易簡使爻象不效像乎此則聖人之易與天地不相似矣此爻此象方動於卦之中則或吉或凶即呈於卦之外而功業即因變而見矣功業者成務定業也因變而見即變而通之以盡利也若聖人之辭不過於爻象之中因此貞一而繫之蓋教人不論吉凶以貞勝而歸於一者此則聖人繫辭覺民之心情也故曰情以上言作易下則用易也大德者易簡貞一之大德也生者天主生物之始地主生物之成也大寶者聖人必居天位方可行天道天道一仁而已矣理財以義行其仁之公正辭以義行其仁之章禁非以義行其仁之斷同歸於生吾民也立仁立義以立本時仁時義以趨時率易簡而貞天下於一以此了貞勝之案上繫首章舉天地易簡知能之德而繼之以聖人之成位見聖人有以克配乎天地此作易之原易之體也下繫首章舉天地易簡貞一之德而繼之以聖人之仁義見聖人有以參贊乎天地此行易之事易之用也聖人一部易經皆利於正故吉凶者以貞而勝不論其吉凶也天地得此貞而觀故無私覆載日月得此貞而明故無私照臨天下之動雖千端萬緒惟貞自一一者何即乾坤之易簡也乾惟貞故確然示人易坤惟貞故隤然示人簡聖人作易使不效象乎此則聖人之易與天地不相似矣楊龜山曰舊嘗解易簡而天下之理得云行其所無事不亦易乎一以貫之不亦簡乎如是則天下之理得矣又言行其所無事一以貫之只是一箇自然之理繫辭中語言直有難理㑹處今人注解只是亂說右第一章本義制器尚象當活看易之制器尚象非止十三卦特舉其例耳於制器尚象中當以通德類情為主首節是通德類情作易之事後十三卦示通德類情用易之例網罟耒耜所以足民食交易舟車所以通民財弧矢門柝所以防民患杵臼以利其用衣裳以華其身宫室以安其居棺槨以送其死所以為民利用安身養生送死無遺憾矣然百官以治萬民以察器利用便則巧僞生聖人憂之故終之以書契焉此皆所以通德類情者也作用全在通字類字方見作易用易兩妙蓋取諸離十二蓋字非必實有是事示通德類情之理耳上古雖未有易之書然造化人事本有易之理故作事暗合易書正所謂畫前之易也程正叔曰古之伏羲豈不能垂衣裳必待堯舜然後垂衣裳據如此事只是一箇聖人都做得了然必須數世然後成亦因時而已又曰識變知化為難古今風氣不同故器用亦異是以聖人通變使民不倦各隨其時而已矣觀法天地伏羲氏作易緣起必以為則河洛者亦執見也聖人見盈天地之間理總是吾心之理於是近取諸身㑹作一個分作千萬個神明之德即天地之德萬物之情即天地分見之情非有二也取義十三卦皆憲天宜民取諸身而已六十四卦三百八十四爻莫不皆然右第二章是故二字承上章取象而言以作易言也通章當以象字作主先儒曰六十四卦三百八十四爻通是一象是也蓋聖人之意本欲以吉凶悔吝之理開天下但無所依據假借則此理無由著見故伏羲之易假象以寓理乃事理倣佛近似而可以想像者也非造化之真體也文王有彖以言其材彖者象之材也乃卦之德也周公有爻以效其動爻者象之變也乃卦之趨時也則吉凶由此而生悔吝由此而著矣吉凶在事本顯故曰生悔吝在心尚微故曰著悔有改過之意至於吉則悔之著也吝有文過之意至於凶則吝之著也要皆據其象而已故舍象不可以言易也豈聖人作易前民用以教天下之心哉易尚象舍象不可以言易矣而又曰象者像也則又無迹象之可執矣故念臺云形而下者謂之象形而上者謂之像也彖言乎材以顯象也天下之動象之著者也吉凶易辨悔吝難知則所以像者之要也右第三章陽卦宜多陽而反多隂隂卦宜多隂而反多陽此何以故凡陽卦皆主乎竒也竒一不得不二其耦耳凡隂卦皆主乎耦也耦一不得不二其竒耳德行以道之得於心而見於行者言陽貴有君道焉天理是也隂賤有民道焉人欲是也王堣齊曰心一而已以之為主則有君之名以之為役則有民之名故手足耳目皆役於心而不可使之役其心也愚謂易理無不在有一身之君民有一身之君子小人有世道之君民有世道之君子小人天君泰然百體從令君子之道也血氣用事德性受役小人之道也一君二民一則一矣二則什百千萬之總名皆對一言也柴氏曰陽卦未必皆君子隂卦未必皆小人此亦見天理中未嘗無人欲人欲中未嘗無天理易道所以不可窮也震坎艮為陽卦皆一陽二隂巽離兑為隂卦皆一隂二陽其故何也問其多陽多隂之故也陽竒隂耦答其故也其德行何也謂隂陽皆德也其為行何也陽貴為君隂賤為民一君二民則權歸於上此之道為君子二君一民則政出多門此之道為小人寥寥數言自問自答帝王之治統聖學之一貫總不外於是右第四章謝上蔡問何思何慮程子以為太早繼而曰正好用功嘗思之道在自然無容思慮即造化物理之屈伸皆有自然亦無容思慮至精義利用此當用之思慮非憧憧之思慮也所謂由思慮之不可無者以還於無可思慮之天也此聖學也吳幼清曰思者心之用也慮者謀度其事也心體如明鏡止水未與物接寂然不動何思之有既與物接應之各有定理何慮之有因有往來便有思慮往來雖不可無思慮雖不可廢但著不得憧憧耳憧憧者不能順其自往自來之道而過思過慮也如來而思迎之便成意必矣往而思留之便成固我矣可謂貞乎自在物言同以太極為歸特所出之途殊耳途之殊固無害於歸之同也自在心言一以心極為致特所出之慮百耳慮之百固無害乎致之一也處一可貞百度𤣥同可馭萬殊何以思慮為哉全經要語也蔡虛齊曰聖人心胸大如咸九四只說人心感應之公私夫子一觸便上徹日月寒暑下徹尺蠖龍蛇而至於窮神知化一觸無遺者是也十一爻辭當以咸為主各含屈伸自然之意困戒妄動解示善動屈於妄而伸於善也滅趾以興小人之福滅耳以正小人之罪伸於小懲而屈於惡積也否已治而憂亂鼎位高而材下伸於憂而屈於材也豫安而能慮復知過必改屈於靜而伸於動屈於過而伸於改也損求益於友益求益於民屈於雜而伸於専屈於無恆而伸於有恆也引伸觸類則自然之理無處不然絶去憧憧以一御百以同齊異執神而御化則與日月合其明四時合其序萬物同其適矣要從精義利用中求而後可以盡忘思慮神化為歸矣故咸三段中間必以聖學為主須知周易通篇只是屈伸自然屈伸者隂陽常易者也自然者太極之神理不易者也困于石以下十一爻在上經者五在下經者六為陽爻者七為隂爻者四無不從思慮生無不憑自然之理為得失端而研之約而守之可以精義精以造微可以利用利以安身以德全而不危故易不可不學也此與上繫鳴鶴在隂七爻擬議之意同總不外乎隨事隨時隨處慎言慎動盡理以聽數而已若不明於吾心之易而徒問易於卦爻則易亦何靈之有或曰一部易經言理即言數同歸而殊塗同歸於理也而其塗則殊如父子君臣夫婦朋友長幼接乎其身者甚殊也然父子有親之理君臣有義之理夫婦朋友長幼有序别信之理吾惟盡其理而已外何庸心焉一致而百慮者一致於數也而其慮則百如富貴貧賤患難起乎其心者有百也然富貴貧賤患難各有數存乎其間吾惟安其數而已他何庸心焉大凡有可為有可致者吾身一定之理也莫之為而為莫之致而至者則造化自然之數也此又分之而無可分合之而不待合大哉易乎窮神知化盛德莫加矣右第五章乾坤為易之門門者物之所從出者也隂陽二畫六十四卦三百八十四爻皆其所從出故為易之門有形質曰物陽竒隂耦則有形質矣合德有體即天地定位五句先天成象故言隂陽後天效法故言剛柔撰即相得有合順逆是也德即變化鬼神易簡是也一卦有一卦之稱名一爻有一爻之稱名或言物象或言事變可謂至變矣然不過體天地之撰通神明之德而已二者之外未嘗有踰越也來矣鮮云稽考其體之通之之類如言龍戰于野入于左腹獲明夷之心如此之類似非上古民淳俗朴不識不知之語意者衰世民僞日滋所以聖人說此許多名物事類者亦不得已也彰往者明天道之已然也察來者察人事之未然也根極神明之德而呈露天地之撰顯者有以微之幽者有以闡之見道器合一幽顯無間當名辨物者如乾馬坤牛乾首坤腹之類不使之至於混淆也正言斷辭者吉則正言其吉凶則正言其凶無委曲回避也如是則精及無形粗及有象無不備矣乾坤德撰之理小不遺大不禦小大非成兩截一理所通也易不待大其所稱即稱名小而取類大何以明之其辭深逺而不晦文之於德撰之條理也其言旁引而不僻咸中德撰之典常也其事宏肆而不靡深入德撰之淵奧也可謂取類大而不越者聖人誠何心哉正以衰世之民蔽於情欲吉凶疑二而失得之報不明故汲汲乎以易濟之使知禍生有門由於從逆明此失之報焉吉福難幸由於惠迪明此得之報焉於此能明則民行無二而克濟聖心亦自慰矣稱名與前稱名呼應理非名不著民非名不開此聖人救世之心歸在末二句足衰世之意使民不越也乾坤分隂分陽而妙在合處分則為物物乃不化合則為德德妙一原天地之撰天地雷風之類也可得見者也可得見者易則以此隂陽體之神明之德健順動止之類也不可測者也不可測者易則以此隂陽通之由是本天道以察民故盈天地之大萬物之廣何者不因名以著而卒未有越於此理之外者彰往篩言稱名之雜有如此稱名也小節言雜而不越以歸之聖人為衰世立教之意如此開而開字或云作推字義亦無不可右第六章程子曰如言仁者不憂又却言作易者其有憂患須要知用處各别也天下只有一箇憂字一箇患字既有此二字聖人安得無之本義三陳九卦九卦皆反身修德以處憂患之事也而有序焉首節九卦之德聖人作易固有憂患矣然聖人之憂患惟修其德而已聖人修德雖不因憂患而修然卦中自有修德之具如履之基也著力用功之謂基謙之柄也虛懷有執之謂柄復之本也深根固底之謂本恆之固也外封內守之謂固損之修益之裕也蠲除本無之謂修充積本有之謂裕困之辨井之地巽之制也考鏡功力之謂辨安止不遷之謂地潛入善用之謂制見得九卦是聖學定序易道淵源非偶出也過則聖及則賢均之免吾身險阻之患而歸於易簡之善耳二節九卦之善禮順人情故和和無森嚴之分則不至矣和而至履所以善也謙以自卑則不尊矣謙以自晦則不光矣尊而光謙所以善也暗昧而小者必不能辨物復以微陽而知五隂皆為物欲小而辨復所以善也事至而雜來必至於厭恆雖處轇轕之地而常德如一日雜而不厭恆所以善也凡事之難者必不易損則懲忿窒欲習熟之久私意漸消先難後易損之善何如凡事之長裕者必至於設施造作益則日有知而月無忘然非助長也長裕而不設益之善何如身之窮者必不通困則身窮而道通窮而通困之善何如人居其所者必不能遷井泉脈流通日遷徙而常新居其所而遷井之善何如大凡人可得而盡見者非妙用也巽之為德入而伏既深入乎事理且盡泯其機緘非祕之也稱而𨼆神應故妙幾微故幽也履道至此而盡善矣三節九卦之用蕩檢者行必戾用履以循理方能調適性行傲德者禮不為用用謙以自牧方能動必循理用復則道心有主物乃不得眩搖之用恆而中有常主物乃不得二三之知忿欲為害而用損斯害德者逺知改過遷善之為利而用益斯利德者興困之德用達觀天人之際何怨尤不寡乎井之德用辨析紛應之原何居之不遷乎至於巽則心之入理甚深而稱物甚當即達守而權無非天理人情之至而履且化矣伏羲作易而無其辭至文王始有彖辭教人以反身修德之道夫子於此得處憂患之說焉曰在進德因舉九卦始於履而終於巽一一是實功實行聖學之大指三節一節進一節首節言九卦為修德之具以之字發明之中節言九卦之才德以而字發明之末節言聖人用九卦以修德以以字發明之能如此修德天下有何憂患不可處哉履德之基猶室之有基址也履和而至言和之善處履以和行才說到行上三節一節深一節餘倣此九者衡言之循序而及無躐等之嫌並力而施無支離之病九德總是一德一德乃為至德善處憂患者盍於此圖之意者文周之德如是後人又曰此夫子一一自道也右第七章不可逺為主謂道不可離也為道者易之為道也其為道也屢遷所以不可逺也變動周流上下剛柔皆不可以為一定之典要典定也要執也易不可為典要矣然其出其入却各有一定之法度又於出入以度之中明其可憂又明其可憂之故明其可患又明其可患之故使人懼之而不敢犯又愛之而不忍違易之道如此人豈可逺乎方字衆解不同本義始由辭以度其理看來只是理字變雖無定而理則有定與典常一般但在事物曰方在卦爻曰典常耳典常典要不同典要定執也與屢遷反泥於迹者也典常定理也與屢遷合貞於理者也典常終不在屢遷之外故神而明之惟存乎其人率辭揆方何如耳苟非其人則典常為簡䇿之陳迹耳可虛行耶以屢遷典常合觀之肖兩繫首章屢遷即變化意常易之貞也典常即易簡意不易之貞也易書大要盡矣書者卦爻之辭也不可逺不可離也以之崇德廣業以之居安樂玩皆不可離之意變動者卦爻之變動也卦雖六位然剛柔往來如寄非實有也故曰六虛以其屢遷也原不可為一定之典要然其變也乃所以常變中有常度也其不可隕越又如此方即度也度即典常也言學易者必由其常以通其變易道始可得而行然終不可與拘攣局曲之士道也右第八章此章専論中爻質謂卦體初者卦之始原其始則二三在其中矣上者卦之終要其終則四五在其中矣卦必原始要終以為體故文王之彖辭亦必原始要終以為辭如屯曰元亨利貞蒙曰童蒙求我皆合其始終二體言之也若六爻之剛柔相雜則惟取其時物而已故周公之爻辭亦惟取諸時物而為辭如乾之龍物也而有潛見飛躍之不同者時也漸之鴻物也而有干盤陸木之不同者時也初爻難知者以初爻為爻之本方有初爻而一卦之形體未成是其質未明所以難知易知者上爻為卦之末卦至上爻則其質已著其義畢露所以易知惟難知故聖人繫初爻之辭則必擬而議之當擬何象何占不敢輕率惟易知故聖人繫上爻之辭不過因下爻以成其終如乾初九曰潛龍上爻即曰亢龍是也初與上固知之有難易矣然卦理無窮內外有正卦之體中爻又有合卦之體然後其義方無遺缺若夫錯陳隂陽撰述其德以辨别其是非使徒以正卦觀之而遺其合卦所互之體則其義必有不備者矣噫者嘆中爻之妙也要者中也即中爻也言不待言爻之全即知存亡吉凶也彖辭文王卦下所繫之辭同功者二與四互成一卦三與五互成一卦皆知存亡吉凶其功同也善不同者二中而四不中故不同也不利逺者既柔不能自立又逺於君則孤臣矣所以不利要者約也用者發之於事也柔中者柔而得中也三多凶者六十四卦惟謙卦勞謙一爻許之以吉所以三多凶五為君君則貴有獨運之權故多功豈三乃隂居陽位則凶五乃陽居陽位則勝耶乃貴賤之等使然耳捷解云洪氏曰正體二五為內外之中互體三四為一卦之中愚按漢儒互體之說根雜物撰德朱子取之蓋云體本假合中間聨屬以配三才外互象人參天內互象人兩地天地之間人事為多此雜撰之義也然曰雜物終落類物一層曰撰德終落通德一層備則備而非專也今人專主互體說易以緯當經反晦大指互外又有兼包之說益流而為支餘矣此專指卦爻而言質猶言材初爻之辭若得之擬議而卒乃因而成之亦自讀易者言也又統爻辭而進及於彖以見彖辭之居要二四以逺近言三五以貴賤言非必近為大臣貴為人君但據爻位而象有如此來瞿塘易學於非其中爻不備一語而深有㑹焉遂能發孔子之藴其本原程朱㑹通諸儒而闡明未備者良多其精義妙法俱自錯綜出右第九章書以載道也少有闕隘不可以語廣大少有滲漏未見廣大中之悉備也易則廣矣大矣包含無餘矣而其中纎悉畢具非空踈之廣大也三才云者天有天之才地有地之才人有人之才也總而言之曰道道之分布曰爻爻效也效獻也呈獻天地人之道與易貢同義物有天之物地之物人之物文有天之文地之文人之文至於吉凶在人則三才順逆之理合注於其中默寓趨避以開民先如此看方得廣大悉備實處天道兩則隂陽成象矣五為陽上為隂也人道兩則仁義成德矣三為仁四為義也地道兩則剛柔成質矣初為剛二為柔也道本如是故兼而兩之非聖人安排也一道也為爻為物為文為吉凶皆自易道而裁之道雖有三才之分而自人用之總一人道也右第十章聖人以敬為傳心之法在帝王則為憂勤惕厲在易辭則為危懼盛德得此者也末世反此者也內聖外王始終之要只在一敬故曰其道甚大雖近而一身逺而天下國家凡平者皆生于危凡傾者皆生于易若常以危懼為心則凡天下之事物雖百有不齊然生全成於憂患未有傾覆而廢者矣故聖人繫易之辭懼以終始不敢始危而終易者大約欲人恐懼修省至於無咎而已此則易之道也易之興謂衰而後興當紂之世無道極矣而易乃興則紂固生文王之憂患耶文王至德平其身以平天下不過危使平而已豈有他道哉紂之不善傾其身以傾天下不過易使傾而已亦豈有他道哉此千聖傳心之要聖人身經憂患筆之於書以垂後世其懼以終始之心也夫右第十一章此章反復論易知險簡知阻蓋天尊地卑首章言聖人以易簡之德成位乎天地見聖人作易之原此章言聖人以易簡之德知險知阻作易而使百姓與能見聖人作易之實事也健順者乾坤之性德者乾坤藴蓄之德得諸心者也行者乾坤生成之迹見諸事者也易簡者乾坤無私之理也此節止論其理言知險知阻乃健順德行易簡之能事也未說到聖人與易至下文說心研慮方說聖人八卦象告方說到易夫子以易簡兩言始終上下兩篇總以理為主故曰易簡理得莫易於理莫險於欲莫簡於理莫阻於欲出理便入欲去安便即危易便知險簡便知阻易簡即吉所謂修之吉者險阻即凶所謂悖之凶者大抵險阻非外患而外患在其中矣故下文以吉凶代易簡險阻蓋天下惟吾身之吉不易集凶不易除而外來之禍福猶其後者故以易簡為吉而以險阻為凶也夫吉凶亹亹盡易道之變化矣易道變化全在云為聖人作易專責人事通章只是云為意思貫串與擬議以成變化樞機主榮辱動天地一意按器來有𨼆顯而無二理知器同歸於知來象告情言正是兩個謀字成能意思剛柔吉凶正其所告所言者相攻相取相感申剛柔雜居凶害悔吝申吉凶可見情遷情僞兩情字有别情誠也僞不誠也易道最重誠所以乾坤首言存誠立誠純乎天理方可言情稍涉人欲便入於僞人心原只有誠無僞情方可以言易簡僞即不免為險阻矣此節言卦爻之情下節言人之情六爻總是以人知為以為知云以云知其敝之窮屈也此聖人知器知來之凖的也孟子知言正出於此孟子以言知心以心知害此以為知云以云知害而皆歸於窮屈皆以開其反正之機也古今惟𨼆怪險阻之學似是而非害道最甚故聖人深患而深拒之愛道之至也險阻者乾坤至賾至動之事險者險難也易直之反阻者壅塞也簡靜之反惟易直無私者可以照天下巇險之情惟簡靜無私者可以察天下煩壅之故六十四卦利貞者無非易簡無私之理而已知險知阻所以化險為夷化阻為平也自高臨下曰險乾象也自下趨上曰阻坤象也既知險又知阻總取回還却顧之意因以見知阻即是知險恆簡即是恆易此聖人未卜筮而知險知阻矣又慮百姓不皆聖人於是作易以成天地之能使百姓亦可以與能蓋八卦以象告險阻爻彖以情言險阻剛柔相雜以吉凶見險阻是以百姓亦可與知與能也情即象之情剛柔雜居皆象而吉凶其情也即所以著此易簡之理者也相攻相取相感卦爻險阻之情慙枝寡多遊屈則又人情之險阻而所發之辭亦異者也總之只是一易簡之德而修之則吉悖之則凶右第十二章讀易大㫖卷三
